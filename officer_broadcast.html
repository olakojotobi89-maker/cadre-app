<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CADRE — Field Broadcast Unit</title>

<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>

<style>
:root{
  --bg:#000;
  --panel:#0a0a0a;
  --red:#cc1a1a;
  --red2:#ff2a2a;
  --text:#eaeaea;
  --muted:#777;
  --green:#22dd55;
  --gold:#c8960a;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,Arial;}

body{
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* Tactical grid background */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(255,0,0,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,0,0,0.05) 1px, transparent 1px);
  background-size:30px 30px;
  opacity:0.3;
  pointer-events:none;
}

.container{
  width:100%;
  max-width:500px;
  padding:20px;
}

.card{
  background:var(--panel);
  border:1px solid rgba(255,0,0,0.2);
  padding:16px;
  border-radius:10px;
  box-shadow:0 0 30px rgba(255,0,0,0.1);
}

.title{
  text-align:center;
  letter-spacing:3px;
  color:var(--red2);
  font-weight:700;
  margin-bottom:10px;
}

.status{
  text-align:center;
  font-size:12px;
  color:var(--muted);
  margin-bottom:10px;
}

.live{
  display:inline-block;
  width:8px;height:8px;
  background:var(--red);
  border-radius:50%;
  margin-right:6px;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0.2}
}

.videoBox{
  width:100%;
  height:260px;
  background:#111;
  border:1px solid rgba(255,0,0,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  border-radius:8px;
  margin-bottom:12px;
  position:relative;
}

.videoBox video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlayText{
  position:absolute;
  font-size:12px;
  color:#555;
  letter-spacing:2px;
}

.btn{
  width:100%;
  padding:14px;
  margin-top:8px;
  border:none;
  cursor:pointer;
  font-weight:700;
  letter-spacing:2px;
  border-radius:6px;
}

.start{
  background:var(--red);
  color:white;
}

.stop{
  background:#222;
  color:var(--red2);
  border:1px solid var(--red);
}

.panel{
  margin-top:10px;
  padding:10px;
  background:#0c0c0c;
  border:1px solid rgba(255,0,0,0.15);
  font-size:12px;
  color:var(--muted);
}

.state-live{color:var(--green)}
.state-warn{color:var(--gold)}
.state-off{color:var(--red)}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="title">FIELD BROADCAST UNIT</div>
    <div class="status" id="status">
      <span class="live"></span> IDLE
    </div>

    <div class="videoBox" id="videoBox">
      <div class="overlayText">CAMERA OFFLINE</div>
    </div>

    <button class="btn start" onclick="startBroadcast()">START BROADCAST</button>
    <button class="btn stop" onclick="stopBroadcast()">STOP BROADCAST</button>

    <div class="panel" id="log">
      STATUS: WAITING FOR COMMAND
    </div>

  </div>
</div>

<script>
const APP_ID = "8f88034e0a9545868b55af604b268e1e";
const CHANNEL = "cadre-surveillance";

let client;
let localTrack;
let audioTrack;

let state = "idle";

function setStatus(text, mode="warn"){
  const el = document.getElementById("status");
  el.innerHTML = `<span class="live"></span> ${text}`;
}

function log(msg){
  document.getElementById("log").innerText = "STATUS: " + msg;
}

async function startBroadcast(){

  try{
    setStatus("REQUESTING PERMISSION","warn");
    log("Requesting camera & microphone...");

    client = AgoraRTC.createClient({mode:"rtc", codec:"vp8"});

    // Token is recommended. If your Agora Console requires RTC tokens, set window.__AGORA_TOKEN.
    const tokenToUse = (window.__AGORA_TOKEN && window.__AGORA_TOKEN !== "null") ? window.__AGORA_TOKEN : null;
    await client.join(APP_ID, CHANNEL, tokenToUse, null);

    setStatus("CONNECTING TO COMMAND CENTER","warn");

    localTrack = await AgoraRTC.createCameraVideoTrack();
    audioTrack = await AgoraRTC.createMicrophoneAudioTrack();

    const videoBox = document.getElementById("videoBox");
    videoBox.innerHTML = "";
    localTrack.play(videoBox);

    await client.publish([localTrack, audioTrack]);

    state = "live";
    setStatus("LIVE TRANSMISSION ACTIVE","live");
    log("Broadcasting to CADRE surveillance network");

  } catch(err){
    console.error(err);
    setStatus("ERROR - PERMISSION DENIED","off");
    log("Failed to start broadcast");
  }
}

async function stopBroadcast(){

  try{
    setStatus("TERMINATING STREAM","warn");

    if(localTrack){
      localTrack.stop();
      localTrack.close();
    }

    if(audioTrack){
      audioTrack.stop();
      audioTrack.close();
    }

    if(client){
      await client.leave();
    }

    document.getElementById("videoBox").innerHTML =
      `<div class="overlayText">CAMERA OFFLINE</div>`;

    state = "idle";
    setStatus("TRANSMISSION STOPPED","off");
    log("Broadcast ended");

  } catch(err){
    console.error(err);
  }
}
</script>

</body>
</html>
