<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CADRE // TACTICAL COMPASS</title>

<style>
:root {
    --hud-crimson: #ff3333;
    --hud-emerald: #00ff66;
    --hud-cyan: #00f0ff;
    --hud-cyan-glow: rgba(0, 240, 255, 0.5);
    --bg-dark-surface: #060b13;
    --border-precision: #1e293b;
    --tech-font: 'Courier New', Courier, monospace;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    background-color: #020408;
    background-image: linear-gradient(rgba(18, 24, 38, 0.4) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(18, 24, 38, 0.4) 1px, transparent 1px);
    background-size: 20px 20px;

    font-family: var(--tech-font);
    color: white;

    padding: 20px;
}

/* scanlines */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: linear-gradient(rgba(0,0,0,0) 50%, rgba(0,0,0,0.25) 50%);
    background-size: 100% 4px;
    pointer-events: none;
}

.dashboard-panel {
    background: rgba(9, 17, 28, 0.7);
    border: 1px solid var(--border-precision);
    backdrop-filter: blur(8px);

    padding: 20px;
    width: 100%;
    max-width: 420px;

    display: flex;
    flex-direction: column;
    align-items: center;

    border-radius: 10px;
}

.panel-header {
    width: 100%;
    text-align: center;
    font-size: 0.85rem;
    letter-spacing: 2px;
    color: #748ba7;
    margin-bottom: 20px;
    border-bottom: 1px solid #1e293b;
    padding-bottom: 10px;
}

.compass-ring {
    width: 240px;
    height: 240px;
    border: 2px solid var(--hud-cyan);
    border-radius: 50%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
}

#needle {
    width: 4px;
    height: 110px;
    background: linear-gradient(to bottom, var(--hud-crimson) 50%, var(--hud-emerald) 50%);
    position: absolute;
    transform-origin: bottom center;
    transition: transform 0.1s ease-out;
    border-radius: 2px;
}

.bearing-display {
    font-size: 2rem;
    color: var(--hud-cyan);
    margin-bottom: 20px;
    text-shadow: 0 0 10px var(--hud-cyan-glow);
}

.back-btn {
    background: rgba(14, 26, 45, 0.6);
    border: 1px solid #1e293b;
    color: #94a3b8;
    padding: 10px 20px;
    text-decoration: none;
    font-size: 0.75rem;
    text-transform: uppercase;
}

/* bottom nav (like home page) */
.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;

    display: grid;
    grid-template-columns: repeat(5, 1fr);

    background: rgba(9, 17, 28, 0.95);
    border-top: 1px solid #1e293b;
}

.bottom-nav a {
    text-align: center;
    padding: 10px 0;
    text-decoration: none;
    color: #94a3b8;
    font-size: 12px;
}

.bottom-nav a span {
    display: block;
    font-size: 18px;
}

/* mobile tuning */
@media (max-width: 480px) {
    .compass-ring {
        width: 200px;
        height: 200px;
    }

    #needle {
        height: 90px;
    }
}
</style>
</head>

<body>

<div id="view-container" class="spa-view">
</div>

<script type="module">
  // Backward-compatible shim: if someone opens compass.html directly,
  // mount the SPA view into #view-container.
  import { mount } from './compass.js';
  // ai-voice.js must be initialized once globally by the SPA bootstrap.
  // If compass.html is opened directly, rely on the host page/manifest
  // to have loaded AI scripts already.
  const container = document.getElementById('view-container');
  mount(container, {});
</script>
</body>
</html>
