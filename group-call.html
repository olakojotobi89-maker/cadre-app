<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CADRE - Group Comms</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b1120;
color:white;
overflow:hidden;
}

/* ===== MAIN ===== */

.main-wrapper{
display:flex;
height:100vh;
width:100%;
}

/* ===== LEFT SIDE ===== */

.video-area{
flex:1;
display:flex;
flex-direction:column;
background:#0b1120;
overflow:hidden;
}

/* ===== TOP BAR ===== */

.top-bar{
height:70px;
background:#101826;
border-bottom:1px solid #1f2937;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
}

.top-left{
display:flex;
align-items:center;
gap:12px;
}

.live-dot{
width:12px;
height:12px;
border-radius:50%;
background:#10b981;
box-shadow:0 0 10px #10b981;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%,100%{
transform:scale(1);
opacity:0.6;
}
50%{
transform:scale(1.3);
opacity:1;
}
}

.call-title{
font-size:18px;
font-weight:bold;
}

.call-status{
font-size:12px;
color:#94a3b8;
margin-top:3px;
}

.member-count{
font-size:13px;
color:#00f0ff;
font-weight:bold;
}

/* ===== PARTICIPANTS GRID ===== */

.participant-grid{
flex:1;
padding:16px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:16px;
overflow:auto;
}

/* ===== USER CARD ===== */

.user-card{
background:#101826;
border:1px solid #1f2937;
border-radius:18px;
position:relative;
overflow:hidden;
min-height:230px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
transition:0.3s;
animation:fadeIn 0.4s ease;
}

.user-card:hover{
transform:translateY(-3px);
border-color:#00f0ff;
}

.user-card.speaking{
border-color:#00f0ff;
box-shadow:0 0 25px rgba(0,240,255,0.4);
}

.user-avatar{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:3px solid #1f2937;
margin-bottom:14px;
}

.user-name{
font-size:16px;
font-weight:bold;
}

.user-rank{
font-size:12px;
color:#94a3b8;
margin-top:5px;
}

.user-top-icons{
position:absolute;
top:12px;
right:12px;
display:flex;
gap:8px;
}

.user-badge{
background:#0f172a;
border:1px solid #334155;
padding:6px 10px;
border-radius:999px;
font-size:12px;
}

.user-footer{
position:absolute;
bottom:12px;
left:12px;
right:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.connection-status{
font-size:11px;
color:#10b981;
}

.card-controls{
display:flex;
gap:8px;
}

.small-btn{
border:none;
background:#1e293b;
color:white;
padding:7px 10px;
border-radius:10px;
cursor:pointer;
font-size:12px;
transition:0.2s;
}

.small-btn:hover{
background:#334155;
}

/* ===== CHAT ===== */

.chat-panel{
width:340px;
background:#101826;
border-left:1px solid #1f2937;
display:flex;
flex-direction:column;
}

.chat-header{
height:70px;
border-bottom:1px solid #1f2937;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 16px;
font-weight:bold;
}

.chat-messages{
flex:1;
overflow:auto;
padding:16px;
display:flex;
flex-direction:column;
gap:12px;
}

.chat-message{
background:#0f172a;
padding:12px;
border-radius:12px;
border:1px solid #1f2937;
}

.chat-user{
font-size:13px;
font-weight:bold;
color:#00f0ff;
}

.chat-text{
margin-top:6px;
font-size:14px;
line-height:1.4;
}

.chat-time{
margin-top:6px;
font-size:11px;
color:#94a3b8;
}

.chat-input-area{
padding:14px;
border-top:1px solid #1f2937;
display:flex;
gap:10px;
}

.chat-input{
flex:1;
background:#0f172a;
border:1px solid #1f2937;
border-radius:12px;
padding:12px;
color:white;
outline:none;
}

.send-btn{
background:#2563eb;
border:none;
color:white;
padding:12px 16px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}

/* ===== CONTROLS ===== */

.bottom-controls{
position:fixed;
bottom:18px;
left:50%;
transform:translateX(-50%);
background:rgba(15,23,42,0.96);
border:1px solid #1f2937;
backdrop-filter:blur(10px);
border-radius:24px;
padding:12px;
display:flex;
gap:10px;
z-index:9999;
}

.control-btn{
width:58px;
height:58px;
border-radius:50%;
border:none;
background:#1e293b;
color:white;
font-size:20px;
cursor:pointer;
transition:0.25s;
position:relative;
}

.control-btn:hover{
transform:translateY(-3px);
background:#334155;
}

.leave-btn{
background:#dc2626;
}

.leave-btn:hover{
background:#ef4444;
}

.control-label{
position:absolute;
bottom:-20px;
left:50%;
transform:translateX(-50%);
font-size:10px;
color:#94a3b8;
white-space:nowrap;
}

/* ===== REACTION PICKER ===== */

.reaction-picker{
position:fixed;
bottom:95px;
left:50%;
transform:translateX(-50%);
background:#101826;
border:1px solid #1f2937;
border-radius:18px;
padding:12px;
display:none;
gap:10px;
z-index:9999;
}

.reaction-picker.active{
display:flex;
}

.reaction-btn{
font-size:24px;
cursor:pointer;
transition:0.2s;
}

.reaction-btn:hover{
transform:scale(1.2);
}

.floating-reaction{
position:fixed;
bottom:120px;
font-size:40px;
animation:floatUp 3s linear forwards;
pointer-events:none;
z-index:99999;
}

@keyframes floatUp{
0%{
opacity:1;
transform:translateY(0) scale(1);
}
100%{
opacity:0;
transform:translateY(-240px) scale(1.6);
}
}

/* ===== LOG ===== */

.comms-log{
position:fixed;
top:85px;
left:15px;
width:300px;
max-height:220px;
overflow:auto;
background:#101826;
border:1px solid #1f2937;
border-radius:16px;
padding:12px;
z-index:999;
}

.log-entry{
font-size:12px;
color:#cbd5e1;
padding-bottom:10px;
margin-bottom:10px;
border-bottom:1px solid #1f2937;
}

/* ===== ANIMATION ===== */

@keyframes fadeIn{
from{
opacity:0;
transform:scale(0.92);
}
to{
opacity:1;
transform:scale(1);
}
}

/* ===== MOBILE ===== */

@media(max-width:900px){

.main-wrapper{
flex-direction:column;
}

.chat-panel{
width:100%;
height:300px;
}

.participant-grid{
grid-template-columns:1fr;
}

.bottom-controls{
flex-wrap:wrap;
max-width:95%;
justify-content:center;
}

}

</style>
</head>

<body>

<div class="main-wrapper">

<!-- ===== LEFT ===== -->

<div class="video-area">

<div class="top-bar">

<div class="top-left">

<div class="live-dot"></div>

<div>

<div class="call-title">
GROUP_CALL_ALPHA
</div>

<div class="call-status" id="connection-status">
SECURE CHANNEL READY
</div>

</div>

</div>

<div class="member-count" id="member-count">
0 OPERATORS CONNECTED
</div>

</div>

<div class="participant-grid" id="participant-grid">

<!-- LOCAL USER -->

<div class="user-card" id="local-user-card">

<div class="user-top-icons">

<div class="user-badge" id="local-mic-icon">
🎤 LIVE
</div>

<div
class="user-badge"
id="local-hand-icon"
style="display:none;color:#facc15;"
>
✋ HAND
</div>

</div>

<img
src="https://ui-avatars.com/api/?name=Operator&background=0f172a&color=00f0ff"
class="user-avatar"
id="local-avatar"
>

<div class="user-name" id="local-name">
LOCAL OPERATOR
</div>

<div class="user-rank" id="local-rank">
CONNECTED
</div>

<div class="user-footer">

<div class="connection-status">
ONLINE
</div>

<div class="card-controls">

<button
class="small-btn"
onclick="pinParticipant('local-user-card')"
>
📌
</button>

<button
class="small-btn"
onclick="toggleRaiseHand()"
>
✋
</button>

</div>

</div>

</div>

</div>

</div>

<!-- ===== CHAT ===== -->

<div class="chat-panel">

<div class="chat-header">
TACTICAL CHAT
</div>

<div class="chat-messages" id="chat-messages"></div>

<div class="chat-input-area">

<input
type="text"
id="chat-input"
class="chat-input"
placeholder="Send tactical message..."
>

<button
class="send-btn"
onclick="sendChatMessage()"
>
SEND
</button>

</div>

</div>

</div>

<!-- ===== LOG ===== -->

<div class="comms-log" id="comms-log">

<div class="log-entry">
SYSTEM :: Tactical communication interface initialized
</div>

<div class="log-entry">
SYSTEM :: Encryption layer active
</div>

</div>

<!-- ===== REACTIONS ===== -->

<div class="reaction-picker" id="reactionPicker">

<div class="reaction-btn" onclick="sendReaction('👍')">👍</div>
<div class="reaction-btn" onclick="sendReaction('👏')">👏</div>
<div class="reaction-btn" onclick="sendReaction('❤️')">❤️</div>
<div class="reaction-btn" onclick="sendReaction('😂')">😂</div>
<div class="reaction-btn" onclick="sendReaction('🔥')">🔥</div>
<div class="reaction-btn" onclick="sendReaction('😮')">😮</div>

</div>

<!-- ===== CONTROLS ===== -->

<div class="bottom-controls">

<button
class="control-btn"
id="joinBtn"
onclick="initializeComms()"
>
📡
<div class="control-label">JOIN</div>
</button>

<button
class="control-btn"
id="muteBtn"
onclick="toggleMute()"
style="display:none;"
>
🎤
<div class="control-label">MIC</div>
</button>

<button
class="control-btn"
onclick="toggleRaiseHand()"
>
✋
<div class="control-label">HAND</div>
</button>

<button
class="control-btn"
onclick="toggleReactionPicker()"
>
😊
<div class="control-label">REACT</div>
</button>

<button
class="control-btn">
💬
<div class="control-label">CHAT</div>
</button>

<button
class="control-btn">
👥
<div class="control-label">USERS</div>
</button>

<button
class="control-btn">
🖥️
<div class="control-label">SHARE</div>
</button>

<button
class="control-btn">
⏺️
<div class="control-label">REC</div>
</button>

<button
class="control-btn leave-btn"
id="leaveBtn"
onclick="terminateComms()"
style="display:none;"
>
📞
<div class="control-label">LEAVE</div>
</button>

</div>

<script>

const supabaseUrl =
'https://ihroattnnnsckvvbosfz.supabase.co';

const supabaseKey =
'sb_publishable_M0wwGKR9he08sEfHhZQQxA_vmnXS2eX';

const sbClient =
supabase.createClient(supabaseUrl, supabaseKey);

let currentSessionOfficer =
JSON.parse(localStorage.getItem("session_user"));

/* ===== AGORA ===== */

const APP_ID = "8f88034e0a9545868b55af604b268e1e";

const CHANNEL = "GROUP_CALL_ALPHA";

const TOKEN = null;

const client = AgoraRTC.createClient({
mode:"rtc",
codec:"vp8"
});

let localAudioTrack;
let activeStream = false;
let isMuted = false;
let handRaised = false;

/* ===== LOCAL INFO ===== */

document.getElementById("local-name").textContent =
currentSessionOfficer?.name || "UNKNOWN";

document.getElementById("local-rank").textContent =
currentSessionOfficer?.rank || "UNIT";

/* ===== LOG ===== */

function addLog(message){

const logContainer =
document.getElementById("comms-log");

const log =
document.createElement("div");

log.className =
"log-entry";

const time =
new Date().toLocaleTimeString();

log.innerHTML =
`[${time}] ${message}`;

logContainer.prepend(log);

}

/* ===== JOIN ===== */

async function initializeComms(){

if(activeStream) return;

try{

activeStream = true;

document.getElementById("connection-status").textContent =
"LIVE SECURE CHANNEL ACTIVE";

document.getElementById("joinBtn").style.display =
"none";

document.getElementById("leaveBtn").style.display =
"block";

document.getElementById("muteBtn").style.display =
"block";

addLog("SYSTEM :: Initializing secure audio bridge");

await client.join(
APP_ID,
CHANNEL,
TOKEN,
currentSessionOfficer.phone || null
);

localAudioTrack =
await AgoraRTC.createMicrophoneAudioTrack({
AEC:true,
ANS:true,
AGC:true
});

await client.publish([localAudioTrack]);

addLog("VOICE LINK :: Connected to tactical channel");

await sbClient
.from('group_call_members')
.upsert({
phone: currentSessionOfficer.phone,
name: currentSessionOfficer.name,
rank: currentSessionOfficer.rank,
status: "ONLINE",
joined_at: Date.now()
});

loadMembers();

listenForMembers();

client.on("user-published", async (user, mediaType) => {

await client.subscribe(user, mediaType);

if(mediaType === "audio"){

user.audioTrack.play();

createRemoteCard(user.uid);

addLog(
`VOICE LINK :: ${user.uid} connected`
);

}

});

client.on("user-left", (user) => {

removeRemoteCard(user.uid);

addLog(
`VOICE LINK :: ${user.uid} disconnected`
);

});

}catch(error){

console.error(error);

alert("Failed to connect");

terminateComms();

}

}

/* ===== MEMBERS ===== */

async function loadMembers(){

const { data } = await sbClient
.from('group_call_members')
.select('*');

if(!data) return;

document.getElementById("member-count").textContent =
`${data.length} OPERATORS CONNECTED`;

}

function listenForMembers(){

sbClient
.channel('group_call_members_changes')
.on(
'postgres_changes',
{
event:'*',
schema:'public',
table:'group_call_members'
},
payload => {
loadMembers();
}
)
.subscribe();

}

/* ===== REMOTE CARDS ===== */

function createRemoteCard(uid){

if(document.getElementById(`remote-${uid}`)) return;

const grid =
document.getElementById("participant-grid");

const card =
document.createElement("div");

card.className =
"user-card speaking";

card.id =
`remote-${uid}`;

card.innerHTML = `

<div class="user-top-icons">

<div class="user-badge">
🎤 LIVE
</div>

</div>

<img
src="https://ui-avatars.com/api/?name=${uid}&background=0f172a&color=00f0ff"
class="user-avatar"
>

<div class="user-name">
${uid}
</div>

<div class="user-rank">
REMOTE OPERATOR
</div>

<div class="user-footer">

<div class="connection-status">
CONNECTED
</div>

<div class="card-controls">

<button
class="small-btn"
onclick="pinParticipant('remote-${uid}')"
>
📌
</button>

<button
class="small-btn"
onclick="remoteMute('${uid}')"
>
🔇
</button>

</div>

</div>
`;

grid.appendChild(card);

}

/* ===== REMOVE ===== */

function removeRemoteCard(uid){

const el =
document.getElementById(`remote-${uid}`);

if(el){
el.remove();
}

}

/* ===== PIN ===== */

function pinParticipant(id){

document
.querySelectorAll(".user-card")
.forEach(card => {
card.style.order = 0;
});

const target =
document.getElementById(id);

if(target){
target.style.order = -1;
}

}

/* ===== REMOTE MUTE ===== */

function remoteMute(uid){

addLog(
`ADMIN ACTION :: Mute request sent to ${uid}`
);

}

/* ===== MUTE ===== */

async function toggleMute(){

if(!localAudioTrack) return;

isMuted = !isMuted;

await localAudioTrack.setEnabled(!isMuted);

document.getElementById("muteBtn").innerHTML =
isMuted
? '🔇<div class="control-label">MUTED</div>'
: '🎤<div class="control-label">MIC</div>';

document.getElementById("local-mic-icon").textContent =
isMuted
? "🔇 MUTED"
: "🎤 LIVE";

addLog(
isMuted
? "VOICE CHANNEL :: Microphone muted"
: "VOICE CHANNEL :: Microphone unmuted"
);

}

/* ===== HAND ===== */

function toggleRaiseHand(){

handRaised = !handRaised;

document.getElementById("local-hand-icon").style.display =
handRaised
? "block"
: "none";

}

/* ===== CHAT ===== */

function sendChatMessage(){

const input =
document.getElementById("chat-input");

const text =
input.value.trim();

if(!text) return;

const container =
document.getElementById("chat-messages");

const div =
document.createElement("div");

div.className =
"chat-message";

div.innerHTML = `
<div class="chat-user">
${currentSessionOfficer.name}
</div>

<div class="chat-text">
${text}
</div>

<div class="chat-time">
${new Date().toLocaleTimeString()}
</div>
`;

container.appendChild(div);

container.scrollTop =
container.scrollHeight;

input.value = "";

}

/* ===== REACTION ===== */

function toggleReactionPicker(){

document
.getElementById("reactionPicker")
.classList.toggle("active");

}

function sendReaction(emoji){

const reaction =
document.createElement("div");

reaction.className =
"floating-reaction";

reaction.textContent =
emoji;

reaction.style.left =
(Math.random() * 80 + 10) + "%";

document.body.appendChild(reaction);

setTimeout(() => {
reaction.remove();
}, 3000);

toggleReactionPicker();

}

/* ===== LEAVE ===== */

async function terminateComms(){

activeStream = false;

document.getElementById("connection-status").textContent =
"CHANNEL OFFLINE";

document.getElementById("joinBtn").style.display =
"block";

document.getElementById("leaveBtn").style.display =
"none";

document.getElementById("muteBtn").style.display =
"none";

if(localAudioTrack){

localAudioTrack.close();

}

await client.leave();

if(currentSessionOfficer?.phone){

await sbClient
.from('group_call_members')
.delete()
.eq('phone', currentSessionOfficer.phone);

}

loadMembers();

addLog("SYSTEM :: Tactical stream terminated");

}

window.addEventListener("beforeunload", async () => {

if(currentSessionOfficer?.phone){

await sbClient
.from('group_call_members')
.delete()
.eq('phone', currentSessionOfficer.phone);

}

});

</script>

</body>
</html>
