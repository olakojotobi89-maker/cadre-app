<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>CADRE - Group Comms</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- AGORA SDK -->
<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>

<style>

/* ===== YOUR ORIGINAL STYLE KEPT ===== */

.comms-container{
padding:20px;
color:white;
}

.audio-link-panel{
background:#101826;
border:1px solid #1f2937;
border-radius:14px;
padding:20px;
text-align:center;
position:relative;
overflow:hidden;
}

/* ===== NEW TACTICAL EFFECTS ===== */

.audio-link-panel::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:2px;
background:#00f0ff;
animation:scanline 4s linear infinite;
opacity:0.8;
}

@keyframes scanline{
0%{left:-100%;}
100%{left:100%;}
}

.signal-status{
display:flex;
justify-content:center;
align-items:center;
gap:8px;
margin-top:10px;
font-size:13px;
color:#94a3b8;
letter-spacing:1px;
}

.signal-dot{
width:10px;
height:10px;
border-radius:50%;
background:#10b981;
box-shadow:0 0 10px #10b981;
animation:signalPulse 1.5s infinite;
}

@keyframes signalPulse{
0%,100%{
transform:scale(1);
opacity:0.6;
}
50%{
transform:scale(1.3);
opacity:1;
}
}

.wave-visualizer{
display:flex;
justify-content:center;
gap:6px;
height:60px;
align-items:center;
margin:25px 0;
}

.wave-bar{
width:8px;
height:20px;
background:#00f0ff;
border-radius:20px;
animation:pulse 1s infinite;
box-shadow:0 0 10px #00f0ff;
}

.wave-bar:nth-child(2){
animation-delay:0.2s;
}

.wave-bar:nth-child(3){
animation-delay:0.4s;
}

.wave-bar:nth-child(4){
animation-delay:0.6s;
}

.wave-bar:nth-child(5){
animation-delay:0.8s;
}

@keyframes pulse{
0%,100%{
height:20px;
opacity:0.5;
}
50%{
height:55px;
opacity:1;
}
}

.join-btn{
background:#10b981;
border:none;
color:white;
padding:14px 24px;
border-radius:8px;
font-weight:bold;
width:100%;
cursor:pointer;
font-size:15px;
transition:0.3s;
}

.join-btn:hover{
transform:scale(1.02);
background:#14d18f;
}

.leave-btn{
background:#ff3333;
border:none;
color:white;
padding:12px 24px;
border-radius:8px;
font-weight:bold;
width:100%;
cursor:pointer;
font-size:15px;
margin-top:12px;
display:none;
}

.mute-btn{
background:#2563eb;
border:none;
color:white;
padding:12px 24px;
border-radius:8px;
font-weight:bold;
width:100%;
cursor:pointer;
font-size:15px;
margin-top:12px;
display:none;
}

.comms-log{
margin-top:20px;
background:#0f172a;
border:1px solid #1e293b;
border-radius:12px;
padding:15px;
text-align:left;
max-height:180px;
overflow-y:auto;
}

.log-entry{
font-size:13px;
color:#cbd5e1;
margin-bottom:10px;
border-bottom:1px solid #1f2937;
padding-bottom:8px;
}

.status-live{
color:#10b981;
font-weight:bold;
}

.online-members{
margin-top:20px;
background:#0f172a;
border:1px solid #1e293b;
border-radius:12px;
padding:15px;
text-align:left;
}

.member-item{
padding:10px;
border-bottom:1px solid #1f2937;
font-size:14px;
display:flex;
justify-content:space-between;
align-items:center;
}

.member-status{
color:#10b981;
font-size:12px;
}

.member-count{
margin-top:10px;
color:#00f0ff;
font-size:13px;
font-weight:bold;
}

.app-bottom-dock{
display:grid !important;
grid-template-columns:repeat(1,1fr) !important;
}

</style>
</head>

<body>

<div class="app-container">

<header class="app-header">

<div class="brand-wrapper">
<span class="brand-text">TACTICAL_LINK</span>
</div>

</header>

<main class="feed-content">

<div class="comms-container">

<div class="audio-link-panel">

<h2 style="margin-top:0;">
GROUP_CALL_ALPHA
</h2>

<div class="signal-status">
<div class="signal-dot"></div>
<span id="connection-status">
SECURE CHANNEL READY
</span>
</div>

<div class="wave-visualizer">
<div class="wave-bar"></div>
<div class="wave-bar"></div>
<div class="wave-bar"></div>
<div class="wave-bar"></div>
<div class="wave-bar"></div>
</div>

<button
class="join-btn"
id="joinBtn"
onclick="initializeComms()"
>
INITIATE_LINK
</button>

<button
class="mute-btn"
id="muteBtn"
onclick="toggleMute()"
>
MUTE_MIC
</button>

<button
class="leave-btn"
id="leaveBtn"
onclick="terminateComms()"
>
TERMINATE_LINK
</button>

<div class="online-members">

<h3 style="margin-top:0;">
ACTIVE OPERATORS
</h3>

<div class="member-count" id="member-count">
0 OPERATORS CONNECTED
</div>

<div id="member-list"></div>

</div>

<div class="comms-log" id="comms-log">

<div class="log-entry">
SYSTEM :: Tactical communication interface initialized
</div>

<div class="log-entry">
SYSTEM :: Encryption layer active
</div>

<div class="log-entry">
SYSTEM :: Awaiting operator connection...
</div>

</div>

</div>

</div>

</main>

<nav class="app-bottom-dock">

<a href="home.html" class="dock-node">
<span>🏠</span>
<span>Feed</span>
</a>

</nav>

</div>

<script>

const supabaseUrl =
'https://ihroattnnnsckvvbosfz.supabase.co';

const supabaseKey =
'sb_publishable_M0wwGKR9he08sEfHhZQQxA_vmnXS2eX';

const sbClient =
supabase.createClient(supabaseUrl, supabaseKey);

let currentSessionOfficer =
JSON.parse(localStorage.getItem("session_user"));

/* ===== AGORA ===== */

const APP_ID = "8f88034e0a9545868b55af604b268e1e";

const CHANNEL = "GROUP_CALL_ALPHA";

const TOKEN = null;

const client = AgoraRTC.createClient({
mode:"rtc",
codec:"vp8"
});

let localAudioTrack;
let activeStream = false;
let isMuted = false;

function addLog(message){

const logContainer =
document.getElementById("comms-log");

const log = document.createElement("div");

log.className = "log-entry";

const time =
new Date().toLocaleTimeString();

log.innerHTML =
`[${time}] ${message}`;

logContainer.prepend(log);

}

async function initializeComms(){

if(activeStream) return;

try{

activeStream = true;

document.getElementById("connection-status").innerHTML =
'<span class="status-live">LIVE SECURE CHANNEL ACTIVE</span>';

document.getElementById("joinBtn").style.display =
"none";

document.getElementById("leaveBtn").style.display =
"block";

document.getElementById("muteBtn").style.display =
"block";

addLog("SYSTEM :: Initializing secure audio bridge");

await client.join(
APP_ID,
CHANNEL,
TOKEN,
currentSessionOfficer.phone || null
);

localAudioTrack =
await AgoraRTC.createMicrophoneAudioTrack();

await client.publish([localAudioTrack]);

addLog("VOICE LINK :: Connected to live tactical channel");

await sbClient
.from('group_call_members')
.upsert({
phone: currentSessionOfficer.phone,
name: currentSessionOfficer.name,
rank: currentSessionOfficer.rank,
status: "ONLINE",
joined_at: Date.now()
});

loadMembers();

listenForMembers();

client.on("user-published", async (user, mediaType) => {

await client.subscribe(user, mediaType);

if(mediaType === "audio"){

user.audioTrack.play();

addLog(
`VOICE LINK :: ${user.uid} connected`
);

}

});

client.on("user-left", (user) => {

addLog(
`VOICE LINK :: ${user.uid} disconnected`
);

});

}catch(error){

console.error(error);

addLog("ERROR :: Failed to initialize channel");

alert("Failed to connect to tactical channel");

terminateComms();

}

}

async function loadMembers(){

const { data } = await sbClient
.from('group_call_members')
.select('*')
.order('joined_at', { ascending:false });

const memberList =
document.getElementById("member-list");

memberList.innerHTML = "";

if(!data) return;

document.getElementById("member-count").textContent =
`${data.length} OPERATORS CONNECTED`;

data.forEach(member => {

const div =
document.createElement("div");

div.className = "member-item";

div.innerHTML = `
<div>
${member.rank || "UNIT"} - ${member.name || "UNKNOWN"}
</div>

<div class="member-status">
${member.status || "ONLINE"}
</div>
`;

memberList.appendChild(div);

});

}

function listenForMembers(){

sbClient
.channel('group_call_members_changes')
.on(
'postgres_changes',
{
event:'*',
schema:'public',
table:'group_call_members'
},
payload => {
loadMembers();
}
)
.subscribe();

}

async function toggleMute(){

if(!localAudioTrack) return;

isMuted = !isMuted;

await localAudioTrack.setEnabled(!isMuted);

document.getElementById("muteBtn").textContent =
isMuted ? "UNMUTE_MIC" : "MUTE_MIC";

addLog(
isMuted
? "VOICE CHANNEL :: Microphone muted"
: "VOICE CHANNEL :: Microphone unmuted"
);

}

async function terminateComms(){

activeStream = false;

document.getElementById("connection-status").textContent =
"CHANNEL OFFLINE";

document.getElementById("joinBtn").style.display =
"block";

document.getElementById("leaveBtn").style.display =
"none";

document.getElementById("muteBtn").style.display =
"none";

if(localAudioTrack){

localAudioTrack.close();

}

await client.leave();

if(currentSessionOfficer?.phone){

await sbClient
.from('group_call_members')
.delete()
.eq('phone', currentSessionOfficer.phone);

}

loadMembers();

addLog("SYSTEM :: Tactical stream terminated");

}

window.addEventListener("beforeunload", async () => {

if(currentSessionOfficer?.phone){

await sbClient
.from('group_call_members')
.delete()
.eq('phone', currentSessionOfficer.phone);

}

});

</script>

</body>
</html>
