<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADRE // TACTICAL COMPASS</title>
    <style>
        /* --- ADOPTING CADRE HUD ARCHITECTURE --- */
        :root {
            --hud-crimson: #ff3333;
            --hud-emerald: #00ff66;
            --hud-cyan: #00f0ff;
            --bg-dark-surface: #060b13;
            --border-precision: #1e293b;
            --tech-font: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #020408;
            background-image: linear-gradient(rgba(18, 24, 38, 0.4) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(18, 24, 38, 0.4) 1px, transparent 1px);
            background-size: 20px 20px;
            color: #fff;
            font-family: var(--tech-font);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Ambient scanline HUD effect */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            z-index: 99999;
            background-size: 100% 4px;
            pointer-events: none;
        }

        .dashboard-panel {
            background: rgba(9, 17, 28, 0.7);
            border: 1px solid var(--border-precision);
            backdrop-filter: blur(8px);
            padding: 20px;
            width: 100%;
            max-width: 400px;
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .panel-header {
            width: 100%;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #142238;
            padding-bottom: 10px;
            margin-bottom: 20px;
            color: #748ba7;
            text-align: center;
        }

        .compass-ring {
            width: 240px;
            height: 240px;
            border: 2px solid var(--hud-cyan);
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        #needle {
            width: 4px;
            height: 110px;
            background: linear-gradient(to bottom, var(--hud-crimson) 50%, var(--hud-emerald) 50%);
            position: absolute;
            transition: transform 0.1s ease-out;
            transform-origin: bottom center;
            border-radius: 2px;
        }

        .bearing-display {
            font-size: 2rem;
            color: var(--hud-cyan);
            margin-bottom: 20px;
            text-shadow: 0 0 10px var(--hud-cyan-glow);
        }

        .back-btn {
            background: rgba(14, 26, 45, 0.6);
            border: 1px solid #1e293b;
            color: #94a3b8;
            padding: 10px 20px;
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .compass-ring { width: 200px; height: 200px; }
            #needle { height: 90px; }
        }
    </style>
</head>
<body>

    <div class="dashboard-panel">
        <div class="panel-header">Tactical Heading Vector</div>
        
        <div class="compass-ring">
            <div id="needle"></div>
        </div>
        
        <div class="bearing-display" id="bearing">000°</div>
        
        <a href="admin.html" class="back-btn">Return to Node</a>
    </div>

    <script>
        const needle = document.getElementById('needle');
        const bearingDisplay = document.getElementById('bearing');

        window.addEventListener('deviceorientationabsolute', (event) => {
            const alpha = event.alpha; 
            if (alpha !== null) {
                const rotation = 360 - alpha;
                needle.style.transform = `rotate(${rotation}deg)`;
                bearingDisplay.textContent = `${Math.round(alpha).toString().padStart(3, '0')}°`;
            }
        }, true);
    </script>
</body>
</html>
