<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CADRE - Terminal Profile</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
    --bg:#050812;
    --panel:#0b1220;
    --line:#1f2a3a;
    --accent:#00f0ff;
    --danger:#ff3333;
    --text:#e5e7eb;
    --muted:#94a3b8;
}

body{
    margin:0;
    font-family:system-ui, Arial;
    background:radial-gradient(circle at top, #0b1220, #050812);
    color:var(--text);
}

/* HEADER */
.app-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    border-bottom:1px solid var(--line);
    background:rgba(0,0,0,0.3);
}

.brand-wrapper{
    display:flex;
    align-items:center;
    gap:10px;
}

.brand-logo{
    width:35px;
    height:35px;
    border-radius:8px;
}

.brand-text{
    font-weight:700;
    color:var(--accent);
}

/* PROFILE WRAPPER */
.profile-wrapper{
    max-width:500px;
    margin:auto;
    padding:20px;
}

/* AVATAR */
.radar-avatar-zone{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top:20px;
}

.radar-ring{
    width:130px;
    height:130px;
    border-radius:50%;
    border:2px solid var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 0 15px rgba(0,240,255,0.3);
    cursor:pointer;
}

.pfp-display{
    width:115px;
    height:115px;
    border-radius:50%;
    object-fit:cover;
}

/* STATUS */
.status-pill-badge{
    margin-top:10px;
    padding:5px 12px;
    font-size:12px;
    border:1px solid var(--line);
    border-radius:20px;
    color:var(--muted);
}

/* DATA CARD */
.terminal-data-card{
    margin-top:25px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:15px;
}

.terminal-data-card div{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.terminal-data-card div:last-child{
    border-bottom:none;
}

label{
    color:var(--muted);
}

/* BUTTON */
button{
    width:100%;
    margin-top:20px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:var(--danger);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* NAV */
.app-bottom-dock{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    padding:10px;
    background:#050812;
    border-top:1px solid var(--line);
}

.app-bottom-dock a{
    color:var(--muted);
    text-decoration:none;
    font-size:14px;
}
</style>

</head>

<body>

<div class="app-container">

<header class="app-header">
<div class="brand-wrapper">
<img src="Cadre logo png.jpg" class="brand-logo">
<span class="brand-text">HQ ARCHIVE</span>
</div>
</header>

<main class="profile-wrapper">

<div class="radar-avatar-zone" onclick="triggerPfpInput()">
<div class="radar-ring">
<img id="pfp-view-target" class="pfp-display" alt="Profile avatar"
src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 24 24' fill='%23648299'><circle cx='12' cy='8' r='4'/><path d='M12 14c-6.1 0-10 4-10 4v2h20v-2s-3.9-4-10-4z'/></svg>"
onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100\' height=\'100\' viewBox=\'0 0 24 24\' fill=\'%23648299\'><circle cx=\'12\' cy=\'8\' r=\'4\'/><path d=\'M12 14c-6.1 0-10 4-10 4v2h20v-2s-3.9-4-10-4z\'/></svg>'">
</div>

<div class="status-pill-badge" id="terminal-status-pill">Loading...</div>
</div>

<input type="file" id="pfp-file-controller" accept="image/*" style="display:none;">

<section class="terminal-data-card">
<div><label>Name</label><span id="id-name">—</span></div>
<div><label>Rank</label><span id="id-rank">—</span></div>
<div><label>Phone</label><span id="id-phone">—</span></div>
</section>

<button id="logout-trigger-node">
Clear Access Session 🔒
</button>

</main>

<nav class="app-bottom-dock">
<a href="home.html">🏠 Feed</a>
<a href="ebook.html">📖 eBook</a>
<a href="profile.html">👤 Profile</a>
</nav>

</div>

<script>
const supabaseUrl = 'https://ihroattnnnsckvvbosfz.supabase.co';
const supabaseKey = 'sb_publishable_M0wwGKR9he08sEfHhZQQxA_vmnXS2eX';
const sbClient = supabase.createClient(supabaseUrl, supabaseKey);

/* fallback session (for your current system) */
let sessionUser = null;
try {
  sessionUser = JSON.parse(localStorage.getItem("session_user"));
} catch (err) {
  sessionUser = null;
}
const urlParams = new URLSearchParams(window.location.search);
const targetName = urlParams.get("name");

const currentName = sessionUser?.name;
const currentId = sessionUser?.id;
const currentEmail = sessionUser?.email?.toString().trim().toLowerCase();
const profileName = targetName || currentName;
const isOwnProfile = profileName ? profileName === currentName : !!currentId;

if (!sessionUser) {
  window.location.href = "login.html";
}

const defaultAvatar = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 24 24' fill='%23648299'><circle cx='12' cy='8' r='4'/><path d='M12 14c-6.1 0-10 4-10 4v2h20v-2s-3.9-4-10-4z'/></svg>";

console.log('🔍 Session user:', sessionUser);
console.log('📋 Session keys:', Object.keys(sessionUser || {}));
console.log('🔎 Current name:', currentName);
console.log('🔑 Current ID:', currentId);
console.log('📧 Current email:', currentEmail);
console.log('🎯 Target name from URL:', targetName);
console.log('🔎 Profile name (target or current):', profileName);

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function getUserLookupKey() {
  if (currentName) return { field: 'name', value: currentName };
  if (currentId) return { field: 'id', value: currentId };
  if (currentEmail) return { field: 'email', value: currentEmail };
  return null;
}

async function getProfileImageUrl(pfp) {
  if (!pfp) return null;
  if (pfp.startsWith('http') || pfp.startsWith('data:')) return pfp;
  return null;
}

function setProfilePicture(src) {
  const avatar = document.getElementById("pfp-view-target");
  avatar.src = src || defaultAvatar;
}

/* LOAD PROFILE */
async function loadProfile() {
  let query = sbClient.from('users').select('*');
  let searchField = null;
  let searchValue = null;

  // Try name first, then id, then email (fallback)
  if (profileName) {
    searchField = 'name';
    searchValue = profileName;
    query = query.eq('name', profileName);
  } else if (currentId) {
    searchField = 'id';
    searchValue = currentId;
    query = query.eq('id', currentId);
  } else if (currentEmail) {
    // NEW: Use email as fallback to find profile
    searchField = 'email';
    searchValue = currentEmail;
    query = query.eq('email', currentEmail);
  }

  // If still no valid search field, show error
  if (!searchField) {
    console.error('❌ No profile identifier found (no name, no id, no email)');
    document.getElementById("terminal-status-pill").textContent = "SESSION ERROR";
    setProfilePicture(null);
    return;
  }

  console.log(`🔎 Querying users by ${searchField}=${searchValue}`);
  const { data, error } = await query.single();

  if (error) {
    console.error(`❌ Profile load error (${searchField}=${searchValue}):`, error);
    document.getElementById("terminal-status-pill").textContent = error.message || "PROFILE NOT FOUND";
    setProfilePicture(null);
    return;
  }

  if (!data) {
    console.error(`❌ No user found with ${searchField}=${searchValue}`);
    document.getElementById("terminal-status-pill").textContent = "PROFILE NOT FOUND";
    setProfilePicture(null);
    return;
  }

  // NEW: If we found by email, it means this is our own profile
  // Store the Name and ID back to session for future use
  if (searchField === 'email' && data.name) {
    console.log('💾 Syncing user data from email lookup to session');
    const updatedUser = {
      ...sessionUser,
      name: data.name,
      id: data.id,
      email: data.email || currentEmail
    };
    localStorage.setItem("session_user", JSON.stringify(updatedUser));
    sessionUser = updatedUser;
  }

  // Check if this is our own profile based on the loaded data
  const isOwn = (data.name === currentName) || (data.id === currentId) || (data.email?.toLowerCase() === currentEmail);

  console.log('✅ Profile loaded:', data);
  const nameEl = document.getElementById("id-name");
  const rankEl = document.getElementById("id-rank");
  const phoneEl = document.getElementById("id-phone");
  const statusEl = document.getElementById("terminal-status-pill");
  
  if (nameEl) nameEl.textContent = data.name || "UNKNOWN";
  if (rankEl) rankEl.textContent = data.rank || "UNIT";
  if (phoneEl) phoneEl.textContent = data.phone || "—";
  if (statusEl) statusEl.textContent = isOwn ? "ACTIVE" : "VIEW ONLY";

  const imageSrc = await getProfileImageUrl(data.pfp);
  setProfilePicture(imageSrc);

  if (!isOwn) {
    const avatarZone = document.querySelector(".radar-avatar-zone");
    if (avatarZone) avatarZone.style.cursor = "default";
  }
}

/* UPLOAD PFP */
async function uploadPfp(file) {
  // Use the resolved isOwn status from loadProfile
  const userKey = getUserLookupKey();
  if (!userKey) {
    console.warn('⚠️ Cannot upload PFP: viewing another user\'s profile or session error');
    return;
  }

  const fileExt = file.name.split('.').pop();
  
  console.log(`📸 Uploading profile picture for ${userKey.field}=${userKey.value}`);
  const base64Image = await fileToDataUrl(file);
  
  const { error: updateError } = await sbClient
    .from('users')
    .update({ pfp: base64Image })
    .eq(userKey.field, userKey.value);

  if (updateError) {
    console.error('❌ Upload failed:', updateError);
    alert('Failed to upload profile picture');
    return;
  }

  console.log('✅ Profile picture uploaded successfully');
  setProfilePicture(base64Image);
}

async function updateUserProfilePicture(src) {
  const userKey = getUserLookupKey();
  if (!userKey) return;
  await sbClient
    .from('users')
    .update({ pfp: src })
    .eq(userKey.field, userKey.value);
}

/* EVENTS */
document.getElementById("pfp-file-controller")
  .addEventListener("change", (e) => {
    if (e.target.files[0]) {
      uploadPfp(e.target.files[0]);
    }
  });

document.getElementById("logout-trigger-node")
  .addEventListener("click", () => {
    localStorage.removeItem("session_user");
    window.location.href = "login.html";
  });

function triggerPfpInput() {
  const userKey = getUserLookupKey();
  if (!userKey) return;
  document.getElementById("pfp-file-controller").click();
}

loadProfile();
</script>

</body>
</html>
