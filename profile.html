<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADRE - Terminal Profile</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <div class="brand-wrapper">
            <img src="Cadre logo png.jpg" alt="CADRE" class="brand-logo">
            <span class="brand-text">HQ ARCHIVE</span>
        </div>
    </header>

    <main class="profile-wrapper">
        <div class="radar-avatar-zone" onclick="triggerPfpInput()">
            <div class="radar-ring">
                <img id="pfp-view-target" class="pfp-display" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 24 24' fill='%23648299'><circle cx='12' cy='8' r='4'/><path d='M12 14c-6.1 0-10 4-10 4v2h20v-2s-3.9-4-10-4z'/></svg>">
            </div>
            <div class="status-pill-badge" id="terminal-status-pill">Offline</div>
        </div>
        
        <input type="file" id="pfp-file-controller" accept="image/*" style="display: none;">

        <section class="terminal-data-card">
            <div class="data-row-entry"><label>Name</label><span id="id-name">—</span></div>
            <div class="data-row-entry"><label>Rank</label><span id="id-rank">—</span></div>
            <div class="data-row-entry"><label>Phone</label><span id="id-phone">—</span></div>
        </section>

        <section class="action-menu-container">
            <div class="menu-action-node"><span>📡</span><span>System Notifications</span></div>
            <div class="menu-action-node"><span>🗃️</span><span>View Duty Roster</span></div>
        </section>

        <button class="btn-terminal-logout" id="logout-trigger-node">
            <span>Clear Access Session</span><span>🔒</span>
        </button>
    </main>

    <nav class="app-bottom-dock">
        <a href="home.html" class="dock-node"><span class="dock-node-glyph">🏠</span><span>Feed</span></a>
        <a href="ebook.html" class="dock-node"><span class="dock-node-glyph">📖</span><span>eBook</span></a>
        <a href="profile.html" class="dock-node active-node"><span class="dock-node-glyph">👤</span><span>Profile</span></a>
    </nav>
</div>

<script>
    // 1. Initialize Supabase
    const supabaseUrl = 'https://ihroattnnnsckvvbosfz.supabase.co'; 
    const supabaseAnonKey = 'sb_publishable_M0wwGKR9he08sEfHhZQQxA_vmnXS2eX';
    const supabase = supabase.createClient(supabaseUrl, supabaseAnonKey);

    let currentUserId = null;

    // 2. Check Authentication
    async function checkAuth() {
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
            window.location.href = "login.html";
        } else {
            currentUserId = session.user.id;
            loadProfileData();
        }
    }

    // 3. Load User Data
    async function loadProfileData() {
        const { data, error } = await supabase
            .from('users')
            .select('*')
            .eq('id', currentUserId)
            .single();

        if (data) {
            document.getElementById("id-name").textContent = data.name || "UNREGISTERED_OPERATOR";
            document.getElementById("id-rank").textContent = data.rank || "FIELD_UNIT";
            document.getElementById("id-phone").textContent = data.phone || "—";
            document.getElementById("terminal-status-pill").textContent = "Active";
            
            if (data.pfp) {
                document.getElementById("pfp-view-target").src = data.pfp;
            }
        }
    }

    // 4. Handle Image Upload
    async function processProfilePicture(file) {
        if (!currentUserId) return;

        const fileExt = file.name.split('.').pop();
        const filePath = `${currentUserId}.${fileExt}`; // Path inside bucket

        // Upload to Storage
        const { error: uploadError } = await supabase.storage
            .from('profile_pictures') 
            .upload(filePath, file, { upsert: true });

        if (uploadError) {
            console.error("Upload error:", uploadError.message);
            return;
        }

        // Get Public URL
        const { data } = supabase.storage
            .from('profile_pictures')
            .getPublicUrl(filePath);

        // Update Database
        await supabase
            .from('users')
            .update({ pfp: data.publicUrl })
            .eq('id', currentUserId);

        // Refresh UI
        document.getElementById("pfp-view-target").src = data.publicUrl;
    }

    // Event Listeners
    document.getElementById("pfp-file-controller").addEventListener("change", (e) => {
        if (e.target.files && e.target.files[0]) {
            processProfilePicture(e.target.files[0]);
        }
    });

    document.getElementById("logout-trigger-node").addEventListener("click", async () => {
        await supabase.auth.signOut();
        window.location.href = "login.html";
    });

    // Run on startup
    checkAuth();
</script>

<script>
    function triggerPfpInput() { document.getElementById("pfp-file-controller").click(); }
</script>
</body>
</html>
