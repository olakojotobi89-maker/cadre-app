<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CADRE - Terminal Profile</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
    --bg:#050812;
    --panel:#0b1220;
    --line:#1f2a3a;
    --accent:#00f0ff;
    --danger:#ff3333;
    --text:#e5e7eb;
    --muted:#94a3b8;
}

body{
    margin:0;
    font-family:system-ui, Arial;
    background:radial-gradient(circle at top, #0b1220, #050812);
    color:var(--text);
    padding-bottom:80px;
}

.app-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    border-bottom:1px solid var(--line);
    background:rgba(0,0,0,0.3);
}

.brand-wrapper{
    display:flex;
    align-items:center;
    gap:10px;
}

.brand-logo{
    width:35px;
    height:35px;
    border-radius:8px;
}

.brand-text{
    font-weight:700;
    color:var(--accent);
}

.back-btn{
    background:none;
    border:1px solid var(--line);
    color:var(--muted);
    padding:6px 14px;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
    width:auto;
    margin:0;
}

.back-btn:hover{
    border-color:var(--accent);
    color:var(--accent);
}

.viewing-banner{
    background:#0b1220;
    border-bottom:1px solid var(--line);
    border-left:3px solid var(--accent);
    padding:10px 16px;
    font-size:12px;
    color:var(--muted);
    display:none;
    font-family:monospace;
    letter-spacing:1px;
}

.viewing-banner.visible{
    display:block;
}

.profile-wrapper{
    max-width:500px;
    margin:auto;
    padding:20px;
}

.radar-avatar-zone{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top:20px;
}

.radar-ring{
    width:130px;
    height:130px;
    border-radius:50%;
    border:2px solid var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 0 15px rgba(0,240,255,0.3);
    position:relative;
}

.radar-ring.own-profile{
    cursor:pointer;
}

.radar-ring.own-profile:hover{
    box-shadow:0 0 25px rgba(0,240,255,0.55);
}

.radar-ring.own-profile::after{
    content:'📷';
    position:absolute;
    bottom:4px;
    right:4px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:50%;
    width:28px;
    height:28px;
    font-size:13px;
    line-height:28px;
    text-align:center;
}

.pfp-display{
    width:115px;
    height:115px;
    border-radius:50%;
    object-fit:cover;
    background:#0b1220;
}

.status-pill-badge{
    margin-top:10px;
    padding:5px 12px;
    font-size:12px;
    border:1px solid var(--line);
    border-radius:20px;
    color:var(--muted);
}

.status-pill-badge.online{
    border-color:#10b981;
    color:#10b981;
}

.terminal-data-card{
    margin-top:25px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:15px;
}

.terminal-data-card div{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-bottom:1px solid rgba(255,255,255,0.05);
    gap:12px;
}

.terminal-data-card div:last-child{
    border-bottom:none;
}

.terminal-data-card label{
    color:var(--muted);
    font-size:13px;
    flex-shrink:0;
}

.terminal-data-card span{
    color:var(--text);
    font-weight:600;
    text-align:right;
    word-break:break-word;
}

/* Posts section */
.posts-section{
    margin-top:25px;
}

.posts-section-header{
    font-size:13px;
    color:var(--muted);
    font-family:monospace;
    letter-spacing:1px;
    margin-bottom:12px;
    padding-bottom:8px;
    border-bottom:1px solid var(--line);
}

.profile-post-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px;
    margin-bottom:12px;
}

.profile-post-caption{
    font-size:14px;
    line-height:1.5;
    color:var(--text);
    word-break:break-word;
}

.profile-post-image{
    width:100%;
    border-radius:8px;
    margin-top:10px;
    max-height:300px;
    object-fit:cover;
    display:block;
}

.profile-post-meta{
    margin-top:8px;
    font-size:11px;
    color:var(--muted);
    display:flex;
    gap:12px;
}

.no-posts-msg{
    text-align:center;
    padding:30px;
    color:var(--muted);
    font-size:13px;
    font-family:monospace;
}

/* Skeleton */
.skeleton-line{
    background:linear-gradient(90deg,#1e293b 25%,#2d3f55 50%,#1e293b 75%);
    background-size:200% 100%;
    animation:shimmer 1.4s infinite;
    border-radius:6px;
    height:14px;
    margin-bottom:8px;
}

.skeleton-avatar{
    width:115px;
    height:115px;
    border-radius:50%;
    background:linear-gradient(90deg,#1e293b 25%,#2d3f55 50%,#1e293b 75%);
    background-size:200% 100%;
    animation:shimmer 1.4s infinite;
}

@keyframes shimmer{
    0%{background-position:200% 0;}
    100%{background-position:-200% 0;}
}

/* Upload progress */
.upload-status{
    font-size:11px;
    color:var(--accent);
    font-family:monospace;
    margin-top:6px;
    min-height:16px;
    text-align:center;
}

/* Logout — own profile only */
.logout-btn{
    width:100%;
    margin-top:20px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:var(--danger);
    color:white;
    font-weight:bold;
    cursor:pointer;
    display:none;
}

.logout-btn.visible{
    display:block;
}

.app-bottom-dock{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    padding:10px;
    background:#050812;
    border-top:1px solid var(--line);
    z-index:100;
}

.app-bottom-dock a{
    color:var(--muted);
    text-decoration:none;
    font-size:14px;
}

.profile-error{
    text-align:center;
    padding:40px 20px;
    color:var(--muted);
}
</style>
</head>

<body>
<div class="app-container">

<header class="app-header">
    <div class="brand-wrapper">
        <img src="Cadre logo png.jpg" class="brand-logo" onerror="this.style.display='none'">
        <span class="brand-text">HQ ARCHIVE</span>
    </div>
    <button class="back-btn" id="back-btn" onclick="history.back()" style="display:none;">← Back</button>
</header>

<div class="viewing-banner" id="viewing-banner">
    📡 VIEWING OPERATOR PROFILE — READ ONLY
</div>

<main class="profile-wrapper">

    <div class="radar-avatar-zone">
        <div class="radar-ring" id="radar-ring">
            <img id="pfp-view-target" class="pfp-display" alt="Profile Picture"
                src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 24 24' fill='%23648299'><circle cx='12' cy='8' r='4'/><path d='M12 14c-6.1 0-10 4-10 4v2h20v-2s-3.9-4-10-4z'/></svg>">
        </div>
        <div class="status-pill-badge" id="terminal-status-pill">Loading...</div>
        <div class="upload-status" id="upload-status"></div>
    </div>

    <input type="file" id="pfp-file-controller" accept="image/*" style="display:none;">

    <!-- Skeleton shown while loading -->
    <section class="terminal-data-card" id="data-card">
        <div><label>Name</label><span class="skeleton-line" style="width:120px;height:13px;display:inline-block;"></span></div>
        <div><label>Rank</label><span class="skeleton-line" style="width:80px;height:13px;display:inline-block;"></span></div>
        <div><label>Phone</label><span class="skeleton-line" style="width:100px;height:13px;display:inline-block;"></span></div>
    </section>

    <section class="posts-section">
        <div class="posts-section-header">TRANSMISSION ARCHIVE</div>
        <div id="profile-posts-container">
            <div class="no-posts-msg">Loading transmissions...</div>
        </div>
    </section>

    <button class="logout-btn" id="logout-trigger-node">
        Clear Access Session 🔒
    </button>

</main>

<nav class="app-bottom-dock">
    <a href="home.html">🏠 Feed</a>
    <a href="ebook.html">📖 eBook</a>
    <a href="profile.html">👤 Profile</a>
</nav>

</div>

<script>

/* ─────────────────────────────────────────────
   SUPABASE
───────────────────────────────────────────── */

const supabaseUrl = 'https://ihroattnnnsckvvbosfz.supabase.co';
const supabaseKey = 'sb_publishable_M0wwGKR9he08sEfHhZQQxA_vmnXS2eX';
const sbClient = supabase.createClient(supabaseUrl, supabaseKey, {
    auth: { persistSession: false }
});

function tryParseJson(value) {
    try {
        return JSON.parse(value);
    } catch (err) {
        return null;
    }
}

/* ─────────────────────────────────────────────
   SESSION — check all possible keys
───────────────────────────────────────────── */

let sessionUser = null;
const sessionKeys = ["session_user", "user", "officer", "currentUser"];
for (const key of sessionKeys) {
    const parsed = tryParseJson(localStorage.getItem(key));
    if (parsed?.phone || parsed?.email || parsed?.id) {
        sessionUser = parsed;
        break;
    }
}

const cachedProfile = tryParseJson(localStorage.getItem("cached_profile")) || {};
const myPhone = sessionUser?.phone || localStorage.getItem("cached_operator_phone");
const myEmail = sessionUser?.email || cachedProfile.email;
const myId = sessionUser?.id || cachedProfile.id;

/* ─────────────────────────────────────────────
   DETERMINE WHOSE PROFILE TO SHOW
   ?phone=XXX  → viewing someone else
   no param    → own profile
───────────────────────────────────────────── */

const urlParams = new URLSearchParams(window.location.search);
const targetPhone = urlParams.get("phone");
const profileIdentifier = targetPhone || myPhone || myEmail || myId;
const profileLookupKey = targetPhone
    ? "phone"
    : myPhone
        ? "phone"
        : myEmail
            ? "email"
            : myId
                ? "id"
                : null;
const profilePhone = profileIdentifier;
const isOwnProfile = !targetPhone || targetPhone === myPhone;

// No session and no target → redirect
if (!profileIdentifier) {
    window.location.href = "login.html";
}

const DEFAULT_AVATAR = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 24 24' fill='%23648299'><circle cx='12' cy='8' r='4'/><path d='M12 14c-6.1 0-10 4-10 4v2h20v-2s-3.9-4-10-4z'/></svg>";

/* ─────────────────────────────────────────────
   SETUP UI MODE
───────────────────────────────────────────── */

if (isOwnProfile) {
    document.getElementById("radar-ring").classList.add("own-profile");
    document.getElementById("radar-ring").onclick = triggerPfpInput;
    document.getElementById("logout-trigger-node").classList.add("visible");
} else {
    document.getElementById("back-btn").style.display = "block";
    document.getElementById("viewing-banner").classList.add("visible");
}

/* ─────────────────────────────────────────────
   LOAD PROFILE — 100% from Supabase DB
───────────────────────────────────────────── */

async function loadProfile() {
    let query = sbClient.from('users').select('*');
    if (profileLookupKey === 'email') {
        query = query.eq('email', profileIdentifier);
    } else if (profileLookupKey === 'id') {
        query = query.eq('id', profileIdentifier);
    } else {
        query = query.eq('phone', profileIdentifier);
    }

    const { data, error } = await query.single();

    const dataCard = document.getElementById("data-card");
    const pill     = document.getElementById("terminal-status-pill");

    if (error || !data) {
        if (isOwnProfile && sessionUser) {
            const fallbackName = sessionUser.name || cachedProfile.name || 'UNKNOWN';
            const fallbackRank = sessionUser.rank || cachedProfile.rank || 'UNIT';
            const fallbackEmail = sessionUser.email || cachedProfile.email || '—';
            const fallbackPhone = myPhone || '—';

            dataCard.innerHTML = `
                <div><label>Name</label><span>${escHtml(fallbackName)}</span></div>
                <div><label>Rank</label><span>${escHtml(fallbackRank)}</span></div>
                <div><label>Phone</label><span>${escHtml(fallbackPhone)}</span></div>
                ${fallbackEmail ? `<div><label>Email</label><span>${escHtml(fallbackEmail)}</span></div>` : ''}
            `;

            pill.textContent = "YOUR PROFILE — ACTIVE";
            pill.classList.add("online");
            document.title = `CADRE — ${fallbackName}`;
            document.getElementById("profile-posts-container").innerHTML =
                '<div class="no-posts-msg">Transmissions unavailable until profile data is complete.</div>';
            return;
        }

        dataCard.innerHTML = `
            <div class="profile-error">
                <p style="color:#ff6b6b;">OPERATOR NOT FOUND<br>
                <span style="font-size:11px;color:#475569;">${escHtml(profileIdentifier || '—')}</span></p>
            </div>`;
        pill.textContent = "NOT FOUND";
        document.getElementById("profile-posts-container").innerHTML =
            '<div class="no-posts-msg">No records found.</div>';
        return;
    }

    /* ── Profile picture — from DB ── */
    if (data.pfp) {
        document.getElementById("pfp-view-target").src = data.pfp;
    }

    /* ── Data card — all fields from DB ── */
    dataCard.innerHTML = `
        <div><label>Name</label><span>${escHtml(data.name  || 'UNKNOWN')}</span></div>
        <div><label>Rank</label><span>${escHtml(data.rank  || 'UNIT')}</span></div>
        <div><label>Phone</label><span>${escHtml(data.phone || '—')}</span></div>
        ${data.unit  ? `<div><label>Unit</label><span>${escHtml(data.unit)}</span></div>`  : ''}
        ${data.email ? `<div><label>Email</label><span>${escHtml(data.email)}</span></div>` : ''}
    `;

    /* ── Status pill ── */
    pill.textContent = isOwnProfile
        ? "YOUR PROFILE — ACTIVE"
        : `OPERATOR — ${escHtml(data.rank || 'UNIT')}`;
    pill.classList.add("online");

    /* ── Page title ── */
    document.title = `CADRE — ${data.name || 'Operator'}`;

    /* ── Load this user's posts ── */
    const postsPhone = data?.phone || (profileLookupKey === 'phone' ? profileIdentifier : null);
    if (postsPhone) {
        await loadUserPosts(postsPhone);
    } else {
        document.getElementById("profile-posts-container").innerHTML =
            '<div class="no-posts-msg">No transmissions available.</div>';
    }
}

/* ─────────────────────────────────────────────
   LOAD USER POSTS — from Supabase DB
───────────────────────────────────────────── */

async function loadUserPosts(phone) {

    const container = document.getElementById("profile-posts-container");

    const { data: posts, error } = await sbClient
        .from('ig_feed_posts')
        .select('id, caption, image, likes, comments, timestamp')
        .eq('phone', phone)
        .order('timestamp', { ascending: false })
        .limit(20);

    if (error) {
        container.innerHTML = '<div class="no-posts-msg">Failed to load transmissions.</div>';
        console.error("Posts error:", error);
        return;
    }

    if (!posts || posts.length === 0) {
        container.innerHTML = '<div class="no-posts-msg">NO TRANSMISSIONS ON RECORD.</div>';
        return;
    }

    const frag = document.createDocumentFragment();

    posts.forEach(post => {
        const card = document.createElement("div");
        card.className = "profile-post-card";

        const time     = post.timestamp ? new Date(post.timestamp).toLocaleString() : '';
        const likes    = Number(post.likes ?? 0);
        const comments = Array.isArray(post.comments) ? post.comments.length : 0;

        card.innerHTML = `
            ${post.caption ? `<div class="profile-post-caption">${escHtml(post.caption)}</div>` : ''}
            ${post.image   ? `<img src="${post.image}" class="profile-post-image" loading="lazy" decoding="async" alt="Post">` : ''}
            <div class="profile-post-meta">
                <span>👍 ${likes}</span>
                <span>💬 ${comments}</span>
                ${time ? `<span>🕒 ${time}</span>` : ''}
            </div>
        `;

        frag.appendChild(card);
    });

    container.innerHTML = '';
    container.appendChild(frag);
}

/* ─────────────────────────────────────────────
   UPLOAD PROFILE PICTURE
   Uploads file to Supabase Storage bucket
   'profile_pictures', then saves the public URL
   to the users table. No base64, no localStorage.
───────────────────────────────────────────── */

async function uploadPfp(file) {

    if (!isOwnProfile || !myPhone) return;

    const statusEl = document.getElementById("upload-status");
    const pill     = document.getElementById("terminal-status-pill");

    statusEl.textContent = "UPLOADING...";

    const fileExt  = file.name.split('.').pop().toLowerCase();
    const filePath = `${myPhone}.${fileExt}`;

    /* 1. Upload file to Storage */
    const { error: uploadError } = await sbClient.storage
        .from('profile_pictures')
        .upload(filePath, file, { upsert: true });

    if (uploadError) {
        console.error("Storage upload error:", uploadError);
        statusEl.textContent = `UPLOAD FAILED: ${uploadError.message}`;
        return;
    }

    /* 2. Get public URL */
    const { data: urlData } = sbClient.storage
        .from('profile_pictures')
        .getPublicUrl(filePath);

    const publicUrl = urlData?.publicUrl;
    if (!publicUrl) {
        statusEl.textContent = "URL FETCH FAILED";
        return;
    }

    /* 3. Save URL to users table in DB */
    const { error: updateError } = await sbClient
        .from('users')
        .update({ pfp: publicUrl })
        .eq('phone', myPhone);

    if (updateError) {
        console.error("DB update error:", updateError);
        statusEl.textContent = `SAVE FAILED: ${updateError.message}`;
        return;
    }

    /* 4. Update displayed image immediately */
    document.getElementById("pfp-view-target").src = publicUrl;
    statusEl.textContent = "✓ PROFILE PICTURE UPDATED";
    pill.textContent = "YOUR PROFILE — ACTIVE";

    /* 5. Update session cache so other pages (e.g. home.html
          composer avatar) reflect the new picture without reload */
    if (sessionUser) {
        sessionUser.pfp = publicUrl;
        // Update whichever key was used
        for (const key of sessionKeys) {
            if (localStorage.getItem(key)) {
                try {
                    const p = JSON.parse(localStorage.getItem(key));
                    if (p?.phone === myPhone) {
                        p.pfp = publicUrl;
                        localStorage.setItem(key, JSON.stringify(p));
                    }
                } catch(e) {}
            }
        }
    }

    setTimeout(() => { statusEl.textContent = ''; }, 3000);
}

/* ─────────────────────────────────────────────
   EVENTS
───────────────────────────────────────────── */

document.getElementById("pfp-file-controller")
    .addEventListener("change", (e) => {
        if (e.target.files[0]) uploadPfp(e.target.files[0]);
    });

document.getElementById("logout-trigger-node")
    .addEventListener("click", () => {
        // Clear all known session keys
        ["session_user","user","officer","currentUser","cached_operator_phone","cached_profile"]
            .forEach(k => localStorage.removeItem(k));
        window.location.href = "login.html";
    });

function triggerPfpInput() {
    if (isOwnProfile) document.getElementById("pfp-file-controller").click();
}

function escHtml(str) {
    return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

/* ─────────────────────────────────────────────
   INIT
───────────────────────────────────────────── */

loadProfile();

</script>
</body>
</html>
