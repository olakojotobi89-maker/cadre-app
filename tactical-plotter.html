<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADRE // PLOTTER</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #020408;
            --grid: #1e293b;
            --accent: #00f0ff;
            --alert: #ff3333;
        }

        body {
            background: var(--bg);
            margin: 0; padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--accent);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        .plotter-canvas {
            flex-grow: 1;
            position: relative;
            border-bottom: 2px solid var(--grid);
            background-image: radial-gradient(var(--grid) 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .radar-sweep {
            position: absolute;
            width: 300px; height: 300px;
            border: 1px solid var(--grid);
            border-radius: 50%;
            animation: rotate 4s linear infinite;
        }
        .radar-sweep::after {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            width: 50%; height: 50%;
            background: linear-gradient(to bottom, var(--accent) 0%, transparent 100%);
            transform-origin: bottom left;
            transform: rotate(45deg);
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .telemetry-footer {
            height: 100px;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: rgba(9, 17, 28, 0.9);
        }

        .data-box { border: 1px solid var(--grid); padding: 5px; font-size: 0.7rem; }
        .data-box span { display: block; color: #fff; font-size: 0.9rem; }

        .btn-nav {
            grid-column: span 2;
            text-align: center;
            background: var(--grid);
            color: #fff;
            padding: 10px;
            text-decoration: none;
            text-transform: uppercase;
        }

        #plotter-overlay {
            position: absolute;
            width: 100%; height: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="plotter-canvas">
        <div class="radar-sweep"></div>
        <svg id="plotter-overlay">
            </svg>
        <div style="text-align: center; font-size: 0.6rem; letter-spacing: 2px;">GRID_ACTIVE<br>NO_TARGETS_DETECTED</div>
    </div>

    <div class="telemetry-footer">
        <div class="data-box">LAT/LNG <span id="latlng-display">07.37/03.94</span></div>
        <div class="data-box">BEARING <span id="bearing-display">000°</span></div>
        <a href="admin.html" class="btn-nav">COMMAND_RETURN</a>
    </div>

    <script>
        const sbClient = supabase.createClient(
            'https://ihroattnnnsckvvbosfz.supabase.co', 
            'sb_publishable_M0wwGKR9he08sEfHhZQQxA_vmnXS2eX'
        );

        function updateTargetBlip() {
            const overlay = document.getElementById('plotter-overlay');
            overlay.innerHTML = ''; // Clear old blips

            // Create Pulsing Blip
            const blip = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            blip.setAttribute("cx", "50%"); 
            blip.setAttribute("cy", "50%");
            blip.setAttribute("r", "15");
            blip.setAttribute("fill", "none");
            blip.setAttribute("stroke", "#ff3333");
            blip.setAttribute("stroke-width", "3");
            
            const animate = document.createElementNS("http://www.w3.org/2000/svg", "animate");
            animate.setAttribute("attributeName", "opacity");
            animate.setAttribute("values", "1;0;1");
            animate.setAttribute("dur", "0.8s");
            animate.setAttribute("repeatCount", "indefinite");
            
            blip.appendChild(animate);
            overlay.appendChild(blip);
        }

        // Listen for signals
        sbClient.channel('distress_signals')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'distress_signals' }, payload => {
                updateTargetBlip();
            })
            .subscribe();

        // Update GPS on load
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition((pos) => {
                document.getElementById('latlng-display').textContent = 
                    `${pos.coords.latitude.toFixed(2)}/${pos.coords.longitude.toFixed(2)}`;
            });
        }
    </script>
</body>
</html>
