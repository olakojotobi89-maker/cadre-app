<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CADRE // PLOTTER</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root {
    --bg: #020408;
    --grid: #1e293b;
    --accent: #00f0ff;
    --alert: #ff3333;
}

body {
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    color: var(--accent);
    font-family: monospace;
    overflow: hidden;
}

/* RADAR AREA */
.plotter-canvas {
    flex: 1;
    position: relative;
    background-image: radial-gradient(var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.radar-sweep {
    position: absolute;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    border: 1px solid var(--grid);
    animation: rotate 4s linear infinite;
}

.radar-sweep::after {
    content: "";
    position: absolute;
    top: 0;
    left: 50%;
    width: 50%;
    height: 50%;
    background: linear-gradient(to bottom, var(--accent), transparent);
    transform-origin: bottom left;
    transform: rotate(45deg);
}

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* SVG OVERLAY */
#plotter-overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

/* FOOTER */
.telemetry-footer {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 10px;
    background: rgba(9, 17, 28, 0.95);
    border-top: 1px solid var(--grid);
}

.data-box {
    border: 1px solid var(--grid);
    padding: 8px;
    font-size: 12px;
}

.data-box span {
    display: block;
    color: white;
    font-size: 14px;
    margin-top: 4px;
}

.btn-nav {
    grid-column: span 2;
    text-align: center;
    background: var(--grid);
    color: white;
    padding: 10px;
    text-decoration: none;
    border-radius: 6px;
}

/* BLIP ANIMATION */
@keyframes blink {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.2; transform: scale(1.3); }
}

</style>
</head>

<body>

<div class="plotter-canvas">

    <div class="radar-sweep"></div>

    <svg id="plotter-overlay"></svg>

    <div style="text-align:center;font-size:10px;letter-spacing:2px;z-index:2;">
        GRID ACTIVE<br>
        NO TARGETS DETECTED
    </div>

</div>

<div class="telemetry-footer">

    <div class="data-box">
        LAT/LNG
        <span id="latlng-display">--.-- / --.--</span>
    </div>

    <div class="data-box">
        BEARING
        <span id="bearing-display">000°</span>
    </div>

    <a href="home.html" class="btn-nav">RETURN TO FEED</a>

</div>

<script>

const sbClient = supabase.createClient(
    'https://ihroattnnnsckvvbosfz.supabase.co',
    'sb_publishable_M0wwGKR9he08sEfHhZQQxA_vmnXS2eX'
);

/* SESSION CHECK */
const session = JSON.parse(localStorage.getItem("session_user"));

if(!session){
    window.location.href = "login.html";
}

/* BLIP UPDATE */
function updateBlip() {

    const overlay = document.getElementById("plotter-overlay");
    overlay.innerHTML = "";

    const svgNS = "http://www.w3.org/2000/svg";

    const circle = document.createElementNS(svgNS, "circle");

    circle.setAttribute("cx", "50%");
    circle.setAttribute("cy", "50%");
    circle.setAttribute("r", "18");
    circle.setAttribute("stroke", "#ff3333");
    circle.setAttribute("fill", "none");
    circle.setAttribute("stroke-width", "3");

    const animate = document.createElementNS(svgNS, "animate");

    animate.setAttribute("attributeName", "opacity");
    animate.setAttribute("values", "1;0;1");
    animate.setAttribute("dur", "0.9s");
    animate.setAttribute("repeatCount", "indefinite");

    circle.appendChild(animate);
    overlay.appendChild(circle);
}

/* DISTRESS SIGNALS */
sbClient
.channel('distress_signals')
.on('postgres_changes', {
    event: '*',
    schema: 'public',
    table: 'distress_signals'
}, () => {
    updateBlip();
})
.subscribe();

/* GPS */
if(navigator.geolocation){
    navigator.geolocation.watchPosition(pos => {

        document.getElementById("latlng-display").textContent =
        `${pos.coords.latitude.toFixed(2)} / ${pos.coords.longitude.toFixed(2)}`;

    });
}

</script>

</body>
</html>
