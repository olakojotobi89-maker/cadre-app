<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADRE - Initialize Profile</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    </head>
<body>

<div class="app-container">
    <main class="gateway-wrapper">
        <div class="gateway-card">
            <div class="gateway-title-block">
                <img src="Cadre logo png.jpg" alt="CADRE Emblem" class="gateway-emblem">
                <h1 class="gateway-h1">Profile Setup</h1>
                <p class="gateway-p">Initialize Personnel Records</p>
            </div>

            <form id="profile-registration-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" class="form-field" placeholder="e.g. Officer John Doe" required>
                </div>
                <div class="form-group">
                    <label>Assigned Rank</label>
                    <input type="text" id="reg-rank" class="form-field" placeholder="e.g. Inspector" required>
                </div>
                <div class="form-group">
                    <label>Email (For Authentication)</label>
                    <input type="email" id="reg-email" class="form-field" placeholder="operator@cadre.com" required>
                </div>
                <div class="form-group">
                    <label>Security Access Code</label>
                    <input type="password" id="reg-password" class="form-field" placeholder="••••••••" minlength="6" required>
                </div>
                <button type="submit" class="btn-auth-action">Generate System Preview</button>
            </form>

            <div class="gateway-footer-link">
                <span style="color: var(--text-dim);">Already Registered?</span> 
                <a href="login.html">Access System</a>
            </div>
        </div>
    </main>

    </div>

<script>
    const supabaseUrl = 'https://ihroattnnnsckvvbosfz.supabase.co';
    const supabaseKey = 'sb_publishable_M0wwGKR9he08sEfHhZQQxA_vmnXS2eX';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let stagedData = null;

    document.getElementById("profile-registration-form").addEventListener("submit", (e) => {
        e.preventDefault();
        stagedData = {
            name: document.getElementById("reg-name").value,
            rank: document.getElementById("reg-rank").value,
            email: document.getElementById("reg-email").value,
            password: document.getElementById("reg-password").value
        };
        
        // Show preview
        document.getElementById("preview-target-name").textContent = stagedData.name;
        document.getElementById("preview-target-rank").textContent = stagedData.rank;
        document.getElementById("preview-gate-shield").style.display = "flex";
    });

    document.getElementById("confirm-deploy-btn").addEventListener("click", async () => {
        // 1. Sign Up User
        const { data, error } = await supabase.auth.signUp({
            email: stagedData.email,
            password: stagedData.password,
            options: {
                data: {
                    name: stagedData.name,
                    rank: stagedData.rank
                }
            }
        });

        if (error) {
            alert("DEPLOYMENT CRASH: " + error.message);
        } else {
            // Note: Since we set up a Trigger earlier, the 'users' table 
            // will be automatically populated with the profile data!
            alert("SUCCESS: Profile initialized.");
            window.location.href = "login.html";
        }
    });
</script>
</body>
</html>
