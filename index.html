<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADRE - Initialize Profile</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- Preview Overlay Shield Extensions --- */
        .preview-backdrop-shield {
            display: none; /* Controlled via state logic toggle */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 10, 16, 0.95);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 5000;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .preview-window-box {
            width: 100%;
            max-width: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-precision);
            border-radius: var(--radius-sharp);
            padding: 24px 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .preview-alert-banner {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--hud-amber);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-precision);
            padding-bottom: 10px;
        }

        .preview-actions-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-preview-cancel {
            background: transparent;
            border: 1px solid var(--text-dim);
            color: var(--text-dim);
            padding: 12px;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            border-radius: var(--radius-sharp);
            cursor: pointer;
        }

        .btn-preview-confirm {
            background: var(--hud-amber);
            color: var(--bg-deep);
            border: none;
            padding: 12px;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            border-radius: var(--radius-sharp);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-container">
    <main class="gateway-wrapper">
        
        <div class="gateway-card">
            <div class="gateway-title-block">
                <img src="Cadre logo png.jpg" alt="CADRE Emblem" class="gateway-emblem">
                <h1 class="gateway-h1">Profile Setup</h1>
                <p class="gateway-p">Initialize Personnel Records</p>
            </div>

            <form id="profile-registration-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" class="form-field" placeholder="e.g. Officer John Doe" required>
                </div>

                <div class="form-group">
                    <label>Assigned Rank</label>
                    <input type="text" id="reg-rank" class="form-field" placeholder="e.g. Inspector / Specialist" required>
                </div>

                <div class="form-group">
                    <label>Phone Number (Primary Link)</label>
                    <input type="tel" id="reg-phone" class="form-field" placeholder="e.g. 08123456789" required>
                </div>
                
                <div class="form-group">
                    <label>Create Security Access Code</label>
                    <input type="password" id="reg-password" class="form-field" placeholder="••••••••" minlength="6" required>
                </div>

                <button type="submit" class="btn-auth-action">Generate System Preview</button>
            </form>

            <div class="gateway-footer-link">
                <span style="color: var(--text-dim);">Already Registered?</span> 
                <a href="login.html">Access System</a>
            </div>
        </div>

    </main>

    <div id="preview-gate-shield" class="preview-backdrop-shield">
        <div class="preview-window-box">
            <div class="preview-alert-banner">🚨 Review System Assignment Pass</div>
            
            <div class="terminal-data-card" style="margin-bottom: 0;">
                <div class="data-row-entry">
                    <label>Name</label>
                    <span id="preview-target-name">—</span>
                </div>
                <div class="data-row-entry">
                    <label>Rank</label>
                    <span id="preview-target-rank" style="color: var(--hud-amber);">—</span>
                </div>
                <div class="data-row-entry">
                    <label>Phone</label>
                    <span id="preview-target-phone">—</span>
                </div>
            </div>

            <div class="preview-actions-row">
                <button type="button" class="btn-preview-cancel" onclick="closePreviewGate()">Edit Data</button>
                <button type="button" class="btn-preview-confirm" id="confirm-deploy-btn">Confirm & Deploy</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCBLxRU7IeCCk8fyR8f7EwxtEz5Y1pZpn4",
        authDomain: "cadre-c2.firebaseapp.com",
        projectId: "cadre-c2",
        storageBucket: "cadre-c2.firebasestorage.app",
        messagingSenderId: "428369478841",
        appId: "1:428369478841:web:69f2d8068591ef70170768"
    };

    // Initialize Connection Nodes
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let stagedPersonnelRecord = null;

    document.getElementById("profile-registration-form").addEventListener("submit", interceptAndPreview);
    document.getElementById("confirm-deploy-btn").addEventListener("click", commitPersonnelRecord);

    window.closePreviewGate = closePreviewGate;

    async function interceptAndPreview(e) {
        e.preventDefault();
        
        const name = document.getElementById("reg-name").value.trim();
        const rank = document.getElementById("reg-rank").value.trim();
        const phone = document.getElementById("reg-phone").value.replace(/[\s\-\(\)]+/g, '');
        const password = document.getElementById("reg-password").value;

        // Passwords for Firebase Auth must be at least 6 characters
        if (password.length < 6) {
            alert("SECURITY ERROR: Access code must be at least 6 characters long.");
            return;
        }

        try {
            // Check global cloud registry for duplicates
            const userDocRef = doc(db, "users", phone);
            const userSnapshot = await getDoc(userDocRef);
            
            if (userSnapshot.exists()) {
                alert("REGISTRATION FAILURE: Phone coordinates already registered to an active cloud profile.");
                return;
            }

            stagedPersonnelRecord = {
                name: name,
                rank: rank,
                phone: phone,
                password: password, // For cross-verification purposes if needed
                pfp: ""
            };

            document.getElementById("preview-target-name").textContent = name;
            document.getElementById("preview-target-rank").textContent = rank;
            document.getElementById("preview-target-phone").textContent = phone;

            document.getElementById("preview-gate-shield").style.display = "flex";

        } catch (error) {
            console.error("Cloud validation error context: ", error);
            alert("UPLINK FAULT: Unable to verify cloud roster availability. Ensure your Firestore Rules allow testing or read/write access.");
        }
    }

    function closePreviewGate() {
        document.getElementById("preview-gate-shield").style.display = "none";
        stagedPersonnelRecord = null;
    }

    async function commitPersonnelRecord() {
        if (!stagedPersonnelRecord) return;

        const confirmBtn = document.getElementById("confirm-deploy-btn");
        confirmBtn.disabled = true;
        confirmBtn.textContent = "Deploying...";

        try {
            // Create virtual synthetic email format out of the phone number so Firebase Auth accepts it natively
            const syntheticEmail = `${stagedPersonnelRecord.phone}@cadre-c2.local`;

            // Step 1: Register credentials safely inside Firebase Authentication Engine
            const userCredential = await createUserWithEmailAndPassword(auth, syntheticEmail, stagedPersonnelRecord.password);
            
            // Save the phone coordinates safely to local storage so profile.html can read it immediately on redirect
            localStorage.setItem("cached_operator_phone", stagedPersonnelRecord.phone);

            // Step 2: Write account object payload parameters straight down to Firestore collection
            const targetDocRef = doc(db, "users", stagedPersonnelRecord.phone);
            await setDoc(targetDocRef, stagedPersonnelRecord);
            
            alert("SUCCESS: Profile record built on cloud array. Forwarding to validation gate.");
            window.location.href = "login.html";
            
        } catch (error) {
            console.error("Data push runtime error: ", error);
            alert(`DEPLOYMENT CRASH: ${error.message}`);
            confirmBtn.disabled = false;
            confirmBtn.textContent = "Confirm & Deploy";
        }
    }
</script>
</body>
</html>
