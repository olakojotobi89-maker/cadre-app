<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADRE - Communications Feed</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .app-bottom-dock { display: grid !important; grid-template-columns: repeat(6, 1fr) !important; }
        .dock-node-emergency { color: #ff3333 !important; font-weight: 700; }
        .dock-node-emergency .dock-node-glyph { animation: beacon-pulse 1.5s infinite ease-in-out; }
        @keyframes beacon-pulse { 0%, 100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.15); } }
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <div class="brand-wrapper">
            <img src="Cadre logo png.jpg" alt="CADRE" class="brand-logo">
            <span class="brand-text">CADRE HUB</span>
        </div>
        <div id="officer-header-tag" class="header-badge">Loading...</div>
    </header>

    <section class="search-tray">
        <input type="text" id="officer-search" class="search-input" placeholder="SEARCH ACTIVE INDIVIDUALS BY NAME..." oninput="searchPersonnel(this.value)">
    </section>

    <div id="search-dropdown" class="search-results-box"></div>

    <main class="feed-content">
        <section class="composer-card">
            <div class="composer-row">
                <img id="composer-avatar" class="avatar-frame" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 24 24' fill='%23648299'><circle cx='12' cy='8' r='4'/><path d='M12 14c-6.1 0-10 4-10 4v2h20v-2s-3.9-4-10-4z'/></svg>">
                <textarea id="post-input" class="composer-input" placeholder="Enter transmission notes..."></textarea>
            </div>
            <div class="composer-footer">
                <label for="image-upload" class="file-upload-label">📷 Attach Media</label>
                <input type="file" id="image-upload" accept="image/*" style="display: none;" onchange="previewSelectedImage(this)">
                <img id="post-img-preview" class="preview-thumbnail">
                <button type="button" class="btn-post" onclick="submitInstagramPost()">Broadcast</button>
            </div>
        </section>
        <section id="instagram-stream"></section>
    </main>

    <nav class="app-bottom-dock">
        <a href="home.html" class="dock-node active-node"><span class="dock-node-glyph">🏠</span><span>Feed</span></a>
        <a href="ebook.html" class="dock-node"><span class="dock-node-glyph">📖</span><span>eBook</span></a>
        <a href="map.html" class="dock-node"><span class="dock-node-glyph">🗺️</span><span>Map</span></a>
        <a href="profile.html" class="dock-node"><span class="dock-node-glyph">👤</span><span>Profile</span></a>
        <a href="#" class="dock-node" onclick="checkAdminAccess(event)"><span class="dock-node-glyph">⚙️</span><span>Admin</span></a>
        <a href="emergency.html" class="dock-node dock-node-emergency"><span class="dock-node-glyph">🚨</span><span>SOS</span></a>
    </nav>
</div>

<script>
    // FIX: Do not declare 'supabase' again. Use a new variable name.
    const supabaseUrl = 'https://ihroattnnnsckvvbosfz.supabase.co';
    const supabaseKey = 'sb_publishable_M0wwGKR9he08sEfHhZQQxA_vmnXS2eX';
    const sbClient = supabase.createClient(supabaseUrl, supabaseKey);

    let currentSessionOfficer = JSON.parse(localStorage.getItem("session_user"));
    let base64ImageString = "";

    window.addEventListener('DOMContentLoaded', async () => {
        if (!currentSessionOfficer) { window.location.href = "login.html"; return; }
        document.getElementById("officer-header-tag").textContent = currentSessionOfficer.rank;
        
        // Use sbClient here
        const { data } = await sbClient.from('users').select('pfp').eq('phone', currentSessionOfficer.phone).single();
        if (data?.pfp) document.getElementById("composer-avatar").src = data.pfp;

        renderFeed();
        sbClient.channel('public:ig_feed_posts').on('postgres_changes', { event: '*', schema: 'public', table: 'ig_feed_posts' }, renderFeed).subscribe();
    });

    async function renderFeed() {
        const { data: posts } = await sbClient.from('ig_feed_posts').select('*').order('timestamp', { ascending: false });
        // ... (rest of your render logic using sbClient)
        const container = document.getElementById("instagram-stream");
        container.innerHTML = posts?.length ? "" : `<div style="text-align:center; padding:40px; color:var(--text-dim);">NO ARCHIVED LOGS AVAILABLE.</div>`;
        
        posts?.forEach(post => {
            const hasLiked = post.likes?.includes(currentSessionOfficer.phone);
            const article = document.createElement("article");
            article.className = "ig-post";
            article.innerHTML = `...`; // Use your original logic
            container.appendChild(article);
        });
    }

    async function submitInstagramPost() {
        const caption = document.getElementById("post-input").value.trim();
        if (!caption && !base64ImageString) return;
        
        await sbClient.from('ig_feed_posts').insert({
            name: currentSessionOfficer.name,
            rank: currentSessionOfficer.rank,
            phone: currentSessionOfficer.phone,
            caption,
            image: base64ImageString,
            timestamp: Date.now()
        });
        document.getElementById("post-input").value = "";
        base64ImageString = "";
    }

    async function toggleLike(postId) {
        const { data: post } = await sbClient.from('ig_feed_posts').select('likes').eq('id', postId).single();
        // ... (rest of your logic using sbClient)
    }

    async function submitComment(e, postId) {
        e.preventDefault();
        const text = e.target.querySelector(".comment-field").value;
        const { data: post } = await sbClient.from('ig_feed_posts').select('comments').eq('id', postId).single();
        // ... (rest of your logic using sbClient)
    }

    function previewSelectedImage(input) {
        const reader = new FileReader();
        reader.onload = (e) => { base64ImageString = e.target.result; document.getElementById("post-img-preview").src = base64ImageString; document.getElementById("post-img-preview").style.display = "block"; };
        reader.readAsDataURL(input.files[0]);
    }
</script>
</body>
</html>
