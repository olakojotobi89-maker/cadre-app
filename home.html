<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CADRE - Communications Feed</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

.app-bottom-dock{
display:grid !important;
grid-template-columns:repeat(8,1fr) !important;
}

.dock-node-emergency{
color:#ff3333 !important;
font-weight:700;
}

.dock-node-emergency .dock-node-glyph{
animation:beacon-pulse 1.5s infinite ease-in-out;
}

@keyframes beacon-pulse{
0%,100%{ opacity:0.6; transform:scale(1); }
50%{ opacity:1; transform:scale(1.15); }
}

.feed-post-card{
background:#101826;
border:1px solid #1f2937;
border-radius:14px;
margin-bottom:20px;
overflow:hidden;
will-change:transform;
contain:content;
}

/* ── Post header: avatar + name/rank + delete ── */
.feed-post-header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
gap:10px;
}

.feed-post-user{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
flex:1;
min-width:0;
}

/* Profile picture on the post */
.post-avatar{
width:42px;
height:42px;
border-radius:50%;
object-fit:cover;
border:2px solid #1f2937;
flex-shrink:0;
background:#1e293b;
}

.feed-post-user-info{
display:flex;
flex-direction:column;
min-width:0;
}

.feed-post-rank{
font-weight:bold;
color:white;
font-size:14px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.feed-post-name{
font-size:12px;
color:#94a3b8;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.feed-post-caption{
padding:0 14px 14px;
color:white;
line-height:1.5;
word-break:break-word;
}

.feed-post-image{
width:100%;
display:block;
max-height:500px;
object-fit:cover;
background:#1e293b;
min-height:200px;
}

.delete-post-btn{
background:#ff3333;
border:none;
color:white;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
font-size:12px;
font-weight:bold;
flex-shrink:0;
}

/* ── Actions bar ── */
.post-actions{
display:flex;
align-items:center;
gap:10px;
padding:12px 14px;
border-top:1px solid #1f2937;
}

.like-btn{
display:flex;
align-items:center;
gap:6px;
background:#1e293b;
border:1px solid #2563eb;
color:#93c5fd;
padding:8px 16px;
border-radius:20px;
cursor:pointer;
font-weight:600;
font-size:14px;
transition:background 0.2s, color 0.2s, transform 0.1s;
}

.like-btn:hover{
background:#1e3a5f;
}

/* Liked state — filled blue */
.like-btn.liked{
background:#2563eb;
color:white;
border-color:#2563eb;
}

.like-btn.liked:hover{
background:#1d4ed8;
}

.like-btn:disabled{
opacity:0.5;
cursor:not-allowed;
}

.likes-count{
color:#94a3b8;
font-size:13px;
padding:0 14px 12px;
}

/* ── Comment section ── */
.comment-box{
padding:14px;
border-top:1px solid #1f2937;
}

.comment-input-row{
display:flex;
gap:8px;
align-items:center;
margin-bottom:12px;
}

/* Small avatar next to comment input */
.comment-input-avatar{
width:30px;
height:30px;
border-radius:50%;
object-fit:cover;
border:1px solid #1f2937;
flex-shrink:0;
background:#1e293b;
}

.comment-input{
flex:1;
padding:9px 12px;
border:1px solid #1f2937;
border-radius:20px;
background:#0f172a;
color:white;
font-size:14px;
outline:none;
transition:border-color 0.2s;
}

.comment-input:focus{
border-color:#2563eb;
}

.comment-btn{
background:#2563eb;
border:none;
padding:9px 16px;
border-radius:20px;
color:white;
cursor:pointer;
font-weight:bold;
font-size:13px;
flex-shrink:0;
transition:background 0.2s;
}

.comment-btn:hover{ background:#1d4ed8; }
.comment-btn:disabled{ opacity:0.5; cursor:not-allowed; }

/* Individual comment */
.comment-item{
display:flex;
gap:9px;
align-items:flex-start;
margin-top:10px;
}

.comment-avatar{
width:28px;
height:28px;
border-radius:50%;
object-fit:cover;
flex-shrink:0;
background:#1e293b;
border:1px solid #1f2937;
}

.comment-bubble{
background:#1e293b;
padding:9px 12px;
border-radius:12px;
border-top-left-radius:3px;
flex:1;
min-width:0;
}

.comment-author{
font-size:12px;
font-weight:bold;
color:#00f0ff;
margin-bottom:3px;
}

.comment-text{
font-size:13px;
color:#e2e8f0;
line-height:1.4;
word-break:break-word;
}

/* Skeleton loader */
.skeleton-card{
background:#101826;
border:1px solid #1f2937;
border-radius:14px;
margin-bottom:20px;
padding:14px;
}

.skeleton-line{
background:linear-gradient(90deg,#1e293b 25%,#2d3f55 50%,#1e293b 75%);
background-size:200% 100%;
animation:shimmer 1.4s infinite;
border-radius:6px;
height:14px;
margin-bottom:10px;
}

.skeleton-line.wide{ width:70%; }
.skeleton-line.narrow{ width:40%; }

.skeleton-block{
background:linear-gradient(90deg,#1e293b 25%,#2d3f55 50%,#1e293b 75%);
background-size:200% 100%;
animation:shimmer 1.4s infinite;
border-radius:6px;
height:200px;
margin-bottom:10px;
}

@keyframes shimmer{
0%{ background-position:200% 0; }
100%{ background-position:-200% 0; }
}

/* Load-more button */
#load-more-btn{
display:block;
width:100%;
padding:14px;
background:#1e293b;
color:#94a3b8;
border:1px solid #1f2937;
border-radius:14px;
cursor:pointer;
font-size:14px;
margin-bottom:80px;
transition:background 0.2s;
}

#load-more-btn:hover{ background:#2d3f55; color:white; }
#load-more-btn:disabled{ opacity:0.4; cursor:not-allowed; }

</style>
</head>

<body>

<script>

/* ─────────────────────────────────────────────
   SUPABASE + SESSION
───────────────────────────────────────────── */

const supabaseUrl = 'https://ihroattnnnsckvvbosfz.supabase.co';
const supabaseKey = 'sb_publishable_M0wwGKR9he08sEfHhZQQxA_vmnXS2eX';
const sbClient = supabase.createClient(supabaseUrl, supabaseKey);

let currentSessionOfficer = null;
try { currentSessionOfficer = JSON.parse(localStorage.getItem("session_user")); }
catch(e) { currentSessionOfficer = null; }

if (!currentSessionOfficer) window.location.href = "login.html";

let base64ImageString = "";

/* ─────────────────────────────────────────────
   LIKED POSTS — stored globally in post_likes
   table. One row per (post_id, phone).
   likedSet is loaded once on boot from the DB
   and kept in sync so buildPostCard can check
   it synchronously without extra queries.
───────────────────────────────────────────── */

// In-memory set of post IDs this user has liked
// Populated on boot by loadMyLikes()
const likedSet = new Set();

async function loadMyLikes() {
  const phone = currentSessionOfficer?.phone;
  if (!phone) return;

  const { data } = await sbClient
    .from('post_likes')
    .select('post_id')
    .eq('phone', phone);

  if (data) data.forEach(row => likedSet.add(String(row.post_id)));
}

function hasLiked(postId) {
  return likedSet.has(String(postId));
}

async function markLikedInDB(postId) {
  // Insert into post_likes — UNIQUE constraint prevents duplicates at DB level
  await sbClient.from('post_likes').insert({
    post_id: String(postId),
    phone:   currentSessionOfficer.phone
  });
  likedSet.add(String(postId));
}

/* ─────────────────────────────────────────────
   PROFILE PICTURE CACHE
   Avoids re-fetching the same user's pfp on
   every post. Map<phone, pfpUrl|null>
───────────────────────────────────────────── */

const pfpCache = new Map();

async function getPfp(phone) {
  if (!phone) return null;
  if (pfpCache.has(phone)) return pfpCache.get(phone);

  const { data } = await sbClient
    .from('users')
    .select('pfp')
    .eq('phone', phone)
    .maybeSingle();

  const url = data?.pfp || null;
  pfpCache.set(phone, url);
  return url;
}

/* Default avatar SVG used when no pfp is set */
const DEFAULT_AVATAR = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='42' height='42' viewBox='0 0 24 24' fill='%23648299'><circle cx='12' cy='8' r='4'/><path d='M12 14c-6.1 0-10 4-10 4v2h20v-2s-3.9-4-10-4z'/></svg>";

/* ─────────────────────────────────────────────
   PAGINATION STATE
───────────────────────────────────────────── */

const PAGE_SIZE = 10;
let currentPage = 0;
let allLoaded   = false;

const postCache = new Map();

/* ─────────────────────────────────────────────
   REALTIME DEBOUNCE
───────────────────────────────────────────── */

let realtimeDebounceTimer = null;

function scheduleRealtimeRefresh(payload) {
  clearTimeout(realtimeDebounceTimer);
  realtimeDebounceTimer = setTimeout(() => {
    handleRealtimeEvent(payload);
  }, 300);
}

async function handleRealtimeEvent(payload) {
  const { eventType, new: newRow, old: oldRow } = payload;

  if (eventType === 'DELETE') {
    const id = oldRow?.id;
    if (id) {
      postCache.delete(id);
      const el = document.getElementById(`post-${id}`);
      if (el) el.remove();
    }
    return;
  }

  if (eventType === 'INSERT') {
    if (currentPage === 0 || postCache.size < PAGE_SIZE) {
      postCache.set(newRow.id, newRow);
      await prependPostCard(newRow);
    }
    return;
  }

  if (eventType === 'UPDATE') {
    postCache.set(newRow.id, newRow);
    patchPostCard(newRow);
    return;
  }
}

/* ─────────────────────────────────────────────
   BOOT
───────────────────────────────────────────── */

window.addEventListener('DOMContentLoaded', async () => {

  document.getElementById("officer-header-tag").textContent =
    currentSessionOfficer.rank;

  document.getElementById("admin-btn")
    .addEventListener("click", checkAdminAccess);

  // Load this user's likes from DB before rendering posts
  // so like buttons show correct state immediately
  await Promise.all([
    loadProfile(),
    loadMyLikes(),
    loadPostsPage(0)
  ]);

  sbClient
    .channel('public:ig_feed_posts')
    .on('postgres_changes',
        { event: '*', schema: 'public', table: 'ig_feed_posts' },
        scheduleRealtimeRefresh)
    .subscribe();

});

/* ─────────────────────────────────────────────
   LOAD OWN PROFILE (composer avatar)
───────────────────────────────────────────── */

async function loadProfile() {
  const phone = currentSessionOfficer?.phone;
  if (!phone) return;

  const { data } = await sbClient
    .from('users')
    .select('pfp')
    .eq('phone', phone)
    .maybeSingle();

  if (data?.pfp) {
    document.getElementById("composer-avatar").src = data?.pfp;
    pfpCache.set(phone, data.pfp); // seed cache
  }
}

/* ─────────────────────────────────────────────
   LOAD A PAGE OF POSTS
───────────────────────────────────────────── */

async function loadPostsPage(page) {
  const container = document.getElementById("instagram-stream");

  if (page === 0) showSkeletons(container, 3);

  const from = page * PAGE_SIZE;
  const to   = from + PAGE_SIZE - 1;

  const { data: posts, error } = await sbClient
    .from('ig_feed_posts')
    .select('*')
    .order('timestamp', { ascending: false })
    .range(from, to);

  if (page === 0) container.innerHTML = '';

  if (error) {
    const code    = error.code    || 'unknown';
    const message = error.message || JSON.stringify(error);
    const hint    = error.hint    || '';

    let advice = '';
    if (code === '42501' || message.includes('permission') || message.includes('policy')) {
      advice = '<br><br><strong>Likely cause:</strong> RLS policy missing on <code>ig_feed_posts</code>.';
    } else if (code === '42P01' || message.includes('does not exist')) {
      advice = '<br><br><strong>Likely cause:</strong> Table <code>ig_feed_posts</code> not found.';
    }

    container.innerHTML = `
      <div style="padding:20px;color:#ff6b6b;background:#1a0a0a;border-radius:12px;border:1px solid #ff3333;font-size:13px;line-height:1.7;">
        <strong>FAILED TO LOAD POSTS</strong><br>
        Code: <code>${code}</code><br>
        Message: <code>${message}</code><br>
        ${hint ? `Hint: <code>${hint}</code>` : ''}
        ${advice}
      </div>`;
    return;
  }

  if (!posts || posts.length === 0) {
    if (page === 0) {
      container.innerHTML = `<div style="text-align:center;padding:40px;color:#666;">NO ARCHIVED LOGS AVAILABLE.</div>`;
    }
    allLoaded = true;
    document.getElementById("load-more-btn").style.display = 'none';
    return;
  }

  // Build all cards, fetching pfps in parallel
  const fragment = document.createDocumentFragment();
  const cards = await Promise.all(posts.map(async post => {
    postCache.set(post.id, post);
    return await buildPostCard(post);
  }));
  cards.forEach(card => fragment.appendChild(card));
  container.appendChild(fragment);

  allLoaded = posts.length < PAGE_SIZE;
  currentPage = page;

  const loadMoreBtn = document.getElementById("load-more-btn");
  loadMoreBtn.style.display = allLoaded ? 'none' : 'block';
  loadMoreBtn.disabled = false;
  loadMoreBtn.textContent = 'Load more posts';
}

async function loadMorePosts() {
  if (allLoaded) return;
  const btn = document.getElementById("load-more-btn");
  btn.disabled = true;
  btn.textContent = 'Loading...';
  await loadPostsPage(currentPage + 1);
}

/* ─────────────────────────────────────────────
   BUILD POST CARD
───────────────────────────────────────────── */

async function buildPostCard(post) {
  const canDelete = currentSessionOfficer?.phone === post.phone;
  const likes     = Number(post.likes ?? 0);
  const comments  = Array.isArray(post.comments) ? post.comments : [];
  const alreadyLiked = hasLiked(post.id);

  // Fetch poster's profile picture (cached after first fetch)
  const pfpUrl = await getPfp(post.phone);

  const article = document.createElement('article');
  article.className = 'feed-post-card';
  article.id = `post-${post.id}`;

  /* ── Header: avatar + name/rank ── */
  const header = document.createElement('div');
  header.className = 'feed-post-header';

  const userDiv = document.createElement('div');
  userDiv.className = 'feed-post-user';
  userDiv.onclick = () => openProfile(post.phone);

  // Profile picture
  const avatar = document.createElement('img');
  avatar.className = 'post-avatar';
  avatar.src = pfpUrl || DEFAULT_AVATAR;
  avatar.alt = post.name || 'Operator';
  avatar.loading = 'lazy';
  userDiv.appendChild(avatar);

  // Name + rank text
  const userInfo = document.createElement('div');
  userInfo.className = 'feed-post-user-info';
  userInfo.innerHTML = `
    <span class="feed-post-rank">${escHtml(post.rank || 'UNIT')}</span>
    <span class="feed-post-name">${escHtml(post.name || 'UNKNOWN')}</span>
  `;
  userDiv.appendChild(userInfo);
  header.appendChild(userDiv);

  if (canDelete) {
    const delBtn = document.createElement('button');
    delBtn.className = 'delete-post-btn';
    delBtn.textContent = 'Delete';
    delBtn.onclick = () => deletePost(post.id);
    header.appendChild(delBtn);
  }

  article.appendChild(header);

  /* ── Caption ── */
  if (post.caption) {
    const cap = document.createElement('div');
    cap.className = 'feed-post-caption';
    cap.textContent = post.caption;
    article.appendChild(cap);
  }

  /* ── Image ── */
  if (post.image) {
    const img = document.createElement('img');
    img.className = 'feed-post-image';
    img.loading  = 'lazy';
    img.decoding = 'async';
    img.src = post.image;
    img.alt = 'Post media';
    article.appendChild(img);
  }

  /* ── Actions: Like button ── */
  const actions = document.createElement('div');
  actions.className = 'post-actions';

  const likeBtn = document.createElement('button');
  likeBtn.className  = 'like-btn' + (alreadyLiked ? ' liked' : '');
  likeBtn.id         = `like-btn-${post.id}`;
  likeBtn.innerHTML  = alreadyLiked ? '👍 Liked' : '👍 Like';
  likeBtn.disabled   = alreadyLiked; // can't like again
  likeBtn.onclick    = () => likePost(post.id);
  actions.appendChild(likeBtn);
  article.appendChild(actions);

  /* ── Likes count ── */
  const likesDiv = document.createElement('div');
  likesDiv.className = 'likes-count';
  likesDiv.id        = `likes-count-${post.id}`;
  likesDiv.textContent = `${likes} ${likes === 1 ? 'Like' : 'Likes'}`;
  article.appendChild(likesDiv);

  /* ── Comment section ── */
  const commentBox = document.createElement('div');
  commentBox.className = 'comment-box';

  // Input row with current user's avatar
  const myPfp = pfpCache.get(currentSessionOfficer?.phone) || DEFAULT_AVATAR;

  const inputRow = document.createElement('div');
  inputRow.className = 'comment-input-row';

  const myAvatar = document.createElement('img');
  myAvatar.className = 'comment-input-avatar';
  myAvatar.src = myPfp;
  myAvatar.alt = 'You';
  inputRow.appendChild(myAvatar);

  const commentInput = document.createElement('input');
  commentInput.type        = 'text';
  commentInput.id          = `comment-${post.id}`;
  commentInput.className   = 'comment-input';
  commentInput.placeholder = 'Write a comment...';
  commentInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addComment(post.id);
  });
  inputRow.appendChild(commentInput);

  const commentBtn = document.createElement('button');
  commentBtn.className   = 'comment-btn';
  commentBtn.id          = `comment-btn-${post.id}`;
  commentBtn.textContent = 'Post';
  commentBtn.onclick     = () => addComment(post.id);
  inputRow.appendChild(commentBtn);

  commentBox.appendChild(inputRow);

  // Comments list
  const commentsContainer = document.createElement('div');
  commentsContainer.id = `comments-list-${post.id}`;
  await renderCommentsList(commentsContainer, comments);
  commentBox.appendChild(commentsContainer);

  article.appendChild(commentBox);

  return article;
}

/* ─────────────────────────────────────────────
   PATCH — targeted DOM update only
───────────────────────────────────────────── */

function patchPostCard(post) {
  const likesEl = document.getElementById(`likes-count-${post.id}`);
  if (likesEl) {
    const n = Number(post.likes ?? 0);
    likesEl.textContent = `${n} ${n === 1 ? 'Like' : 'Likes'}`;
  }

  const commentsEl = document.getElementById(`comments-list-${post.id}`);
  if (commentsEl) {
    const comments = Array.isArray(post.comments) ? post.comments : [];
    renderCommentsList(commentsEl, comments);
  }
}

/* ─────────────────────────────────────────────
   RENDER COMMENTS LIST
   Comment format stored in DB: "Name||rank||text"
   Legacy format (plain string): shown as-is
───────────────────────────────────────────── */

async function renderCommentsList(container, comments) {
  container.innerHTML = '';
  if (!comments || comments.length === 0) return;

  const frag = document.createDocumentFragment();

  for (const c of comments) {
    const item = document.createElement('div');
    item.className = 'comment-item';

    // Parse structured comment format: "name||phone||text"
    // Falls back gracefully to legacy plain string
    let authorName = '';
    let authorPhone = '';
    let commentText = c;

    if (typeof c === 'string' && c.includes('||')) {
      const parts = c.split('||');
      authorName  = parts[0] || '';
      authorPhone = parts[1] || '';
      commentText = parts[2] || '';
    }

    // Avatar
    const avatarImg = document.createElement('img');
    avatarImg.className = 'comment-avatar';
    avatarImg.alt = authorName || 'Operator';
    if (authorPhone) {
      const pfp = await getPfp(authorPhone);
      avatarImg.src = pfp || DEFAULT_AVATAR;
    } else {
      avatarImg.src = DEFAULT_AVATAR;
    }
    item.appendChild(avatarImg);

    // Bubble
    const bubble = document.createElement('div');
    bubble.className = 'comment-bubble';

    if (authorName) {
      const nameEl = document.createElement('div');
      nameEl.className = 'comment-author';
      nameEl.textContent = authorName;
      bubble.appendChild(nameEl);
    }

    const textEl = document.createElement('div');
    textEl.className = 'comment-text';
    textEl.textContent = commentText;
    bubble.appendChild(textEl);

    item.appendChild(bubble);
    frag.appendChild(item);
  }

  container.appendChild(frag);
}

/* Prepend a new post card at the top */
async function prependPostCard(post) {
  const container = document.getElementById("instagram-stream");
  const card = await buildPostCard(post);
  card.style.opacity   = '0';
  card.style.transform = 'translateY(-12px)';
  card.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
  container.prepend(card);
  requestAnimationFrame(() => {
    card.style.opacity   = '1';
    card.style.transform = 'translateY(0)';
  });
}

/* ─────────────────────────────────────────────
   SKELETON LOADER
───────────────────────────────────────────── */

function showSkeletons(container, count) {
  container.innerHTML = '';
  for (let i = 0; i < count; i++) {
    container.innerHTML += `
      <div class="skeleton-card">
        <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;">
          <div style="width:42px;height:42px;border-radius:50%;background:linear-gradient(90deg,#1e293b 25%,#2d3f55 50%,#1e293b 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;flex-shrink:0;"></div>
          <div style="flex:1;"><div class="skeleton-line narrow"></div><div class="skeleton-line" style="width:50%;"></div></div>
        </div>
        <div class="skeleton-block"></div>
        <div class="skeleton-line narrow"></div>
      </div>`;
  }
}

/* ─────────────────────────────────────────────
   POST — CREATE
───────────────────────────────────────────── */

async function submitInstagramPost() {
  const caption    = document.getElementById("post-input").value.trim();
  const imageValue = base64ImageString || null;

  if (!caption && !imageValue) {
    alert("Write something or add image");
    return;
  }

  const postBtn = document.querySelector('.btn-post');
  postBtn.disabled = true;
  postBtn.textContent = 'Sending...';

  const { error } = await sbClient
    .from('ig_feed_posts')
    .insert({
      name:      currentSessionOfficer.name,
      rank:      currentSessionOfficer.rank,
      phone:     currentSessionOfficer.phone,
      caption,
      image:     imageValue,
      likes:     0,
      comments:  [],
      timestamp: Date.now()
    });

  postBtn.disabled = false;
  postBtn.textContent = 'Broadcast';

  if (error) {
    console.error("POST ERROR:", error);
    alert("Post failed");
    return;
  }

  document.getElementById("post-input").value = "";
  base64ImageString = "";
  const preview = document.getElementById("post-img-preview");
  preview.src = "";
  preview.style.display = "none";
}

/* ─────────────────────────────────────────────
   POST — DELETE
───────────────────────────────────────────── */

async function deletePost(postId) {
  await sbClient.from('ig_feed_posts').delete().eq('id', postId);
}

/* ─────────────────────────────────────────────
   POST — LIKE (one like per user)
───────────────────────────────────────────── */

async function likePost(postId) {
  // Guard: already liked
  if (hasLiked(postId)) return;

  const btn = document.getElementById(`like-btn-${postId}`);
  if (btn) btn.disabled = true;

  const cached   = postCache.get(postId);
  const oldLikes = Number(cached?.likes ?? 0);
  const newLikes = oldLikes + 1;

  // Optimistic UI
  const likesEl = document.getElementById(`likes-count-${postId}`);
  if (likesEl) likesEl.textContent = `${newLikes} ${newLikes === 1 ? 'Like' : 'Likes'}`;

  const { error } = await sbClient
    .from('ig_feed_posts')
    .update({ likes: newLikes })
    .eq('id', postId);

  if (error) {
    console.error("LIKE ERROR:", error);
    if (likesEl) likesEl.textContent = `${oldLikes} ${oldLikes === 1 ? 'Like' : 'Likes'}`;
    if (btn) btn.disabled = false;
    return;
  }

  // Save to global DB + in-memory set
  await markLikedInDB(postId);
  if (cached) cached.likes = newLikes;

  if (btn) {
    btn.classList.add('liked');
    btn.innerHTML = '👍 Liked';
    btn.disabled  = true; // one like per user — permanently disabled
  }
}

/* ─────────────────────────────────────────────
   POST — COMMENT
   Stores as "name||phone||text" so the name
   and avatar can be shown on all users' screens
───────────────────────────────────────────── */

async function addComment(postId) {
  const input = document.getElementById(`comment-${postId}`);
  const text  = input.value.trim();
  if (!text) return;

  const btn = document.getElementById(`comment-btn-${postId}`);
  if (btn) btn.disabled = true;

  const cached   = postCache.get(postId);
  const comments = Array.isArray(cached?.comments) ? [...cached.comments] : [];

  // Format: "name||phone||text"
  const commentEntry = `${currentSessionOfficer.name}||${currentSessionOfficer.phone}||${text}`;
  comments.push(commentEntry);

  const { error } = await sbClient
    .from('ig_feed_posts')
    .update({ comments })
    .eq('id', postId);

  if (btn) btn.disabled = false;

  if (error) {
    console.error("COMMENT ERROR:", error);
    return;
  }

  if (cached) cached.comments = comments;

  const commentsContainer = document.getElementById(`comments-list-${postId}`);
  if (commentsContainer) await renderCommentsList(commentsContainer, comments);

  input.value = "";
}

function openProfile(phone) {
  window.location.href = `profile.html?phone=${encodeURIComponent(phone)}`;
}

function checkAdminAccess(event) {
  event.preventDefault();
  const password = prompt("ENTER COMMANDER AUTHORIZATION CODE:");
  if (password === "CDR123") {
    window.location.href = "admin.html";
  } else if (password !== null) {
    alert("ACCESS DENIED");
  }
}

function previewSelectedImage(input) {
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    base64ImageString = e.target.result;
    const preview = document.getElementById("post-img-preview");
    preview.src = base64ImageString;
    preview.style.display = "block";
  };
  reader.readAsDataURL(input.files[0]);
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}
