<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADRE - Communications Feed</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- Tactical Navigation Extensions --- */
        .app-bottom-dock {
            display: grid !important;
            grid-template-columns: repeat(6, 1fr) !important; /* Expanded dock grid for 6 tactical elements */
        }
        
        .dock-node-emergency {
            color: #ff3333 !important; /* Vivid Crimson Highlight color */
            font-weight: 700;
        }
        
        .dock-node-emergency .dock-node-glyph {
            animation: beacon-pulse 1.5s infinite ease-in-out;
        }

        @keyframes beacon-pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.15); }
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <header class="app-header">
        <div class="brand-wrapper">
            <img src="Cadre logo png.jpg" alt="CADRE" class="brand-logo">
            <span class="brand-text">CADRE HUB</span>
        </div>
        <div id="officer-header-tag" class="header-badge">Loading...</div>
    </header>

    <section class="search-tray">
        <input type="text" id="officer-search" class="search-input" placeholder="SEARCH ACTIVE INDIVIDUALS BY NAME..." oninput="searchPersonnel(this.value)">
    </section>

    <div id="search-dropdown" class="search-results-box"></div>

    <main class="feed-content">
        <section class="composer-card">
            <div class="composer-row">
                <img id="composer-avatar" class="avatar-frame" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 24 24' fill='%23648299'><circle cx='12' cy='8' r='4'/><path d='M12 14c-6.1 0-10 4-10 4v2h20v-2s-3.9-4-10-4z'/></svg>">
                <textarea id="post-input" class="composer-input" placeholder="Enter transmission notes..."></textarea>
            </div>
            <div class="composer-footer">
                <label for="image-upload" class="file-upload-label">📷 Attach Media</label>
                <input type="file" id="image-upload" accept="image/*" style="display: none;" onchange="previewSelectedImage(this)">
                <img id="post-img-preview" class="preview-thumbnail">
                <button type="button" class="btn-post" onclick="submitInstagramPost()">Broadcast</button>
            </div>
        </section>

        <section id="instagram-stream"></section>
    </main>

    <nav class="app-bottom-dock">
        <a href="home.html" class="dock-node active-node"><span class="dock-node-glyph">🏠</span><span>Feed</span></a>
        <a href="ebook.html" class="dock-node"><span class="dock-node-glyph">📖</span><span>eBook</span></a>
        <a href="map.html" class="dock-node"><span class="dock-node-glyph">🗺️</span><span>Map</span></a>
        <a href="profile.html" class="dock-node"><span class="dock-node-glyph">👤</span><span>Profile</span></a>
        <a href="#" class="dock-node" onclick="checkAdminAccess(event)"><span class="dock-node-glyph">⚙️</span><span>Admin</span></a>
        <a href="emergency.html" class="dock-node dock-node-emergency"><span class="dock-node-glyph">🚨</span><span>SOS</span></a>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, setDoc, onSnapshot, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

    // Your verified web app's Firebase configuration coordinates
    const firebaseConfig = {
        apiKey: "AIzaSyCBLxRU7IeCCk8fyR8f7EwxtEz5Y1pZpn4",
        authDomain: "cadre-c2.firebaseapp.com",
        projectId: "cadre-c2",
        storageBucket: "cadre-c2.firebasestorage.app",
        messagingSenderId: "428369478841",
        appId: "1:428369478841:web:69f2d8068591ef70170768"
    };

    // Initialize Connection Nodes
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentSessionOfficer = null;
    let base64ImageString = "";

    // Expose tactical features to layout action buttons
    window.checkAdminAccess = checkAdminAccess;
    window.previewSelectedImage = previewSelectedImage;
    window.submitInstagramPost = submitInstagramPost;
    window.toggleLike = toggleLike;
    window.submitComment = submitComment;
    window.searchPersonnel = searchPersonnel;

    window.addEventListener('DOMContentLoaded', async () => {
        const sessionData = localStorage.getItem("session_user");
        if (!sessionData) {
            window.location.href = "login.html";
            return;
        }
        currentSessionOfficer = JSON.parse(sessionData);
        document.getElementById("officer-header-tag").textContent = currentSessionOfficer.rank;

        // Pull active user profile avatar signature from Firestore
        try {
            const userDocRef = doc(db, "users", currentSessionOfficer.phone);
            const userSnap = await getDoc(userDocRef);
            if (userSnap.exists() && userSnap.data().pfp) {
                document.getElementById("composer-avatar").src = userSnap.data().pfp;
            }
        } catch (err) {
            console.error("Avatar streaming error: ", err);
        }

        // Establish real-time listener link for active feeds
        listenToLiveBroadcastFeed();
    });

    /* --- Secure Admin Gateway Interceptor --- */
    function checkAdminAccess(event) {
        event.preventDefault();
        if (!currentSessionOfficer) return;

        if (currentSessionOfficer.phone === "ADMIN_NODE" || currentSessionOfficer.name === "Cadre") {
            window.location.href = "admin.html";
            return;
        }

        const accessPasskey = prompt("ENTER MASTER CRYPTO-KEY FOR ADMINISTRATIVE CLEARANCE:");
        if (accessPasskey === "CDR123") {
            window.location.href = "admin.html";
        } else if (accessPasskey !== null) {
            alert("ACCESS DENIED: INVALID SECURE NODE AUTHENTICATION TOKEN.");
        }
    }

    function previewSelectedImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                base64ImageString = e.target.result;
                const preview = document.getElementById("post-img-preview");
                preview.src = base64ImageString;
                preview.style.display = "block";
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    /* --- Real-Time Broadcast Stream Synchronization Engine --- */
    function listenToLiveBroadcastFeed() {
        const container = document.getElementById("instagram-stream");
        const feedQuery = query(collection(db, "ig_feed_posts"), orderBy("timestamp", "asc"));

        onSnapshot(feedQuery, (snapshot) => {
            container.innerHTML = "";
            
            if (snapshot.empty) {
                container.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-dim); font-size:0.8rem;">NO ARCHIVED LOGS AVAILABLE.</div>`;
                return;
            }

            // Reverse visual stack order natively to show freshest updates at top
            const documents = [];
            snapshot.forEach(doc => documents.push({ id: doc.id, ...doc.data() }));
            
            documents.reverse().forEach((post) => {
                const pfpSrc = post.pfp ? post.pfp : "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 24 24' fill='%23648299'><circle cx='12' cy='8' r='4'/><path d='M12 14c-6.1 0-10 4-10 4v2h20v-2s-3.9-4-10-4z'/></svg>";

                let commentsMarkup = "";
                if (post.comments && post.comments.length > 0) {
                    post.comments.forEach(c => {
                        commentsMarkup += `
                            <div class="comment-row">
                                <span class="comment-author">${escapeHTML(c.name)}:</span>
                                <span>${escapeHTML(c.text)}</span>
                            </div>`;
                    });
                }

                const mediaSection = post.image ? `<div class="ig-post-media-frame"><img src="${post.image}" class="ig-post-img"></div>` : '';
                const hasLiked = post.likes && post.likes.includes(currentSessionOfficer.phone);

                const article = document.createElement("article");
                article.className = "ig-post";
                article.innerHTML = `
                    <div class="ig-post-header">
                        <div class="ig-post-profile">
                            <img src="${pfpSrc}" class="avatar-frame">
                            <div class="meta-details">
                                <span class="meta-name">${escapeHTML(post.name)}</span>
                                <span class="meta-rank">${escapeHTML(post.rank)}</span>
                            </div>
                        </div>
                    </div>
                    ${mediaSection}
                    <div class="ig-post-actions">
                        <button class="action-glyph" onclick="toggleLike('${post.id}')">${hasLiked ? '❤️' : '🤍'}</button>
                    </div>
                    <div class="ig-post-data">
                        <div class="likes-count">${post.likes ? post.likes.length : 0} CONFIRMATIONS</div>
                        <div class="caption-block">
                            <span class="caption-author">${escapeHTML(post.name)}</span>${escapeHTML(post.caption)}
                        </div>
                        <div class="comments-box">${commentsMarkup}</div>
                        <form class="comment-input-form" onsubmit="submitComment(event, '${post.id}')">
                            <input type="text" class="comment-field" placeholder="Append encryption note..." required>
                            <button type="submit" class="comment-submit-btn">Send</button>
                        </form>
                    </div>
                `;
                container.appendChild(article);
            });
        });
    }

    async function submitInstagramPost() {
        const captionText = document.getElementById("post-input").value.trim();
        if (!captionText && !base64ImageString) return;

        try {
            // Get current user data to ensure avatar link matches newest profile adjustments
            const userDocRef = doc(db, "users", currentSessionOfficer.phone);
            const userSnap = await getDoc(userDocRef);
            const latestPfp = (userSnap.exists() && userSnap.data().pfp) ? userSnap.data().pfp : "";

            const newPost = {
                name: currentSessionOfficer.name,
                rank: currentSessionOfficer.rank,
                phone: currentSessionOfficer.phone,
                pfp: latestPfp,
                caption: captionText,
                image: base64ImageString,
                likes: [],
                comments: [],
                timestamp: Date.now()
            };

            await addDoc(collection(db, "ig_feed_posts"), newPost);

            document.getElementById("post-input").value = "";
            document.getElementById("post-img-preview").style.display = "none";
            base64ImageString = "";

        } catch (error) {
            console.error("Transmission upload crashed: ", error);
            alert("BROADCAST ERROR: System uplink interrupted.");
        }
    }

    async function toggleLike(postId) {
        try {
            const postRef = doc(db, "ig_feed_posts", postId);
            const postSnap = await getDoc(postRef);
            if (!postSnap.exists()) return;

            const postData = postSnap.data();
            let currentLikes = postData.likes || [];
            const userIdx = currentLikes.indexOf(currentSessionOfficer.phone);

            if (userIdx > -1) {
                currentLikes.splice(userIdx, 1);
            } else {
                currentLikes.push(currentSessionOfficer.phone);
            }

            await setDoc(postRef, { likes: currentLikes }, { merge: true });
        } catch (err) {
            console.error("Like toggle pipeline error: ", err);
        }
    }

    async function submitComment(e, postId) {
        e.preventDefault();
        const inputField = e.target.querySelector(".comment-field");
        const textValue = inputField.value.trim();
        if (!textValue) return;

        try {
            const postRef = doc(db, "ig_feed_posts", postId);
            const postSnap = await getDoc(postRef);
            if (!postSnap.exists()) return;

            let currentComments = postSnap.data().comments || [];
            currentComments.push({
                name: currentSessionOfficer.name,
                text: textValue
            });

            await setDoc(postRef, { comments: currentComments }, { merge: true });
            inputField.value = "";
        } catch (err) {
            console.error("Comment delivery failed: ", err);
        }
    }

    /* --- Live Search Registry Engine --- */
    async function searchPersonnel(queryStr) {
        const dropdown = document.getElementById("search-dropdown");
        const cleanQuery = queryStr.toLowerCase().trim();
        dropdown.innerHTML = "";

        if (!cleanQuery) {
            dropdown.style.display = "none";
            return;
        }

        try {
            // Querying the cloud database 'users' collection
            const usersRef = collection(db, "users");
            const snapshot = await getDocs(usersRef);
            let hitsFound = false;

            snapshot.forEach((userDoc) => {
                const user = userDoc.data();
                if (user.name && user.name.toLowerCase().includes(cleanQuery)) {
                    hitsFound = true;
                    const pfpSrc = user.pfp ? user.pfp : "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 24 24' fill='%23648299'><circle cx='12' cy='8' r='4'/><path d='M12 14c-6.1 0-10 4-10 4v2h20v-2s-3.9-4-10-4z'/></svg>";
                    
                    const row = document.createElement("div");
                    row.className = "search-user-row";
                    row.innerHTML = `
                        <img src="${pfpSrc}" class="avatar-frame">
                        <div class="meta-details">
                            <span class="meta-name">${escapeHTML(user.name)}</span>
                            <span class="meta-rank">${escapeHTML(user.rank)}</span>
                        </div>
                    `;
                    dropdown.appendChild(row);
                }
            });

            dropdown.style.display = hitsFound ? "block" : "none";

        } catch (err) {
            console.error("Personnel index query breakdown: ", err);
        }
    }

    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
    }
</script>
</body>
</html>
