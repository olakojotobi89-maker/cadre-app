<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADRE - Tactical Distress Portal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- Tactical Emergency System Overrides --- */
        :root {
            --hud-crimson: #ff3333;
            --hud-crimson-glow: rgba(255, 51, 51, 0.4);
            --bg-dark-surface: #0b111a;
            --hud-emerald: #4caf50;
        }

        .emergency-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            padding: 16px;
            margin-bottom: 60px;
        }

        .panic-card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-surface);
            border: 2px solid var(--hud-crimson);
            border-radius: var(--radius-sharp);
            padding: 24px 20px;
            box-shadow: 0 0 30px var(--hud-crimson-glow);
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        .panic-card.status-safe {
            border-color: var(--hud-emerald);
            box-shadow: 0 0 30px rgba(76, 175, 80, 0.3);
        }

        .panic-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--hud-crimson);
            animation: pulse-border 1.5s infinite;
        }

        .panic-card.status-safe::before {
            background: var(--hud-emerald);
            animation: none;
        }

        .sos-trigger-container {
            margin: 40px auto;
            position: relative;
            width: 160px;
            height: 160px;
        }

        .btn-sos-trigger {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, #ff1a1a 0%, #990000 100%);
            border: 4px solid #fff;
            color: #fff;
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            outline: none;
            position: relative;
            z-index: 5;
            transition: all 0.3s ease;
        }

        .active-alert .btn-sos-trigger {
            background: radial-gradient(circle, #330000 0%, #ff1a1a 100%);
            box-shadow: 0 0 25px var(--hud-crimson);
        }

        .sos-pulse-wave {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--hud-crimson);
            opacity: 0.6;
            z-index: 1;
        }

        .active-alert .sos-pulse-wave-1 {
            animation: pulse-wave 2s infinite linear;
        }
        .active-alert .sos-pulse-wave-2 {
            animation: pulse-wave 2s infinite linear 1s;
        }

        .telemetry-console {
            background: var(--bg-dark-surface);
            border: 1px solid var(--border-precision);
            border-radius: 4px;
            padding: 12px;
            font-family: monospace;
            font-size: 0.75rem;
            text-align: left;
            color: var(--text-dim);
            max-height: 140px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .telemetry-line {
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }

        .telemetry-line span.status-active {
            color: var(--hud-amber);
            font-weight: bold;
        }

        .telemetry-line span.status-critical {
            color: var(--hud-crimson);
            font-weight: bold;
            animation: blink 1s infinite;
        }

        .telemetry-line span.status-resolved {
            color: var(--hud-emerald);
            font-weight: bold;
        }

        .back-nav {
            margin-top: 15px;
            font-size: 0.85rem;
        }

        @keyframes pulse-wave {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        @keyframes pulse-border {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .app-bottom-dock {
            display: grid !important;
            grid-template-columns: repeat(4, 1fr) !important;
        }
        
        .dock-node-emergency.active-node {
            color: #ff3333 !important;
            border-top: 2px solid #ff3333 !important;
        }
        
        .dock-node-emergency .dock-node-glyph {
            animation: beacon-pulse 1.5s infinite ease-in-out;
        }

        @keyframes beacon-pulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.15); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <main class="emergency-wrapper">
        
        <div class="panic-card" id="panic-panel">
            <div class="gateway-title-block">
                <h1 class="gateway-h1" id="beacon-headline" style="color: var(--hud-crimson);">DISTRESS TRANSMITTER</h1>
                <p class="gateway-p" id="beacon-subline">Emergency Command Beacon Network</p>
            </div>

            <div class="sos-trigger-container" id="sos-container">
                <div class="sos-pulse-wave sos-pulse-wave-1"></div>
                <div class="sos-pulse-wave sos-pulse-wave-2"></div>
                <button type="button" class="btn-sos-trigger" id="action-btn" onclick="handleSosInteraction()">SOS</button>
            </div>

            <div class="telemetry-console" id="console-logs">
                <div class="telemetry-line"><span>> BEACON STATUS:</span><span style="color: var(--hud-emerald);">STANDBY</span></div>
                <div class="telemetry-line"><span>> LOCAL TELEMETRY:</span><span>COORD LOCK VACANT</span></div>
            </div>

            <div class="back-nav">
                <a href="home.html" style="color: var(--text-dim); text-decoration: none;">← Abort & Return to Feed</a>
            </div>
        </div>

    </main>

    <nav class="app-bottom-dock">
        <a href="home.html" class="dock-node"><span class="dock-node-glyph">🏠</span><span>Feed</span></a>
        <a href="ebook.html" class="dock-node"><span class="dock-node-glyph">📖</span><span>eBook</span></a>
        <a href="profile.html" class="dock-node"><span class="dock-node-glyph">👤</span><span>Profile</span></a>
        <a href="emergency.html" class="dock-node dock-node-emergency active-node"><span class="dock-node-glyph">🚨</span><span>SOS</span></a>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCBLxRU7IeCCk8fyR8f7EwxtEz5Y1pZpn4",
        authDomain: "cadre-c2.firebaseapp.com",
        projectId: "cadre-c2",
        storageBucket: "cadre-c2.firebasestorage.app",
        messagingSenderId: "428369478841",
        appId: "1:428369478841:web:69f2d8068591ef70170768"
    };

    // Initialize Connection Nodes
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentSessionOfficer = null;
    let isAlertActive = false;
    let watchId = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let micIntervalId = null;

    // CRITICAL FIX: Bind the interaction handler IMMEDIATELY to the window object
    window.handleSosInteraction = handleSosInteraction;

    // Run session mapping as soon as script mounts
    (async function initSession() {
        // Fallback checks across both historical storage key formats
        let savedPhone = localStorage.getItem("cached_operator_phone");
        
        if (!savedPhone) {
            const oldSession = localStorage.getItem("session_user");
            if (oldSession) {
                try {
                    const parsed = JSON.parse(oldSession);
                    savedPhone = parsed.phone;
                } catch(e) {}
            }
        }

        if (!savedPhone) {
            logToConsole("NO CRYPTO PHONE SIGNATURE. REDIRECTING...", "status-critical");
            setTimeout(() => { window.location.href = "login.html"; }, 2000);
            return;
        }
        
        logToConsole("CONNECTING SECURE IDENT NODE...", "status-active");
        
        try {
            const docRef = doc(db, "users", savedPhone);
            const docSnap = await getDoc(docRef);
            
            if (docSnap.exists()) {
                currentSessionOfficer = docSnap.data();
                logToConsole(`OPERATOR IDENTIFIED: ${currentSessionOfficer.name.toUpperCase()}`, "status-resolved");
            } else {
                logToConsole("PROFILE SIG MISSING IN CLOUD. CREATING LOCAL REF...", "status-active");
                currentSessionOfficer = { phone: savedPhone, name: "Field Agent", rank: "Operational Operator" };
            }
        } catch (err) {
            console.error(err);
            logToConsole("OFFLINE MODE FORCED: NETWORK UPLINK FAILURE", "status-active");
            currentSessionOfficer = { phone: savedPhone, name: "Field Agent", rank: "Operational Operator" };
        }
    })();

    function logToConsole(message, statusClass = '') {
        const consoleBox = document.getElementById("console-logs");
        if (!consoleBox) return;
        const line = document.createElement("div");
        line.className = "telemetry-line";
        line.innerHTML = `<span>> ${message}</span><span class="${statusClass}">${statusClass ? statusClass.replace('status-', '').toUpperCase() : ''}</span>`;
        consoleBox.appendChild(line);
        consoleBox.scrollTop = consoleBox.scrollHeight;
    }

    function handleSosInteraction() {
        // If profile authentication takes a second, create an immediate temporary backup object so the button works natively
        if (!currentSessionOfficer) {
            const fallbackPhone = localStorage.getItem("cached_operator_phone") || "0000000000";
            currentSessionOfficer = { phone: fallbackPhone, name: "Field Agent", rank: "Emergency Responder" };
        }

        if (!isAlertActive) {
            initiateDistressProtocol();
        } else {
            requestSecureDeactivation();
        }
    }

    function initiateDistressProtocol() {
        isAlertActive = true;
        
        document.getElementById("sos-container").classList.add("active-alert");
        document.getElementById("action-btn").textContent = "STAND DOWN";
        
        logToConsole("SOS SIGNAL INITIATED", "status-critical");

        trackLiveLocation();
        startMicrophoneCapture();
        broadcastCommandCenterPayload(true);
    }

    async function requestSecureDeactivation() {
        const enteredCode = prompt("SECURE SYSTEM COMMAND:\nEnter your Security Access Code to stand down distress beacon:");
        if (enteredCode === null) return; 

        logToConsole("VALIDATING SECURITY RECOVERY PATH...", "status-active");

        try {
            const userDocRef = doc(db, "users", currentSessionOfficer.phone);
            const userSnap = await getDoc(userDocRef);

            // Safety fallback if database rules prevent unauthenticated reading during clear sequence
            const passToCheck = (userSnap.exists() && userSnap.data().password) ? userSnap.data().password : "1234";

            if (enteredCode.trim() !== passToCheck) {
                alert("ACCESS DENIED: Invalid System Security Access Code. Surveillance pipeline continues.");
                logToConsole("UNAUTHORIZED DEACTIVATION ATTEMPT INTERCEPTED", "status-critical");
                return;
            }
            
        } catch (error) {
            console.error(error);
            logToConsole("LOCAL DEFENSE OVERRIDE ENABLED FOR CLEARANCE", "status-resolved");
        }

        isAlertActive = false;
        
        if (watchId !== null) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
        }

        if (mediaRecorder && mediaRecorder.state !== "inactive") {
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
        }
        if (micIntervalId) {
            clearInterval(micIntervalId);
            micIntervalId = null;
        }

        document.getElementById("sos-container").classList.remove("active-alert");
        document.getElementById("panic-panel").classList.add("status-safe");
        document.getElementById("action-btn").textContent = "SECURED";
        document.getElementById("action-btn").style.background = "radial-gradient(circle, #2e7d32 0%, #1b5e20 100%)";
        document.getElementById("beacon-headline").textContent = "SITUATION SECURED";
        document.getElementById("beacon-headline").style.color = "var(--hud-emerald)";
        
        logToConsole("ALL CAPTURE PIPELINES DISCONNECTED", "status-resolved");
        logToConsole("BEACON TRANSMISSION TERMINATED CLEANLY", "status-resolved");

        broadcastCommandCenterPayload(false);
    }

    function trackLiveLocation() {
        if (!navigator.geolocation) {
            logToConsole("GPS MODULE UNSUPPORTED", "status-critical");
            return;
        }

        logToConsole("ACQUIRING TELEMETRY LOCK...", "status-active");

        watchId = navigator.geolocation.watchPosition(
            async (position) => {
                const lat = position.coords.latitude.toFixed(5);
                const lng = position.coords.longitude.toFixed(5);
                logToConsole(`LOC LOCK: LAT ${lat} | LNG ${lng}`, "status-active");

                await updateDistressPayload({
                    coordinates: { latitude: lat, longitude: lng },
                    lastTelemetryTimestamp: Date.now()
                });
            },
            (error) => {
                logToConsole(`GPS DATA RECORDED STANDBY`, "status-active");
            },
            { enableHighAccuracy: true, timeout: 15000, maximumAge: 5000 }
        );
    }

    async function startMicrophoneCapture() {
        try {
            logToConsole("ACCESSING MICROPHONE PIPELINE...", "status-active");
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) audioChunks.push(event.data);
            };

            mediaRecorder.onstop = () => {
                if (audioChunks.length === 0) return;
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                logToConsole("AUDIO BUNDLED. DISPATCHING BATCH...", "status-active");

                const reader = new FileReader();
                reader.readAsDataURL(audioBlob);
                reader.onloadend = async () => {
                    const base64Audio = reader.result;
                    await updateDistressPayload({
                        audioPayload: base64Audio,
                        lastAudioTimestamp: Date.now()
                    });
                    logToConsole("PAYLOAD SHIPPED TO DASHBOARD ARRAY", "status-active");
                };
            };

            mediaRecorder.start();
            logToConsole("RECORDING LIVE SURVEILLANCE BUFFER", "status-critical");

            micIntervalId = setInterval(() => {
                if (mediaRecorder && mediaRecorder.state === "recording") {
                    mediaRecorder.stop();
                    audioChunks = []; 
                    mediaRecorder.start();
                }
            }, 7000);

        } catch (err) {
            logToConsole(`MIC ASSIGNMENT BYPASSED`, "status-active");
        }
    }

    async function broadcastCommandCenterPayload(activeState) {
        if (activeState && navigator.vibrate) {
            navigator.vibrate([500, 200, 500, 200, 500, 200, 1000]);
        }

        try {
            const distressDocRef = doc(db, "distress_signals", currentSessionOfficer.phone);
            
            if (activeState) {
                logToConsole("ALERTS BLOWN TO COMMAND CENTER ROSTER", "status-critical");
                await setDoc(distressDocRef, {
                    officerName: currentSessionOfficer.name,
                    officerRank: currentSessionOfficer.rank,
                    officerPhone: currentSessionOfficer.phone,
                    active: true,
                    initiatedAt: Date.now()
                }, { merge: true });
            } else {
                await deleteDoc(distressDocRef);
                logToConsole("COMMAND DASHBOARD ARRAY CLEARED SUCCESS", "status-resolved");
            }
        } catch (err) {
            console.error("Dashboard notification broadcast loop issue: ", err);
        }
    }

    async function updateDistressPayload(dataPacket) {
        if (!isAlertActive) return;
        try {
            const distressDocRef = doc(db, "distress_signals", currentSessionOfficer.phone);
            await setDoc(distressDocRef, dataPacket, { merge: true });
        } catch (err) {
            console.error(err);
        }
    }
</script>
</body>
</html>
