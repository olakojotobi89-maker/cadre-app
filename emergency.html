<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADRE - Tactical Distress Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --hud-crimson: #ff3333;
            --hud-crimson-glow: rgba(255, 51, 51, 0.4);
            --bg-dark-surface: #0b111a;
            --hud-emerald: #4caf50;
        }

        .emergency-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            padding: 16px;
            margin-bottom: 60px;
        }

        .panic-card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-surface);
            border: 2px solid var(--hud-crimson);
            border-radius: var(--radius-sharp);
            padding: 24px 20px;
            box-shadow: 0 0 30px var(--hud-crimson-glow);
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        .panic-card.status-safe {
            border-color: var(--hud-emerald);
            box-shadow: 0 0 30px rgba(76, 175, 80, 0.3);
        }

        .panic-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 4px;
            background: var(--hud-crimson);
            animation: pulse-border 1.5s infinite;
        }

        .panic-card.status-safe::before {
            background: var(--hud-emerald);
            animation: none;
        }

        .sos-trigger-container {
            margin: 40px auto;
            position: relative;
            width: 160px;
            height: 160px;
        }

        .btn-sos-trigger {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, #ff1a1a 0%, #990000 100%);
            border: 4px solid #fff;
            color: #fff;
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            outline: none;
            position: relative;
            z-index: 5;
            transition: all 0.3s ease;
        }

        .btn-sos-trigger:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .active-alert .btn-sos-trigger {
            background: radial-gradient(circle, #330000 0%, #ff1a1a 100%);
            box-shadow: 0 0 25px var(--hud-crimson);
        }

        .sos-pulse-wave {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 50%;
            background: var(--hud-crimson);
            opacity: 0.6;
            z-index: 1;
        }

        .active-alert .sos-pulse-wave-1 { animation: pulse-wave 2s infinite linear; }
        .active-alert .sos-pulse-wave-2 { animation: pulse-wave 2s infinite linear 1s; }

        .telemetry-console {
            background: var(--bg-dark-surface);
            border: 1px solid var(--border-precision);
            border-radius: 4px;
            padding: 12px;
            font-family: monospace;
            font-size: 0.75rem;
            text-align: left;
            color: var(--text-dim);
            max-height: 140px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .telemetry-line {
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }

        .telemetry-line span.status-active   { color: var(--hud-amber); font-weight: bold; }
        .telemetry-line span.status-critical { color: var(--hud-crimson); font-weight: bold; animation: blink 1s infinite; }
        .telemetry-line span.status-resolved { color: var(--hud-emerald); font-weight: bold; }
        .telemetry-line span.status-error    { color: #ff9900; font-weight: bold; }

        .back-nav {
            margin-top: 15px;
            font-size: 0.85rem;
        }

        @keyframes pulse-wave {
            0%   { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.6); opacity: 0; }
        }
        @keyframes pulse-border {
            0%, 100% { opacity: 0.4; }
            50%       { opacity: 1; }
        }
        @keyframes blink { 50% { opacity: 0; } }

        .app-bottom-dock {
            display: grid !important;
            grid-template-columns: repeat(4, 1fr) !important;
        }
        .dock-node-emergency.active-node {
            color: #ff3333 !important;
            border-top: 2px solid #ff3333 !important;
        }
        .dock-node-emergency .dock-node-glyph {
            animation: beacon-pulse 1.5s infinite ease-in-out;
        }
        @keyframes beacon-pulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50%       { opacity: 1; transform: scale(1.15); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <main class="emergency-wrapper">
        <div class="panic-card" id="panic-panel">

            <div class="gateway-title-block">
                <h1 class="gateway-h1" id="beacon-headline" style="color: var(--hud-crimson);">DISTRESS TRANSMITTER</h1>
                <p class="gateway-p" id="beacon-subline">Emergency Command Beacon Network</p>
            </div>

            <div class="sos-trigger-container" id="sos-container">
                <div class="sos-pulse-wave sos-pulse-wave-1"></div>
                <div class="sos-pulse-wave sos-pulse-wave-2"></div>
                <button type="button" class="btn-sos-trigger" id="action-btn" onclick="handleSosInteraction()">SOS</button>
            </div>

            <div class="telemetry-console" id="console-logs">
                <div class="telemetry-line">
                    <span>&gt; BEACON STATUS:</span>
                    <span style="color: var(--hud-emerald);">STANDBY</span>
                </div>
                <div class="telemetry-line">
                    <span>&gt; LOCAL TELEMETRY:</span>
                    <span>COORD LOCK VACANT</span>
                </div>
            </div>

            <div class="back-nav">
                <a href="home.html" style="color: var(--text-dim); text-decoration: none;">← Abort &amp; Return to Feed</a>
            </div>

        </div>
    </main>

    <nav class="app-bottom-dock">
        <a href="home.html"      class="dock-node"><span class="dock-node-glyph">🏠</span><span>Feed</span></a>
        <a href="ebook.html"     class="dock-node"><span class="dock-node-glyph">📖</span><span>eBook</span></a>
        <a href="profile.html"   class="dock-node"><span class="dock-node-glyph">👤</span><span>Profile</span></a>
        <a href="emergency.html" class="dock-node dock-node-emergency active-node"><span class="dock-node-glyph">🚨</span><span>SOS</span></a>
    </nav>
</div>

<script>

/* ─────────────────────────────────────────────
   SUPABASE
   IMPORTANT: All column names are lowercase to
   match PostgreSQL's default behaviour.
   Table: distress_signals
   Columns: officer_phone, officer_name,
            officer_rank, active, initiated_at,
            lat, lng, last_telemetry_timestamp
───────────────────────────────────────────── */

const supabaseUrl = 'https://ihroattnnnsckvvbosfz.supabase.co';
const supabaseKey = 'sb_publishable_M0wwGKR9he08sEfHhZQQxA_vmnXS2eX';
const sbClient = supabase.createClient(supabaseUrl, supabaseKey, {
    auth: { persistSession: false }
});

let currentSessionOfficer = null;
let isAlertActive  = false;
let watchId        = null;
let mediaRecorder  = null;
let audioChunks    = [];
let micIntervalId  = null;

/* ─────────────────────────────────────────────
   SESSION INIT
───────────────────────────────────────────── */

(async function initSession() {

    // Try multiple storage locations for a stable identifier
    let savedPhone = null;
    let savedName  = null;
    let savedRank  = null;
    let savedEmail = null;

    function tryParse(key) {
        try { return JSON.parse(localStorage.getItem(key)); } catch(e) { return null; }
    }

    // Priority: explicit cached_operator_phone, session_user, user, officer, currentUser
    savedPhone = localStorage.getItem('cached_operator_phone') || null;

    const keys = ['session_user','user','officer','currentUser'];
    for (const k of keys) {
        const p = tryParse(k);
        if (!p) continue;
        if (!savedPhone && p.phone) savedPhone = p.phone;
        if (!savedName && p.name) savedName = p.name;
        if (!savedRank && p.rank) savedRank = p.rank;
        if (!savedEmail && p.email) savedEmail = p.email;
    }

    // fallback to cached_profile (registration data)
    const cachedProfile = tryParse('cached_profile');
    if (cachedProfile) {
        if (!savedPhone && cachedProfile.phone) savedPhone = cachedProfile.phone;
        if (!savedName && cachedProfile.name) savedName = cachedProfile.name;
        if (!savedRank && cachedProfile.rank) savedRank = cachedProfile.rank;
        if (!savedEmail && cachedProfile.email) savedEmail = cachedProfile.email;
    }

    // If still no phone, create a stable identifier using email or anon id
    if (!savedPhone) {
        if (savedEmail) {
            savedPhone = `email:${savedEmail.toLowerCase()}`;
            localStorage.setItem('cached_operator_phone', savedPhone);
            logToConsole('NO PHONE — using email-derived identifier', 'status-active');
        } else {
            const existing = localStorage.getItem('cached_operator_phone');
            if (existing) {
                savedPhone = existing;
            } else {
                savedPhone = `anon_${Math.random().toString(36).slice(2,9)}`;
                localStorage.setItem('cached_operator_phone', savedPhone);
                logToConsole('NO IDENTIFIERS — created persistent anon id', 'status-active');
            }
        }
    }

    logToConsole('CONNECTING SECURE IDENT NODE...', 'status-active');

    currentSessionOfficer = {
        phone: savedPhone,
        name:  savedName || (cachedProfile && cachedProfile.name) || 'Field Agent',
        rank:  savedRank || (cachedProfile && cachedProfile.rank) || 'UNIT',
        email: savedEmail || (cachedProfile && cachedProfile.email) || null
    };

    // Try to enrich identity from DB by phone OR email (if phone is email:... strip prefix)
    try {
        let query = sbClient.from('users').select('*');
        if (currentSessionOfficer.phone && currentSessionOfficer.phone.startsWith('email:')) {
            const e = currentSessionOfficer.phone.split(':')[1];
            query = query.eq('email', e).maybeSingle();
        } else {
            query = query.eq('phone', currentSessionOfficer.phone).maybeSingle();
        }

        const res = await query;
        if (res && res.data) {
            currentSessionOfficer = res.data;
            if (currentSessionOfficer.phone) localStorage.setItem('cached_operator_phone', currentSessionOfficer.phone);
            logToConsole(`OPERATOR IDENTIFIED: ${currentSessionOfficer.name}`, 'status-resolved');
            await checkActiveStatus(currentSessionOfficer.phone);
        } else {
            logToConsole('FALLBACK IDENTITY LOADED (no DB record)', 'status-active');
        }
    } catch (err) {
        logToConsole('OFFLINE IDENTITY MODULE ACTIVE', 'status-active');
        console.warn('emergency.html: DB lookup failed, using fallback:', err);
    }

})();

/* ─────────────────────────────────────────────
   CHECK IF SOS ALREADY ACTIVE (page reload)
───────────────────────────────────────────── */

async function checkActiveStatus(phone) {
    const { data, error } = await sbClient
        .from('distress_signals')
        .select('*')
        .eq('officer_phone', phone)  // FIX: lowercase column name
        .eq('active', true);

    if (error) {
        logToConsole(`DB CHECK ERROR: ${error.message}`, "status-error");
        return;
    }

    if (data && data.length > 0) {
        isAlertActive = true;
        document.getElementById("sos-container").classList.add("active-alert");
        document.getElementById("action-btn").textContent = "STAND DOWN";
        logToConsole("RESUMING ACTIVE DISTRESS SESSION", "status-critical");
        trackLiveLocation();
    }
}

/* ─────────────────────────────────────────────
   CONSOLE LOG
───────────────────────────────────────────── */

function logToConsole(message, statusClass = '') {
    const consoleBox = document.getElementById("console-logs");
    if (!consoleBox) return;
    const line = document.createElement("div");
    line.className = "telemetry-line";
    const label = statusClass ? statusClass.replace('status-', '').toUpperCase() : '';
    line.innerHTML = `<span>&gt; ${message}</span><span class="${statusClass}">${label}</span>`;
    consoleBox.appendChild(line);
    consoleBox.scrollTop = consoleBox.scrollHeight;
}

/* ─────────────────────────────────────────────
   SOS BUTTON HANDLER
───────────────────────────────────────────── */

function handleSosInteraction() {
    if (!currentSessionOfficer) {
        const fallbackPhone = localStorage.getItem("cached_operator_phone") || "0000000000";
        currentSessionOfficer = { phone: fallbackPhone, name: "Field Agent", rank: "Emergency Responder" };
    }

    if (!isAlertActive) {
        initiateDistressProtocol();
    } else {
        requestSecureDeactivation();
    }
}

/* ─────────────────────────────────────────────
   ACTIVATE SOS
───────────────────────────────────────────── */

async function initiateDistressProtocol() {

    // Disable button while sending to prevent double-taps
    const btn = document.getElementById("action-btn");
    btn.disabled = true;

    logToConsole("SOS SIGNAL INITIATED — BROADCASTING...", "status-critical");

    // ── FIX: Delete any stale row first, then insert fresh ──
    // This avoids upsert conflict issues entirely.
    await sbClient
        .from("distress_signals")
        .delete()
        .eq("officer_phone", currentSessionOfficer.phone);

    const payload = {
        officer_phone:  currentSessionOfficer.phone,   // FIX: lowercase columns
        officer_name:   currentSessionOfficer.name,
        officer_rank:   currentSessionOfficer.rank || "UNIT",
        active:         true,
        initiated_at:   new Date().toISOString(),
        lat:            null,
        lng:            null,
        last_telemetry_timestamp: new Date().toISOString()
    };

    const { error } = await sbClient
        .from("distress_signals")
        .insert(payload);

    if (error) {
        // Show the real error so it's easy to diagnose
        logToConsole(`BROADCAST FAILED: ${error.message} (${error.code})`, "status-error");
        console.error("SOS INSERT ERROR:", error);
        btn.disabled = false;
        return;
    }

    // Success — update UI
    isAlertActive = true;
    btn.disabled = false;
    btn.textContent = "STAND DOWN";
    document.getElementById("sos-container").classList.add("active-alert");

    logToConsole("DISTRESS SIGNAL BROADCAST CONFIRMED", "status-critical");
    logToConsole("COMMAND CENTER NOTIFIED", "status-resolved");

    trackLiveLocation();
    startMicrophoneCapture();
}

/* ─────────────────────────────────────────────
   DEACTIVATE SOS
───────────────────────────────────────────── */

async function requestSecureDeactivation() {

    const enteredCode = prompt("SECURE SYSTEM COMMAND:\nEnter your Security Access Code to stand down distress beacon:");
    if (enteredCode === null) return;

    logToConsole("VALIDATING SECURITY RECOVERY PATH...", "status-active");

    try {
        const { data } = await sbClient
            .from("users")
            .select("password")
            .eq("phone", currentSessionOfficer.phone)
            .single();

        const passToCheck = (data && data.password) ? data.password : "1234";

        if (enteredCode.trim() !== passToCheck) {
            alert("ACCESS DENIED: Invalid System Security Access Code.");
            logToConsole("UNAUTHORIZED DEACTIVATION ATTEMPT INTERCEPTED", "status-critical");
            return;
        }
    } catch (error) {
        logToConsole("LOCAL DEFENSE OVERRIDE ENABLED", "status-resolved");
    }

    // Stop all active streams
    isAlertActive = false;

    if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
    }

    if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(t => t.stop());
    }

    if (micIntervalId) {
        clearInterval(micIntervalId);
        micIntervalId = null;
    }

    // FIX: Delete the row cleanly — admin sees it disappear in realtime
    const { error } = await sbClient
        .from("distress_signals")
        .delete()
        .eq("officer_phone", currentSessionOfficer.phone);

    if (error) {
        logToConsole(`STAND DOWN SYNC ERROR: ${error.message}`, "status-error");
        console.error("SOS DELETE ERROR:", error);
    }

    document.getElementById("sos-container").classList.remove("active-alert");
    document.getElementById("panic-panel").classList.add("status-safe");
    document.getElementById("action-btn").textContent = "SECURED";
    document.getElementById("beacon-headline").textContent = "SITUATION SECURED";

    logToConsole("BEACON DEACTIVATED — STAND DOWN CONFIRMED", "status-resolved");
}

/* ─────────────────────────────────────────────
   LIVE LOCATION TRACKING
───────────────────────────────────────────── */

function trackLiveLocation() {
    if (!navigator.geolocation) {
        logToConsole("GEOLOCATION UNAVAILABLE", "status-active");
        return;
    }

    watchId = navigator.geolocation.watchPosition(
        async (position) => {
            const lat = position.coords.latitude.toFixed(5);
            const lng = position.coords.longitude.toFixed(5);

            logToConsole(`COORD LOCK: ${lat}, ${lng}`, "status-resolved");

            await sbClient
                .from("distress_signals")
                .update({
                    lat: lat,
                    lng: lng,
                    last_telemetry_timestamp: new Date().toISOString()  // FIX: lowercase
                })
                .eq("officer_phone", currentSessionOfficer.phone);     // FIX: lowercase
        },
        (err) => {
            logToConsole(`GEO ERROR: ${err.message}`, "status-active");
        },
        { enableHighAccuracy: true }
    );
}

/* ─────────────────────────────────────────────
   MICROPHONE CAPTURE
───────────────────────────────────────────── */

async function startMicrophoneCapture() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
        mediaRecorder.start();
        logToConsole("MIC PIPELINE ACTIVE", "status-resolved");

        micIntervalId = setInterval(() => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                mediaRecorder.start();
            }
        }, 7000);
    } catch (err) {
        logToConsole("MIC PIPELINE BYPASSED", "status-active");
    }
}

</script>
</body>
</html>
