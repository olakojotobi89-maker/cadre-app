<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADRE - Tactical Distress Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --hud-crimson: #ff3333;
            --hud-crimson-glow: rgba(255, 51, 51, 0.4);
            --bg-dark-surface: #0b111a;
            --hud-emerald: #4caf50;
        }
        .emergency-wrapper {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 80vh; padding: 16px; margin-bottom: 60px;
        }
        .panic-card {
            width: 100%; max-width: 420px; background: var(--bg-surface);
            border: 2px solid var(--hud-crimson); border-radius: var(--radius-sharp);
            padding: 24px 20px; box-shadow: 0 0 30px var(--hud-crimson-glow);
            text-align: center; position: relative; overflow: hidden; transition: all 0.5s ease;
        }
        .panic-card.status-safe { border-color: var(--hud-emerald); box-shadow: 0 0 30px rgba(76,175,80,0.3); }
        .panic-card::before {
            content: ''; position: absolute; top: 0; left: 0;
            width: 100%; height: 4px; background: var(--hud-crimson);
            animation: pulse-border 1.5s infinite;
        }
        .panic-card.status-safe::before { background: var(--hud-emerald); animation: none; }
        .sos-trigger-container {
            margin: 40px auto; position: relative; width: 160px; height: 160px;
        }
        .btn-sos-trigger {
            width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle, #ff1a1a 0%, #990000 100%);
            border: 4px solid #fff; color: #fff; font-size: 1.8rem;
            font-weight: 900; letter-spacing: 2px; cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); outline: none;
            position: relative; z-index: 5; transition: all 0.3s ease;
        }
        .btn-sos-trigger:disabled { opacity: 0.6; cursor: not-allowed; }
        .active-alert .btn-sos-trigger {
            background: radial-gradient(circle, #330000 0%, #ff1a1a 100%);
            box-shadow: 0 0 25px var(--hud-crimson);
        }
        .sos-pulse-wave {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%; background: var(--hud-crimson); opacity: 0.6; z-index: 1;
        }
        .active-alert .sos-pulse-wave-1 { animation: pulse-wave 2s infinite linear; }
        .active-alert .sos-pulse-wave-2 { animation: pulse-wave 2s infinite linear 1s; }
        .telemetry-console {
            background: var(--bg-dark-surface); border: 1px solid #1e293b;
            border-radius: 4px; padding: 12px; font-family: monospace;
            font-size: 0.75rem; text-align: left; color: #94a3b8;
            max-height: 140px; overflow-y: auto; margin-bottom: 20px;
        }
        .telemetry-line {
            margin-bottom: 6px; display: flex; justify-content: space-between;
        }
        .telemetry-line span.status-active   { color: #ffaa00; font-weight: bold; }
        .telemetry-line span.status-critical { color: var(--hud-crimson); font-weight: bold; animation: blink 1s infinite; }
        .telemetry-line span.status-resolved { color: var(--hud-emerald); font-weight: bold; }
        .telemetry-line span.status-error    { color: #ff9900; font-weight: bold; }
        .back-nav { margin-top: 15px; font-size: 0.85rem; }
        #sos-audio-status {
            display: none; margin: 0 0 14px 0; padding: 8px 12px;
            background: rgba(255,51,51,0.08); border: 1px solid rgba(255,51,51,0.3);
            border-left: 3px solid var(--hud-crimson); border-radius: 3px;
            font-family: monospace; font-size: 0.72rem; color: #f87171; text-align: left;
        }
        #sos-audio-status.streaming { display: block; animation: pulse-border 2s infinite; }
        .audio-dot {
            display: inline-block; width: 6px; height: 6px; background: var(--hud-crimson);
            border-radius: 50%; margin-right: 6px; animation: blink 1s infinite; vertical-align: middle;
        }
        @keyframes pulse-wave { 0% { transform:scale(1); opacity:0.6; } 100% { transform:scale(1.6); opacity:0; } }
        @keyframes pulse-border { 0%,100% { opacity:0.4; } 50% { opacity:1; } }
        @keyframes blink { 50% { opacity:0; } }
        .app-bottom-dock { display:grid !important; grid-template-columns:repeat(4,1fr) !important; }
        .dock-node-emergency.active-node { color:#ff3333 !important; border-top:2px solid #ff3333 !important; }
        .dock-node-emergency .dock-node-glyph { animation:beacon-pulse 1.5s infinite ease-in-out; }
        @keyframes beacon-pulse { 0%,100%{opacity:0.7;transform:scale(1);}50%{opacity:1;transform:scale(1.15);} }
    </style>
</head>
<body>
<div class="app-container">
    <main class="emergency-wrapper">
        <div class="panic-card" id="panic-panel">
            <div class="gateway-title-block">
                <h1 class="gateway-h1" id="beacon-headline" style="color:var(--hud-crimson);">DISTRESS TRANSMITTER</h1>
                <p class="gateway-p" id="beacon-subline">Emergency Command Beacon Network</p>
            </div>
            <div class="sos-trigger-container" id="sos-container">
                <div class="sos-pulse-wave sos-pulse-wave-1"></div>
                <div class="sos-pulse-wave sos-pulse-wave-2"></div>
                <button type="button" class="btn-sos-trigger" id="action-btn" onclick="handleSosInteraction()">SOS</button>
            </div>
            <div id="sos-audio-status">
                <span class="audio-dot"></span>
                AUDIO STREAM TRANSMITTING TO COMMAND
            </div>
            <div class="telemetry-console" id="console-logs">
                <div class="telemetry-line">
                    <span>&gt; BEACON STATUS:</span>
                    <span style="color:var(--hud-emerald);">STANDBY</span>
                </div>
                <div class="telemetry-line">
                    <span>&gt; LOCAL TELEMETRY:</span>
                    <span>COORD LOCK VACANT</span>
                </div>
            </div>
            <div class="back-nav">
                <a href="home.html" style="color:#64748b;text-decoration:none;">← Abort &amp; Return to Feed</a>
            </div>
        </div>
    </main>
    <nav class="app-bottom-dock">
        <a href="home.html"      class="dock-node"><span class="dock-node-glyph">🏠</span><span>Feed</span></a>
        <a href="ebook.html"     class="dock-node"><span class="dock-node-glyph">📖</span><span>eBook</span></a>
        <a href="profile.html"   class="dock-node"><span class="dock-node-glyph">👤</span><span>Profile</span></a>
        <a href="emergency.html" class="dock-node dock-node-emergency active-node"><span class="dock-node-glyph">🚨</span><span>SOS</span></a>
    </nav>
</div>

<script>
/* ════════════════════════════════════════════════
   CADRE EMERGENCY — CORE LOGIC
════════════════════════════════════════════════ */
const supabaseUrl = 'https://ihroattnnnsckvvbosfz.supabase.co';
const supabaseKey = 'sb_publishable_M0wwGKR9he08sEfHhZQQxA_vmnXS2eX';
const sbClient    = supabase.createClient(supabaseUrl, supabaseKey);

let currentUser   = null;
let isAlertActive = false;
let watchId       = null;
let micIntervalId = null;

function tryParse(v) { try { return JSON.parse(v); } catch { return null; } }

function logToConsole(message, statusClass) {
    statusClass = statusClass || '';
    const box = document.getElementById("console-logs");
    if (!box) return;
    const line = document.createElement("div");
    line.className = "telemetry-line";
    const label = statusClass ? statusClass.replace('status-','').toUpperCase() : '';
    line.innerHTML = '<span>&gt; ' + message + '</span><span class="' + statusClass + '">' + label + '</span>';
    box.appendChild(line);
    box.scrollTop = box.scrollHeight;
}

(async function initSession() {
    logToConsole('CONNECTING SECURE IDENT NODE...', 'status-active');
    let uid = localStorage.getItem("cadre_uid");
    if (!uid) {
        for (const key of ["session_user","user","officer","currentUser"]) {
            const p = tryParse(localStorage.getItem(key));
            if (p && p.id) { uid = p.id; break; }
        }
    }
    if (!uid) {
        const s = tryParse(localStorage.getItem("supabase_session"));
        if (s && s.user && s.user.id) uid = s.user.id;
    }
    if (!uid) {
        try {
            const { data: { session } } = await sbClient.auth.getSession();
            if (session && session.user) uid = session.user.id;
        } catch(e) {}
    }
    if (!uid) {
        logToConsole('NO SESSION — redirecting to login', 'status-error');
        setTimeout(function() { window.location.href = "login.html"; }, 1500);
        return;
    }
    localStorage.setItem("cadre_uid", uid);
    const { data: profile, error } = await sbClient.from('users').select('*').eq('id', uid).single();
    if (error || !profile) {
        logToConsole('PROFILE FETCH FAILED: ' + (error && error.message), 'status-error');
        return;
    }
    currentUser = profile;
    logToConsole('OPERATOR IDENTIFIED: ' + profile.name, 'status-resolved');
    await checkActiveStatus(uid);
    CADRE_SOS_AUDIO.init(uid, profile.name || uid);
})();

async function checkActiveStatus(userId) {
    const { data, error } = await sbClient.from('distress_signals')
        .select('*').eq('user_id', userId).eq('active', true);
    if (error) { logToConsole('DB CHECK ERROR: ' + error.message, 'status-error'); return; }
    if (data && data.length > 0) {
        isAlertActive = true;
        document.getElementById("sos-container").classList.add("active-alert");
        document.getElementById("action-btn").textContent = "STAND DOWN";
        logToConsole("RESUMING ACTIVE DISTRESS SESSION", "status-critical");
        trackLiveLocation();
        CADRE_SOS_AUDIO.startStreaming();
    }
}

function handleSosInteraction() {
    if (!currentUser) { logToConsole('SESSION NOT READY — PLEASE WAIT', 'status-error'); return; }
    if (!isAlertActive) { initiateDistressProtocol(); } else { requestSecureDeactivation(); }
}

async function initiateDistressProtocol() {
    const btn = document.getElementById("action-btn");
    btn.disabled = true;
    if (window.CADRE && window.CADRE.ai) {
        const confirmed = await CADRE.ai.sos.confirm();
        if (!confirmed) {
            logToConsole("SOS CANCELLED BY OPERATOR", "status-active");
            CADRE.ai.sos.cancelled();
            btn.disabled = false;
            return;
        }
    }
    logToConsole("SOS SIGNAL INITIATED — BROADCASTING...", "status-critical");
    await sbClient.from("distress_signals").delete().eq("user_id", currentUser.id);
    const payload = {
        user_id: currentUser.id, officer_name: currentUser.name || 'UNKNOWN',
        officer_rank: currentUser.rank || 'UNIT', officer_email: currentUser.email || '',
        active: true, lat: null, lng: null
    };
    const payloadWithTs = Object.assign({}, payload, {
        initiated_at: new Date().toISOString(), last_telemetry_timestamp: new Date().toISOString()
    });
    let insertError = null;
    const { error: errWithTs } = await sbClient.from("distress_signals").insert(payloadWithTs);
    if (errWithTs && errWithTs.code === 'PGRST204') {
        logToConsole('TIMESTAMP COLS MISSING — USING SAFE PAYLOAD', 'status-active');
        const { error: errSafe } = await sbClient.from("distress_signals").insert(payload);
        insertError = errSafe;
    } else { insertError = errWithTs; }
    if (insertError) {
        logToConsole('BROADCAST FAILED: ' + insertError.message + ' (' + insertError.code + ')', 'status-error');
        btn.disabled = false; return;
    }
    if (window.CADRE && window.CADRE.ai) CADRE.ai.sos.activated();
    isAlertActive = true;
    btn.disabled = false;
    btn.textContent = "STAND DOWN";
    document.getElementById("sos-container").classList.add("active-alert");
    logToConsole("DISTRESS SIGNAL BROADCAST CONFIRMED", "status-critical");
    logToConsole("COMMAND CENTER NOTIFIED", "status-resolved");
    trackLiveLocation();
    CADRE_SOS_AUDIO.startStreaming();
}

async function requestSecureDeactivation() {
    const confirmed = confirm("STAND DOWN DISTRESS BEACON?\n\nPress OK to confirm you are safe.");
    if (!confirmed) return;
    logToConsole("STAND DOWN CONFIRMED — DEACTIVATING...", "status-active");
    if (window.CADRE && window.CADRE.ai) CADRE.ai.sos.cancelled();
    isAlertActive = false;
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    if (micIntervalId) { clearInterval(micIntervalId); micIntervalId = null; }
    CADRE_SOS_AUDIO.stopStreaming();
    const { error } = await sbClient.from("distress_signals").delete().eq("user_id", currentUser.id);
    if (error) logToConsole('STAND DOWN SYNC ERROR: ' + error.message, 'status-error');
    document.getElementById("sos-container").classList.remove("active-alert");
    document.getElementById("panic-panel").classList.add("status-safe");
    document.getElementById("action-btn").textContent = "SECURED";
    document.getElementById("beacon-headline").textContent = "SITUATION SECURED";
    logToConsole("BEACON DEACTIVATED — STAND DOWN CONFIRMED", "status-resolved");
}

function trackLiveLocation() {
    if (!navigator.geolocation) { logToConsole("GEOLOCATION UNAVAILABLE", "status-active"); return; }
    watchId = navigator.geolocation.watchPosition(
        async function(position) {
            const lat = position.coords.latitude.toFixed(5);
            const lng = position.coords.longitude.toFixed(5);
            logToConsole('COORD LOCK: ' + lat + ', ' + lng, "status-resolved");
            const updateBase = { lat: lat, lng: lng };
            const updateWithTs = Object.assign({}, updateBase, { last_telemetry_timestamp: new Date().toISOString() });
            const { error: errTs } = await sbClient.from("distress_signals").update(updateWithTs).eq("user_id", currentUser.id);
            if (errTs && errTs.code === 'PGRST204') {
                await sbClient.from("distress_signals").update(updateBase).eq("user_id", currentUser.id);
            }
        },
        function(err) { logToConsole('GEO ERROR: ' + err.message, "status-active"); },
        { enableHighAccuracy: true }
    );
}
</script>

<!-- ═══════════════════════════════════════════════════════════════
     MODULE: CADRE_SOS_AUDIO  — FULLY REBUILT
     
     KEY FIXES vs previous version:
     1. Re-announce on a 10-second heartbeat so admins that open
        the page AFTER the SOS fires can still pick up the stream.
     2. Announcement channel uses { self: true } so the send
        callback can confirm delivery without relying on the
        default self-suppress behaviour.
     3. Both sigChannel and annChannel are fully separate Supabase
        channel instances to avoid internal routing conflicts.
     4. Offer is sent ONLY after admin_join arrives — no race
        condition from sending into an empty room.
═══════════════════════════════════════════════════════════════════ -->
<script>
(function() {
    'use strict';

    const _SB_URL = 'https://ihroattnnnsckvvbosfz.supabase.co';
    const _SB_KEY = 'sb_publishable_M0wwGKR9he08sEfHhZQQxA_vmnXS2eX';
    /* Use a fresh Supabase client so broadcast routing is independent */
    const _sb = supabase.createClient(_SB_URL, _SB_KEY);

    let _officerId    = null;
    let _officerName  = null;
    let _sessionId    = null;
    let _localStream  = null;
    let _peerConns    = {};       /* adminId → RTCPeerConnection */
    let _sigChannel   = null;     /* 'sos_sig_<officerId>'  — offer/answer/ICE */
    let _annChannel   = null;     /* 'sos_announcements'    — presence beacon  */
    let _heartbeatId  = null;     /* re-announce timer                         */
    let _streaming    = false;
    let _statusEl     = null;

    const _ICE = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
        ]
    };

    window.CADRE_SOS_AUDIO = {
        init:           _init,
        startStreaming: _startStreaming,
        stopStreaming:  _stopStreaming
    };

    /* ── init ── */
    function _init(officerId, officerName) {
        _officerId  = officerId;
        _officerName = officerName;
        _statusEl   = document.getElementById('sos-audio-status');
        console.log('[SOS_AUDIO] init — officer:', officerName, officerId);
    }

    /* ── startStreaming ── */
    async function _startStreaming() {
        if (_streaming) return;
        _streaming = true;
        _sessionId = _officerId + '_' + Date.now();
        console.log('[SOS_AUDIO] startStreaming — session:', _sessionId);

        /* 1 ── Capture mic */
        try {
            _localStream = await navigator.mediaDevices.getUserMedia({
                audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 16000 },
                video: false
            });
            console.log('[SOS_AUDIO] mic captured');
        } catch (err) {
            console.error('[SOS_AUDIO] mic capture FAILED:', err);
            _streaming = false;
            return;
        }

        /* 2 ── Open signaling channel (receives admin_join, admin_answer, admin_ice) */
        _sigChannel = _sb.channel('sos_sig_' + _officerId, {
            config: { broadcast: { ack: false } }
        });

        _sigChannel
            .on('broadcast', { event: 'admin_join' }, async function(msg) {
                const adminId = (msg.payload || {}).adminId;
                if (!adminId) return;
                console.log('[SOS_AUDIO] admin_join from:', adminId);
                await _createOfferForAdmin(adminId);
            })
            .on('broadcast', { event: 'admin_answer' }, async function(msg) {
                const { adminId, sdp } = msg.payload || {};
                if (!adminId || !sdp) return;
                const pc = _peerConns[adminId];
                if (!pc) return;
                console.log('[SOS_AUDIO] admin_answer from:', adminId);
                try { await pc.setRemoteDescription({ type: 'answer', sdp }); }
                catch(e) { console.warn('[SOS_AUDIO] setRemoteDescription err:', e); }
            })
            .on('broadcast', { event: 'admin_ice' }, async function(msg) {
                const { adminId, candidate } = msg.payload || {};
                if (!adminId || !candidate) return;
                const pc = _peerConns[adminId];
                if (!pc) return;
                try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch(e) {}
            });

        await new Promise(function(resolve) {
            _sigChannel.subscribe(function(status) {
                console.log('[SOS_AUDIO] sigChannel status:', status);
                if (status === 'SUBSCRIBED') resolve();
            });
        });

        /* 3 ── Open announcement channel and start heartbeat */
        await _openAnnouncementChannel();
    }

    /* ── open announcement channel + heartbeat ── */
    async function _openAnnouncementChannel() {
        _annChannel = _sb.channel('sos_announcements', {
            config: { broadcast: { self: false } }
        });

        await new Promise(function(resolve) {
            _annChannel.subscribe(function(status) {
                console.log('[SOS_AUDIO] annChannel status:', status);
                if (status === 'SUBSCRIBED') resolve();
            });
        });

        /* Send first announcement immediately */
        await _sendAnnouncement();
        _showStreamingStatus(true);

        /* Re-announce every 8 seconds so late-opening admin pages catch it */
        _heartbeatId = setInterval(_sendAnnouncement, 8000);
    }

    async function _sendAnnouncement() {
        if (!_annChannel || !_streaming) return;
        try {
            await _annChannel.send({
                type: 'broadcast',
                event: 'sos_announce',
                payload: {
                    officerId:   _officerId,
                    officerName: _officerName,
                    sessionId:   _sessionId,
                    timestamp:   new Date().toISOString()
                }
            });
            console.log('[SOS_AUDIO] announcement sent');
        } catch(e) { console.warn('[SOS_AUDIO] announcement send err:', e); }
    }

    /* ── create WebRTC offer for one admin ── */
    async function _createOfferForAdmin(adminId) {
        /* Close stale connection */
        if (_peerConns[adminId]) {
            try { _peerConns[adminId].close(); } catch(e) {}
            delete _peerConns[adminId];
        }

        const pc = new RTCPeerConnection(_ICE);
        _peerConns[adminId] = pc;

        _localStream.getTracks().forEach(function(t) { pc.addTrack(t, _localStream); });

        pc.onicecandidate = async function(evt) {
            if (!evt.candidate || !_sigChannel) return;
            try {
                await _sigChannel.send({
                    type: 'broadcast', event: 'officer_ice',
                    payload: { officerId: _officerId, adminId, candidate: evt.candidate.toJSON() }
                });
            } catch(e) {}
        };

        pc.onconnectionstatechange = function() {
            console.log('[SOS_AUDIO] peer state → ' + pc.connectionState + ' (admin:' + adminId + ')');
        };

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        await _sigChannel.send({
            type: 'broadcast', event: 'officer_offer',
            payload: {
                officerId:   _officerId,
                officerName: _officerName,
                sessionId:   _sessionId,
                adminId,
                sdp: offer.sdp
            }
        });
        console.log('[SOS_AUDIO] offer sent to admin:', adminId);
    }

    /* ── stopStreaming ── */
    function _stopStreaming() {
        if (!_streaming) return;
        _streaming = false;

        /* Cancel heartbeat */
        if (_heartbeatId) { clearInterval(_heartbeatId); _heartbeatId = null; }

        /* Notify command stream is over */
        if (_annChannel) {
            _annChannel.send({
                type: 'broadcast', event: 'sos_ended',
                payload: { officerId: _officerId, sessionId: _sessionId }
            }).catch(function(){}).finally(function() {
                _annChannel.unsubscribe(); _annChannel = null;
            });
        }
        if (_sigChannel) { _sigChannel.unsubscribe(); _sigChannel = null; }

        /* Close all peer connections */
        Object.values(_peerConns).forEach(function(pc) { try { pc.close(); } catch(e) {} });
        _peerConns = {};

        /* Stop mic */
        if (_localStream) {
            _localStream.getTracks().forEach(function(t) { t.stop(); });
            _localStream = null;
        }

        _showStreamingStatus(false);
        console.log('[SOS_AUDIO] stream stopped');
    }

    function _showStreamingStatus(active) {
        if (!_statusEl) return;
        if (active) { _statusEl.classList.add('streaming'); }
        else        { _statusEl.classList.remove('streaming'); }
    }

})();
</script>

</body>
