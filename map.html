<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADRE - C2 COMBAT MATRIX</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* (Keep your existing CSS styles here) */
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header" style="border-bottom: 2px solid var(--hud-neon-cyan);">
        <div class="brand-wrapper">
            <a href="home.html" style="text-decoration: none; display: flex; align-items: center; color: inherit;">
                <img src="Cadre logo png.jpg" alt="CADRE" class="brand-logo" style="border: 1px solid var(--hud-neon-cyan);">
                <span class="brand-text" style="color: var(--hud-neon-cyan); text-shadow: 0 0 8px rgba(0,243,255,0.6);">TACTICAL C2 MATRIX</span>
            </a>
        </div>
        <div id="zulu-clock" class="header-badge" style="font-family: var(--hud-font); color: var(--hud-neon-amber); border-color: var(--hud-neon-amber);">ZULU [00:00:00]</div>
    </header>

    <main class="feed-content" style="padding: 12px;">
        <div class="combat-screen-wrapper">
            <div class="search-objective-tray">
                <input type="text" id="objective-search-field" class="objective-input" placeholder="ENTER OBJECTIVE AREA..." oninput="searchTargetLocations(this.value)">
                <div id="objective-results" class="objective-dropdown"></div>
            </div>

            <div class="tactical-display-core">
                <div class="map-viewport-frame" id="combat-map-canvas">
                    <div class="scanline-crt-overlay"></div>
                </div>

                <div class="hud-telemetry-terminal">
                    <div>
                        <div class="terminal-readout-header">SYSTEM TRACE LOGS</div>
                        <div class="terminal-log-box" id="terminal-log-stream">
                            <div class="log-line">> CLOUD SYNC: ONLINE</div>
                            <div class="log-line">> VECTOR MATRIX ONLINE.</div>
                            <div class="log-line" id="velocity-hud-node" style="color: var(--hud-neon-amber); font-weight: bold;">> VELOCITY: STATIC</div>
                        </div>
                    </div>
                    <div class="c2-action-matrix">
                        <div class="terminal-readout-header" style="border-bottom:none; margin-bottom: 2px;">INTERCEPT TARGETS</div>
                        <button class="c2-btn" onclick="toggleActiveTracking()">TRACK MOVEMENT</button>
                        <button class="c2-btn" onclick="forceRadarSweep()">SCAN SECTOR</button>
                        <button class="c2-btn c2-btn-mad-alert" onclick="resetTrackingMatrix()">HARD RESET</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. Initialize Supabase
    const supabaseUrl = 'https://ihroattnnnsckvvbosfz.supabase.co';
    const supabaseKey = 'sb_publishable_M0wwGKR9he08sEfHhZQQxA_vmnXS2eX';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let mapInstance;
    let operationMarker;
    let destinationMarker;
    let routingVectorLine;
    let motionTrackingWatcherId = null;
    let currentAgentLat = 7.3775;
    let currentAgentLng = 3.9470;
    let currentSessionOfficer = JSON.parse(localStorage.getItem("session_user"));
    let sosMarkersMap = {};

    window.addEventListener('DOMContentLoaded', () => {
        initializeZuluClock();
        mapInstance = L.map('combat-map-canvas', { zoomControl: false, attributionControl: false }).setView([currentAgentLat, currentAgentLng], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(mapInstance);

        dropTacticalMarkerNode(currentAgentLat, currentAgentLng, "PRIMARY OPERATIONAL HQ");
        autoTriggerDeviceTracking();
        listenToCloudSOSBeacons();
    });

    /* --- Supabase Realtime Listener --- */
    function listenToCloudSOSBeacons() {
        pushTerminalLog("SYNCHRONIZING INTERCEPT STREAM...", false);
        
        supabase.channel('sos_alerts')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'sos_alerts' }, (payload) => {
                const data = payload.new;
                if (!data) return;

                if (currentSessionOfficer && data.phone === currentSessionOfficer.phone) return;

                if (data.status === "ACTIVE") {
                    pushTerminalLog(`⚠️ ALERT: SOS RECEIVED FROM ${data.name.toUpperCase()}`, true);
                    if (sosMarkersMap[data.phone]) mapInstance.removeLayer(sosMarkersMap[data.phone]);

                    sosMarkersMap[data.phone] = L.marker([data.lat, data.lng], { icon: L.divIcon({ className: 'mad-tactical-pulse-blip', iconSize: [14,14], iconAnchor: [7,7] }) })
                        .addTo(mapInstance)
                        .bindPopup(`🚨 [SOS] ${data.name}<br>${data.rank}`);
                } else {
                    if (sosMarkersMap[data.phone]) {
                        mapInstance.removeLayer(sosMarkersMap[data.phone]);
                        delete sosMarkersMap[data.phone];
                    }
                }
            })
            .subscribe();
    }

    async function autoTriggerDeviceTracking() {
        if (navigator.geolocation) {
            motionTrackingWatcherId = navigator.geolocation.watchPosition(async (pos) => {
                currentAgentLat = pos.coords.latitude;
                currentAgentLng = pos.coords.longitude;
                
                // Update SOS in Supabase
                if (currentSessionOfficer && localStorage.getItem("active_sos_status") === "ACTIVE") {
                    await supabase.from('sos_alerts').upsert({
                        phone: currentSessionOfficer.phone,
                        name: currentSessionOfficer.name,
                        lat: currentAgentLat,
                        lng: currentAgentLng,
                        status: "ACTIVE"
                    });
                }
                // ... (rest of your existing tracking logic)
            });
        }
    }

    // ... (include your existing helper functions: dropTacticalMarkerNode, pushTerminalLog, etc.)
</script>
</body>
</html>
