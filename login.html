<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADRE - System Access Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <main class="gateway-wrapper">
        
        <div class="gateway-card">
            <div class="gateway-title-block">
                <img src="Cadre logo png.jpg" alt="CADRE Emblem" class="gateway-emblem">
                <h1 class="gateway-h1">CADRE Secure</h1>
                <p class="gateway-p">Authentication Protocol Required</p>
            </div>

            <form onsubmit="handlePortalLogin(event)">
                <div class="form-group">
                    <label>Registered Phone Number</label>
                    <input type="tel" id="login-phone" class="form-field" placeholder="e.g. 08123456789" required>
                </div>
                
                <div class="form-group">
                    <label>Security Access Code</label>
                    <input type="password" id="login-password" class="form-field" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-auth-action">Verify Credentials</button>
            </form>

            <div class="gateway-footer-link">
                <span style="color: var(--text-dim);">New Personnel?</span> 
                <a href="register.html">Initialize Profile</a>
            </div>
        </div>

    </main>
</div>

<script>
    function handlePortalLogin(e) {
        e.preventDefault();
        const phone = document.getElementById("login-phone").value.trim();
        const password = document.getElementById("login-password").value;

        const dbUserKey = `user_${phone}`;
        const localUserRecord = localStorage.getItem(dbUserKey);

        if (!localUserRecord) {
            alert("ACCESS DENIED: Phone coordinates not recognized.");
            return;
        }

        const parsedUser = JSON.parse(localUserRecord);

        if (parsedUser.password !== password) {
            alert("ACCESS DENIED: Invalid tactical authorization token.");
            return;
        }

        // Establish secure app session tokens
        localStorage.setItem("session_user", JSON.stringify(parsedUser));
        window.location.href = "home.html";
    }
</script>
</body>
</html>
