<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADRE - System Access Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="app-container">
    <main class="gateway-wrapper">
        <div class="gateway-card">
            <div class="gateway-title-block">
                <img src="Cadre logo png.jpg" alt="CADRE Emblem" class="gateway-emblem">
                <h1 class="gateway-h1">CADRE Secure</h1>
                <p class="gateway-p">Authentication Protocol Required</p>
            </div>

            <form id="portal-login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" class="form-field" placeholder="operator@cadre.com" required>
                </div>
                
                <div class="form-group">
                    <label>Security Access Code</label>
                    <input type="password" id="login-password" class="form-field" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-auth-action">Verify Credentials</button>
            </form>

            <div class="gateway-footer-link">
                <span style="color: var(--text-dim);">New Personnel?</span> 
                <a href="index.html">Initialize Profile</a>
            </div>
        </div>
    </main>
</div>

<script>
    // FIX: Renamed client to 'sbClient' to avoid conflict with global 'supabase'
    const supabaseUrl = 'https://ihroattnnnsckvvbosfz.supabase.co';
    const supabaseKey = 'sb_publishable_M0wwGKR9he08sEfHhZQQxA_vmnXS2eX';
    const sbClient = supabase.createClient(supabaseUrl, supabaseKey);

    document.getElementById("portal-login-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const email = document.getElementById("login-email").value.trim();
        const password = document.getElementById("login-password").value;

        // FIX: Use 'sbClient' to reference the initialized instance
        const { data, error } = await sbClient.auth.signInWithPassword({
            email: email,
            password: password,
        });

        if (error) {
            alert("ACCESS DENIED: " + error.message);
        } else {
            // Session is automatically saved by Supabase
            window.location.href = "home.html";
        }
    });
</script>
</body>
</html>
