<html lang="en">

<style>
.app-bottom-dock{
    display:grid !important;
    grid-template-columns:repeat(5,1fr) !important;
}
.dock-node-emergency{ color:#ff3333 !important; font-weight:700; }
.dock-node-emergency .dock-node-glyph{ animation:beacon-pulse 1.5s infinite ease-in-out; }
@keyframes beacon-pulse{
    0%,100%{ opacity:0.6; transform:scale(1); }
    50%{ opacity:1; transform:scale(1.15); }
}
.more-menu-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(4px);
    z-index:2100;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.25s ease;
}
.more-menu-overlay.active{
    opacity:1;
    pointer-events:auto;
}
.more-menu{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    z-index:2101;
    background:rgba(5,10,16,0.98);
    border-top:1px solid rgba(255,255,255,0.08);
    box-shadow:0 -18px 42px rgba(0,0,0,0.35);
    transform:translateY(110%);
    transition:transform 0.25s ease;
    max-height:84vh;
    overflow:hidden;
    border-radius:18px 18px 0 0;
}
.more-menu.active{
    transform:translateY(0);
}
.more-menu-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 18px 12px;
    border-bottom:1px solid rgba(255,255,255,0.08);
}
.more-menu-title{
    color:var(--text-bright);
    font-size:0.92rem;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
}
.more-menu-close{
    border:none;
    background:transparent;
    color:var(--text-dim);
    font-size:1.2rem;
    cursor:pointer;
    padding:8px;
}
.more-menu-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:12px;
    padding:16px 16px 18px;
}
.more-menu-item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 16px;
    background:rgba(17,32,46,0.95);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:14px;
    color:var(--text-bright);
    text-decoration:none;
    font-weight:700;
}
.more-menu-item:hover{
    background:rgba(255,255,255,0.06);
}
.more-menu-icon{
    font-size:1.25rem;
}
.more-menu-note{
    padding:0 16px 18px;
    color:var(--text-dim);
    font-size:0.78rem;
    line-height:1.5;
}
.dock-node-more{
    color:var(--hud-amber);
}
.feed-post-card{
    background:#101826; border:1px solid #1f2937;
    border-radius:14px; margin-bottom:20px;
    overflow:hidden; will-change:transform; contain:content;
}
.feed-post-header{
    display:flex; justify-content:space-between;
    align-items:center; padding:14px; gap:10px;
}
.feed-post-user{
    display:flex; align-items:center; gap:10px;
    cursor:pointer; flex:1; min-width:0;
}
.post-avatar{
    width:42px; height:42px; border-radius:50%;
    object-fit:cover; border:2px solid #1f2937;
    flex-shrink:0; background:#1e293b;
}
.feed-post-user-info{ display:flex; flex-direction:column; min-width:0; }
.feed-post-rank{
    font-weight:bold; color:white; font-size:14px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.feed-post-name{
    font-size:12px; color:#94a3b8;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.feed-post-caption{ padding:0 14px 14px; color:white; line-height:1.5; word-break:break-word; }
.feed-post-image{
    width:100%; display:block; max-height:500px;
    object-fit:cover; background:#1e293b; min-height:200px;
}
.delete-post-btn{
    background:#ff3333; border:none; color:white;
    padding:8px 12px; border-radius:8px; cursor:pointer;
    font-size:12px; font-weight:bold; flex-shrink:0;
}
.post-actions{
    display:flex; align-items:center; gap:10px;
    padding:12px 14px; border-top:1px solid #1f2937;
}
.like-btn{
    display:flex; align-items:center; gap:6px;
    background:#1e293b; border:1px solid #2563eb;
    color:#93c5fd; padding:8px 16px; border-radius:20px;
    cursor:pointer; font-weight:600; font-size:14px;
    transition:background 0.2s,color 0.2s,transform 0.1s;
}
.like-btn:hover{ background:#1e3a5f; }
.like-btn.liked{ background:#2563eb; color:white; border-color:#2563eb; }
.like-btn.liked:hover{ background:#1d4ed8; }
.like-btn:disabled{ opacity:0.5; cursor:not-allowed; }
.likes-count{ color:#94a3b8; font-size:13px; padding:0 14px 12px; }
.comment-box{ padding:14px; border-top:1px solid #1f2937; }
.comment-input-row{ display:flex; gap:8px; align-items:center; margin-bottom:12px; }
.comment-input-avatar{
    width:30px; height:30px; border-radius:50%;
    object-fit:cover; border:1px solid #1f2937; flex-shrink:0; background:#1e293b;
}
.comment-input{
    flex:1; padding:9px 12px; border:1px solid #1f2937;
    border-radius:20px; background:#0f172a; color:white;
    font-size:14px; outline:none; transition:border-color 0.2s;
}
.comment-input:focus{ border-color:#2563eb; }
.comment-btn{
    background:#2563eb; border:none; padding:9px 16px;
    border-radius:20px; color:white; cursor:pointer;
    font-weight:bold; font-size:13px; flex-shrink:0; transition:background 0.2s;
}
.comment-btn:hover{ background:#1d4ed8; }
.comment-btn:disabled{ opacity:0.5; cursor:not-allowed; }
.comment-item{ display:flex; gap:9px; align-items:flex-start; margin-top:10px; }
.comment-avatar{
    width:28px; height:28px; border-radius:50%;
    object-fit:cover; flex-shrink:0; background:#1e293b; border:1px solid #1f2937;
}
.comment-bubble{
    background:#1e293b; padding:9px 12px; border-radius:12px;
    border-top-left-radius:3px; flex:1; min-width:0;
}
.comment-author{ font-size:12px; font-weight:bold; color:#00f0ff; margin-bottom:3px; }
.comment-text{ font-size:13px; color:#e2e8f0; line-height:1.4; word-break:break-word; }
.skeleton-card{
    background:#101826; border:1px solid #1f2937;
    border-radius:14px; margin-bottom:20px; padding:14px;
}
.skeleton-line{
    background:linear-gradient(90deg,#1e293b 25%,#2d3f55 50%,#1e293b 75%);
    background-size:200% 100%; animation:shimmer 1.4s infinite;
    border-radius:6px; height:14px; margin-bottom:10px;
}
.skeleton-line.wide{ width:70%; }
.skeleton-line.narrow{ width:40%; }
.skeleton-block{
    background:linear-gradient(90deg,#1e293b 25%,#2d3f55 50%,#1e293b 75%);
    background-size:200% 100%; animation:shimmer 1.4s infinite;
    border-radius:6px; height:200px; margin-bottom:10px;
}
@keyframes shimmer{
    0%{ background-position:200% 0; }
    100%{ background-position:-200% 0; }
}
#load-more-btn{
    display:block; width:100%; padding:14px; background:#1e293b;
    color:#94a3b8; border:1px solid #1f2937; border-radius:14px;
    cursor:pointer; font-size:14px; margin-bottom:80px; transition:background 0.2s;
}
#load-more-btn:hover{ background:#2d3f55; color:white; }
#load-more-btn:disabled{ opacity:0.4; cursor:not-allowed; }

/* ── Search dropdown ── */
.search-results-box{
    position:absolute;
    top:auto;
    left:0;
    right:0;
    margin:0 15px;
    background:#0b1220;
    border:1px solid #1f2937;
    border-radius:12px;
    z-index:200;
    overflow:hidden;
    display:none;
    box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
.search-result-item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 14px;
    cursor:pointer;
    border-bottom:1px solid #1f2937;
    transition:background 0.15s;
}
.search-result-item:last-child{ border-bottom:none; }
.search-result-item:hover{ background:#1e293b; }
.search-result-avatar{
    width:38px;
    height:38px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #1f2937;
    flex-shrink:0;
    background:#1e293b;
}
.search-result-info{ display:flex; flex-direction:column; min-width:0; }
.search-result-name{
    font-weight:700;
    color:white;
    font-size:14px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}
.search-result-rank{
    font-size:12px;
    color:#00f0ff;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}
.search-no-results{
    padding:20px;
    text-align:center;
    color:#475569;
    font-size:13px;
    font-family:monospace;
    letter-spacing:1px;
}
.search-tray{ position:relative; }
</style>
</head>

<script>
/* ─────────────────────────────────────────────
   SUPABASE
───────────────────────────────────────────── */
const supabaseUrl = 'https://ihroattnnnsckvvbosfz.supabase.co';
const supabaseKey = 'sb_publishable_M0wwGKR9he08sEfHhZQQxA_vmnXS2eX';
const sbClient    = supabase.createClient(supabaseUrl, supabaseKey);

/* ─────────────────────────────────────────────
   STATE
───────────────────────────────────────────── */
let currentUser  = null;   // full row from users table
const likedSet   = new Set();
const pfpCache   = new Map();   // uid → pfpUrl
const nameCache  = new Map();   // uid → { name, rank, pfp }
const postCache  = new Map();
let base64ImageString = "";
const PAGE_SIZE  = 10;
let currentPage  = 0;
let allLoaded    = false;
let realtimeDebounceTimer = null;

const DEFAULT_AVATAR = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='42' height='42' viewBox='0 0 24 24' fill='%23648299'><circle cx='12' cy='8' r='4'/><path d='M12 14c-4 0-7 2-7 5v3h14v-3c0-3-3-5-7-5z'/></svg>";

function tryParse(v) { try { return JSON.parse(v); } catch { return null; } }
function escHtml(str) {
    return String(str)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
}

/* ─────────────────────────────────────────────
   SESSION RESOLUTION
───────────────────────────────────────────── */
async function resolveSession() {
    let uid = localStorage.getItem("cadre_uid");

    if (!uid) {
        for (const key of ["session_user","user","officer","currentUser"]) {
            const p = tryParse(localStorage.getItem(key));
            if (p && p.id) { uid = p.id; break; }
        }
    }

    if (!uid) {
        const stored = tryParse(localStorage.getItem("supabase_session"));
        if (stored && stored.user && stored.user.id) uid = stored.user.id;
    }

    if (!uid) {
        try {
            const { data: { session } } = await sbClient.auth.getSession();
            if (session && session.user) uid = session.user.id;
        } catch(e) {}
    }

    if (uid) localStorage.setItem("cadre_uid", uid);
    return uid;
}

/* ─────────────────────────────────────────────
   USER INFO CACHE
───────────────────────────────────────────── */
async function getUserInfo(userId) {
    if (!userId) return null;
    if (nameCache.has(userId)) return nameCache.get(userId);

    const { data } = await sbClient
        .from('users')
        .select('id, name, rank, pfp, email')
        .eq('id', userId)
        .maybeSingle();

    const info = data || null;
    if (info) nameCache.set(userId, info);
    return info;
}

/* ─────────────────────────────────────────────
   LIKED POSTS
───────────────────────────────────────────── */
async function loadMyLikes(userId) {
    const { data } = await sbClient
        .from('post_likes')
        .select('post_id')
        .eq('user_id', userId);
    if (data) data.forEach(row => likedSet.add(String(row.post_id)));
}

function hasLiked(postId) { return likedSet.has(String(postId)); }

async function markLikedInDB(postId) {
    await sbClient.from('post_likes').insert({
        post_id: String(postId),
        user_id: currentUser.id
    });
    likedSet.add(String(postId));
}

/* ─────────────────────────────────────────────
   BOOT
───────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', async () => {

    const uid = await resolveSession();
    if (!uid) { window.location.href = "login.html"; return; }

    const { data: profile, error: profileErr } = await sbClient
        .from('users')
        .select('*')
        .eq('id', uid)
        .single();

    if (profileErr || !profile) {
        console.error("Profile fetch failed:", profileErr);
        try {
            const { data: { user } } = await sbClient.auth.getUser();
            if (user) {
                const { error: createErr } = await sbClient.from('users').insert({
                    id:    user.id,
                    name:  user.user_metadata?.name  || 'UNKNOWN',
                    rank:  user.user_metadata?.rank  || 'UNIT',
                    email: user.email
                });
                if (!createErr) { window.location.reload(); return; }
            }
        } catch(e) { console.error("Recovery attempt failed:", e); }
        window.location.href = "login.html";
        return;
    }

    currentUser = profile;
    nameCache.set(uid, profile);

    document.getElementById("officer-header-tag").textContent = profile.rank || 'UNIT';

    if (profile.pfp) {
        document.getElementById("composer-avatar").src = profile.pfp;
        pfpCache.set(uid, profile.pfp);
    }

    const adminButton = document.getElementById("admin-btn");
    if (adminButton) adminButton.addEventListener("click", checkAdminAccess);

    const moreDockBtn      = document.getElementById("more-dock-btn");
    const moreMenuClose    = document.getElementById("more-menu-close");
    const moreMenuOverlay  = document.getElementById("more-menu-overlay");
    const moreAdminItem    = document.querySelector("[data-more-admin-item]");
    const moreMenu         = document.getElementById("more-menu");

    if (moreDockBtn)     moreDockBtn.addEventListener("click", () => toggleMoreMenu(true));
    if (moreMenuClose)   moreMenuClose.addEventListener("click", () => toggleMoreMenu(false));
    if (moreMenuOverlay) moreMenuOverlay.addEventListener("click", () => toggleMoreMenu(false));

    document.addEventListener("keydown", function(event) {
        if (event.key === 'Escape' && moreMenu && moreMenu.classList.contains('active')) {
            event.preventDefault();
            toggleMoreMenu(false);
        }
    });

    if (moreAdminItem) {
        const isAdmin = currentUser && (currentUser.admin || currentUser.is_admin || currentUser.role === 'admin');
        moreAdminItem.style.display = isAdmin ? 'flex' : 'none';
    }

    await Promise.all([
        loadMyLikes(uid),
        backfillMyPosts(uid),
        loadPostsPage(0)
    ]);

    if (window.CADRE && window.CADRE.ai) CADRE.ai.welcome(currentUser);

    sbClient
        .channel('public:ig_feed_posts')
        .on('postgres_changes',
            { event: '*', schema: 'public', table: 'ig_feed_posts' },
            scheduleRealtimeRefresh)
        .subscribe();
});

/* ─────────────────────────────────────────────
   BACKFILL
───────────────────────────────────────────── */
async function backfillMyPosts(uid) {
    try {
        const { data: myPosts } = await sbClient
            .from('ig_feed_posts')
            .select('id, name')
            .is('user_id', null)
            .eq('name', currentUser.name);
        if (!myPosts || myPosts.length === 0) return;
        await sbClient
            .from('ig_feed_posts')
            .update({ user_id: uid, rank: currentUser.rank })
            .is('user_id', null)
            .eq('name', currentUser.name);
    } catch(e) {}
}

/* ─────────────────────────────────────────────
   POSTS — LOAD PAGE
───────────────────────────────────────────── */
async function loadPostsPage(page) {
    const container = document.getElementById("instagram-stream");
    if (page === 0) showSkeletons(container, 3);

    const from = page * PAGE_SIZE;
    const to   = from + PAGE_SIZE - 1;

    const { data: posts, error } = await sbClient
        .from('ig_feed_posts')
        .select('*')
        .order('timestamp', { ascending: false })
        .range(from, to);

    if (page === 0) container.innerHTML = '';

    if (error) {
        container.innerHTML = '<div style="padding:20px;color:#ff6b6b;">FAILED TO LOAD POSTS: ' + error.message + '</div>';
        return;
    }

    if (!posts || posts.length === 0) {
        if (page === 0) container.innerHTML = '<div style="text-align:center;padding:40px;color:#666;">NO ARCHIVED LOGS AVAILABLE.</div>';
        allLoaded = true;
        document.getElementById("load-more-btn").style.display = 'none';
        return;
    }

    const fragment = document.createDocumentFragment();
    const cards = await Promise.all(posts.map(async post => {
        postCache.set(post.id, post);
        return await buildPostCard(post);
    }));
    cards.forEach(card => fragment.appendChild(card));
    container.appendChild(fragment);

    allLoaded = posts.length < PAGE_SIZE;
    currentPage = page;

    const loadMoreBtn = document.getElementById("load-more-btn");
    loadMoreBtn.style.display = allLoaded ? 'none' : 'block';
    loadMoreBtn.disabled = false;
    loadMoreBtn.textContent = 'Load more posts';
}

async function loadMorePosts() {
    if (allLoaded) return;
    const btn = document.getElementById("load-more-btn");
    btn.disabled = true;
    btn.textContent = 'Loading...';
    await loadPostsPage(currentPage + 1);
}

/* ─────────────────────────────────────────────
   BUILD POST CARD
───────────────────────────────────────────── */
async function buildPostCard(post) {
    let posterInfo = null;

    if (post.user_id) posterInfo = await getUserInfo(post.user_id);

    if (!posterInfo && post.name) {
        const { data } = await sbClient
            .from('users')
            .select('id, name, rank, pfp')
            .eq('name', post.name)
            .maybeSingle();
        if (data) {
            posterInfo = data;
            nameCache.set(data.id, data);
            sbClient.from('ig_feed_posts').update({ user_id: data.id }).eq('id', post.id).then(() => {});
        }
    }

    const posterName = (posterInfo && posterInfo.name) || post.name || 'UNKNOWN';
    const posterRank = (posterInfo && posterInfo.rank) || post.rank || 'UNIT';
    const posterPfp  = (posterInfo && posterInfo.pfp)  || null;
    const posterId   = (posterInfo && posterInfo.id)   || post.user_id || null;

    console.log('[POST', post.id, '] user_id:', post.user_id,
                '| posterInfo:', posterInfo,
                '| name:', posterName, '| rank:', posterRank, '| pfp:', posterPfp);

    const canDelete = currentUser && post.user_id && currentUser.id === post.user_id;

    const likes        = Number(post.likes ?? 0);
    const comments     = Array.isArray(post.comments) ? post.comments : [];
    const alreadyLiked = hasLiked(post.id);

    const article = document.createElement('article');
    article.className = 'feed-post-card';
    article.id = 'post-' + post.id;

    const header = document.createElement('div');
    header.className = 'feed-post-header';

    const userDiv = document.createElement('div');
    userDiv.className = 'feed-post-user';
    userDiv.onclick = function() { openProfile(posterId); };

    const avatar = document.createElement('img');
    avatar.className = 'post-avatar';
    avatar.src = posterPfp || DEFAULT_AVATAR;
    avatar.alt = posterName;
    userDiv.appendChild(avatar);

    const userInfo = document.createElement('div');
    userInfo.className = 'feed-post-user-info';
    userInfo.innerHTML =
        '<span class="feed-post-rank">' + escHtml(posterRank) + '</span>' +
        '<span class="feed-post-name">' + escHtml(posterName) + '</span>';
    userDiv.appendChild(userInfo);
    header.appendChild(userDiv);

    if (canDelete) {
        const delBtn = document.createElement('button');
        delBtn.className = 'delete-post-btn';
        delBtn.textContent = 'Delete';
        delBtn.onclick = function() { deletePost(post.id); };
        header.appendChild(delBtn);
    }
    article.appendChild(header);

    if (post.caption) {
        const cap = document.createElement('div');
        cap.className = 'feed-post-caption';
        cap.textContent = post.caption;
        article.appendChild(cap);
    }

    if (post.image) {
        const img = document.createElement('img');
        img.className = 'feed-post-image';
        img.decoding  = 'async';
        img.src = post.image;
        img.alt = 'Post media';
        article.appendChild(img);
    }

    const actions = document.createElement('div');
    actions.className = 'post-actions';
    const likeBtn = document.createElement('button');
    likeBtn.className = 'like-btn' + (alreadyLiked ? ' liked' : '');
    likeBtn.id = 'like-btn-' + post.id;
    likeBtn.innerHTML = alreadyLiked ? '👍 Liked' : '👍 Like';
    likeBtn.disabled  = alreadyLiked;
    likeBtn.onclick   = function() { likePost(post.id); };
    actions.appendChild(likeBtn);
    article.appendChild(actions);

    const likesDiv = document.createElement('div');
    likesDiv.className = 'likes-count';
    likesDiv.id = 'likes-count-' + post.id;
    likesDiv.textContent = likes + ' ' + (likes === 1 ? 'Like' : 'Likes');
    article.appendChild(likesDiv);

    const commentBox = document.createElement('div');
    commentBox.className = 'comment-box';

    const myPfp = currentUser?.pfp || DEFAULT_AVATAR;
    const inputRow = document.createElement('div');
    inputRow.className = 'comment-input-row';

    const myAvatar = document.createElement('img');
    myAvatar.className = 'comment-input-avatar';
    myAvatar.src = myPfp;
    myAvatar.alt = 'You';
    inputRow.appendChild(myAvatar);

    const commentInput = document.createElement('input');
    commentInput.type        = 'text';
    commentInput.id          = 'comment-' + post.id;
    commentInput.className   = 'comment-input';
    commentInput.placeholder = 'Write a comment...';
    commentInput.addEventListener('keydown', function(e) {
        handleTypingSound();
        if (e.key === 'Enter') addComment(post.id);
    });
    inputRow.appendChild(commentInput);

    const commentBtn = document.createElement('button');
    commentBtn.className   = 'comment-btn';
    commentBtn.id          = 'comment-btn-' + post.id;
    commentBtn.textContent = 'Post';
    commentBtn.onclick     = function() { addComment(post.id); };
    inputRow.appendChild(commentBtn);
    commentBox.appendChild(inputRow);

    const commentsContainer = document.createElement('div');
    commentsContainer.id = 'comments-list-' + post.id;
    await renderCommentsList(commentsContainer, comments);
    commentBox.appendChild(commentsContainer);

    article.appendChild(commentBox);
    return article;
}

/* ─────────────────────────────────────────────
   PATCH — live update without full rebuild
───────────────────────────────────────────── */
function patchPostCard(post) {
    const likesEl = document.getElementById('likes-count-' + post.id);
    if (likesEl) {
        const n = Number(post.likes ?? 0);
        likesEl.textContent = n + ' ' + (n === 1 ? 'Like' : 'Likes');
    }
    const commentsEl = document.getElementById('comments-list-' + post.id);
    if (commentsEl) {
        const comments = Array.isArray(post.comments) ? post.comments : [];
        renderCommentsList(commentsEl, comments);
    }
}

/* ─────────────────────────────────────────────
   RENDER COMMENTS
───────────────────────────────────────────── */
async function renderCommentsList(container, comments) {
    container.innerHTML = '';
    if (!comments || comments.length === 0) return;

    const frag = document.createDocumentFragment();
    for (const c of comments) {
        const item = document.createElement('div');
        item.className = 'comment-item';

        let authorName = '', authorId = '', commentText = c;
        if (typeof c === 'string' && c.includes('||')) {
            const parts = c.split('||');
            authorName  = parts[0] || '';
            authorId    = parts[1] || '';
            commentText = parts[2] || '';
        }

        let pfpSrc = DEFAULT_AVATAR;
        if (authorId) {
            const info = await getUserInfo(authorId);
            if (info) {
                authorName = info.name || authorName;
                pfpSrc = info.pfp || DEFAULT_AVATAR;
            }
        }

        const avatarImg = document.createElement('img');
        avatarImg.className = 'comment-avatar';
        avatarImg.src = pfpSrc;
        avatarImg.alt = authorName || 'Operator';
        item.appendChild(avatarImg);

        const bubble = document.createElement('div');
        bubble.className = 'comment-bubble';
        if (authorName) {
            const nameEl = document.createElement('div');
            nameEl.className = 'comment-author';
            nameEl.textContent = authorName;
            bubble.appendChild(nameEl);
        }
        const textEl = document.createElement('div');
        textEl.className = 'comment-text';
        textEl.textContent = commentText;
        bubble.appendChild(textEl);

        item.appendChild(bubble);
        frag.appendChild(item);
    }
    container.appendChild(frag);
}

async function prependPostCard(post) {
    const container = document.getElementById("instagram-stream");
    const card = await buildPostCard(post);
    card.style.opacity    = '0';
    card.style.transform  = 'translateY(-12px)';
    card.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
    container.prepend(card);
    requestAnimationFrame(function() {
        card.style.opacity   = '1';
        card.style.transform = 'translateY(0)';
    });
}

/* ─────────────────────────────────────────────
   REALTIME
───────────────────────────────────────────── */
function scheduleRealtimeRefresh(payload) {
    clearTimeout(realtimeDebounceTimer);
    realtimeDebounceTimer = setTimeout(function() {
        handleRealtimeEvent(payload);
    }, 300);
}

async function handleRealtimeEvent(payload) {
    const { eventType, new: newRow, old: oldRow } = payload;
    if (eventType === 'DELETE') {
        const id = oldRow && oldRow.id;
        if (id) {
            postCache.delete(id);
            const el = document.getElementById('post-' + id);
            if (el) el.remove();
        }
        return;
    }
    if (eventType === 'INSERT') {
        if (currentPage === 0 || postCache.size < PAGE_SIZE) {
            postCache.set(newRow.id, newRow);
            await prependPostCard(newRow);
        }
        return;
    }
    if (eventType === 'UPDATE') {
        postCache.set(newRow.id, newRow);
        patchPostCard(newRow);
        return;
    }
}

/* ─────────────────────────────────────────────
   SKELETON
───────────────────────────────────────────── */
function showSkeletons(container, count) {
    container.innerHTML = '';
    for (var i = 0; i < count; i++) {
        container.innerHTML +=
            '<div class="skeleton-card">' +
            '<div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;">' +
            '<div style="width:42px;height:42px;border-radius:50%;background:linear-gradient(90deg,#1e293b 25%,#2d3f55 50%,#1e293b 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;"></div>' +
            '<div style="flex:1;"><div class="skeleton-line narrow"></div><div class="skeleton-line" style="width:50%;"></div></div>' +
            '</div><div class="skeleton-block"></div><div class="skeleton-line narrow"></div></div>';
    }
}

/* ─────────────────────────────────────────────
   CREATE POST
───────────────────────────────────────────── */
async function submitInstagramPost() {
    const caption    = document.getElementById("post-input").value.trim();
    const imageValue = base64ImageString || null;

    if (!caption && !imageValue) { alert("Write something or add image"); return; }

    const postBtn = document.querySelector('.btn-post');
    postBtn.disabled = true;
    postBtn.textContent = 'Sending...';

    if (!currentUser || !currentUser.id) {
        alert("Session error — please log out and back in.");
        postBtn.disabled = false;
        postBtn.textContent = 'Broadcast';
        return;
    }

    const newPost = {
        user_id:   currentUser.id,
        name:      currentUser.name  || 'UNKNOWN',
        rank:      currentUser.rank  || 'UNIT',
        caption,
        image:     imageValue,
        likes:     0,
        comments:  [],
        timestamp: Date.now()
    };

    const { data: inserted, error } = await sbClient
        .from('ig_feed_posts')
        .insert(newPost)
        .select()
        .single();

    postBtn.disabled = false;
    postBtn.textContent = 'Broadcast';

    if (error) { console.error("POST ERROR:", error); alert("Post failed: " + error.message); return; }

    document.getElementById("post-input").value = "";
    base64ImageString = "";
    const preview = document.getElementById("post-img-preview");
    preview.src = "";
    preview.style.display = "none";

    if (window.SFX && typeof SFX.transmit === 'function') SFX.transmit();

    const postToShow = inserted || newPost;
    if (!postToShow.id) postToShow.id = 'temp-' + Date.now();
    postCache.set(postToShow.id, postToShow);
    await prependPostCard(postToShow);
}

/* ─────────────────────────────────────────────
   DELETE POST
───────────────────────────────────────────── */
async function deletePost(postId) {
    const confirmed = confirm("Delete this transmission? This cannot be undone.");
    if (!confirmed) return;

    const card = document.getElementById('post-' + postId);
    if (card) {
        card.style.transition = 'opacity 0.25s ease, transform 0.25s ease';
        card.style.opacity = '0';
        card.style.transform = 'scale(0.97)';
        setTimeout(function() { card.remove(); }, 250);
    }

    const { error } = await sbClient.from('ig_feed_posts').delete().eq('id', postId);
    if (error) {
        console.error("DELETE ERROR:", error);
        if (card) { card.style.opacity = '1'; card.style.transform = 'scale(1)'; }
        alert("Delete failed: " + error.message);
    } else {
        postCache.delete(postId);
    }
}

/* ─────────────────────────────────────────────
   LIKE POST
───────────────────────────────────────────── */
async function likePost(postId) {
    if (hasLiked(postId)) return;

    const btn = document.getElementById('like-btn-' + postId);
    if (btn) btn.disabled = true;

    const { data: existingLike } = await sbClient
        .from('post_likes')
        .select('post_id')
        .eq('post_id', String(postId))
        .eq('user_id', currentUser.id)
        .maybeSingle();

    if (existingLike) {
        likedSet.add(String(postId));
        if (btn) { btn.classList.add('liked'); btn.innerHTML = '👍 Liked'; btn.disabled = true; }
        return;
    }

    const cached   = postCache.get(postId);
    const oldLikes = Number(cached && cached.likes ? cached.likes : 0);
    const newLikes = oldLikes + 1;

    const likesEl = document.getElementById('likes-count-' + postId);
    if (likesEl) likesEl.textContent = newLikes + ' ' + (newLikes === 1 ? 'Like' : 'Likes');

    const { error } = await sbClient
        .from('ig_feed_posts').update({ likes: newLikes }).eq('id', postId);

    if (error) {
        console.error("LIKE ERROR:", error);
        if (likesEl) likesEl.textContent = oldLikes + ' ' + (oldLikes === 1 ? 'Like' : 'Likes');
        if (btn) btn.disabled = false;
        return;
    }

    await markLikedInDB(postId);
    if (cached) cached.likes = newLikes;

    if (btn) { btn.classList.add('liked'); btn.innerHTML = '👍 Liked'; btn.disabled = true; }
}

/* ─────────────────────────────────────────────
   COMMENT
───────────────────────────────────────────── */
async function addComment(postId) {
    const input = document.getElementById('comment-' + postId);
    const text  = input.value.trim();
    if (!text) return;

    const btn = document.getElementById('comment-btn-' + postId);
    if (btn) btn.disabled = true;

    const cached   = postCache.get(postId);
    const comments = Array.isArray(cached && cached.comments ? cached.comments : [])
        ? [...(cached.comments || [])] : [];

    const commentEntry = currentUser.name + '||' + currentUser.id + '||' + text;
    comments.push(commentEntry);

    const { error } = await sbClient
        .from('ig_feed_posts').update({ comments }).eq('id', postId);

    if (btn) btn.disabled = false;
    if (error) { console.error("COMMENT ERROR:", error); return; }

    if (cached) cached.comments = comments;

    const commentsContainer = document.getElementById('comments-list-' + postId);
    if (commentsContainer) await renderCommentsList(commentsContainer, comments);
    input.value = "";
}

/* ─────────────────────────────────────────────
   HELPERS
───────────────────────────────────────────── */
function openProfile(userId) {
    if (!userId) return;
    window.location.href = 'profile.html?uid=' + encodeURIComponent(userId);
}

function checkAdminAccess(event) {
    event.preventDefault();
    const password = prompt("ENTER COMMANDER AUTHORIZATION CODE:");
    if (password === "CDR123") {
        window.location.href = "admin.html";
    } else if (password !== null) {
        alert("ACCESS DENIED");
    }
}

function toggleMoreMenu(show) {
    const moreMenu = document.getElementById("more-menu");
    const overlay  = document.getElementById("more-menu-overlay");
    if (!moreMenu || !overlay) return;

    if (show) {
        moreMenu.classList.add("active");
        overlay.classList.add("active");
        moreMenu.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
    } else {
        moreMenu.classList.remove("active");
        overlay.classList.remove("active");
        moreMenu.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
    }
}

function previewSelectedImage(input) {
    if (!input.files[0]) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        base64ImageString = e.target.result;
        const preview = document.getElementById("post-img-preview");
        preview.src = base64ImageString;
        preview.style.display = "block";
    };
    reader.readAsDataURL(input.files[0]);
}

function handleTypingSound() {
    if (window.SFX && typeof SFX.type === 'function') SFX.type();
}
