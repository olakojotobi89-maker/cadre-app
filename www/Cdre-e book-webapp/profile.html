<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADRE - Terminal Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    
    <header class="app-header">
        <div class="brand-wrapper">
            <img src="Cadre logo png.jpg" alt="CADRE" class="brand-logo">
            <span class="brand-text">HQ ARCHIVE</span>
        </div>
    </header>

    <main class="profile-wrapper">
        <div class="radar-avatar-zone" onclick="triggerPfpInput()">
            <div class="radar-ring">
                <img id="pfp-view-target" class="pfp-display" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 24 24' fill='%23648299'><circle cx='12' cy='8' r='4'/><path d='M12 14c-6.1 0-10 4-10 4v2h20v-2s-3.9-4-10-4z'/></svg>">
            </div>
            <div class="status-pill-badge">Active</div>
        </div>
        
        <input type="file" id="pfp-file-controller" accept="image/*" style="display: none;" onchange="processProfilePicture(this)">

        <section class="terminal-data-card">
            <div class="data-row-entry"><label>Name</label><span id="id-name">—</span></div>
            <div class="data-row-entry"><label>Rank</label><span id="id-rank">—</span></div>
            <div class="data-row-entry"><label>Phone</label><span id="id-phone">—</span></div>
        </section>

        <section class="action-menu-container">
            <div class="menu-action-node"><span>📡</span><span>System Notifications</span></div>
            <div class="menu-action-node"><span>🗃️</span><span>View Duty Roster</span></div>
        </section>

        <button class="btn-terminal-logout" onclick="executeDeviceLogout()">
            <span>Clear Access Session</span><span>🔒</span>
        </button>
    </main>

    <nav class="app-bottom-dock">
        <a href="home.html" class="dock-node"><span class="dock-node-glyph">🏠</span><span>Feed</span></a>
        <a href="ebook.html" class="dock-node"><span class="dock-node-glyph">📖</span><span>eBook</span></a>
        <a href="profile.html" class="dock-node active-node"><span class="dock-node-glyph">👤</span><span>Profile</span></a>
    </nav>
</div>

<script>
    let sessionOfficer = null;

    window.onload = function() {
        const localSession = localStorage.getItem("session_user");
        if (!localSession) {
            window.location.href = "login.html";
            return;
        }
        sessionOfficer = JSON.parse(localSession);
        refreshProfileData();
    };

    function refreshProfileData() {
        const dbRecord = localStorage.getItem(`user_${sessionOfficer.phone}`);
        if (dbRecord) {
            const currentRecord = JSON.parse(dbRecord);
            document.getElementById("id-name").textContent = currentRecord.name;
            document.getElementById("id-rank").textContent = currentRecord.rank;
            document.getElementById("id-phone").textContent = currentRecord.phone;
            if (currentRecord.pfp) {
                document.getElementById("pfp-view-target").src = currentRecord.pfp;
            }
        }
    }

    function triggerPfpInput() { document.getElementById("pfp-file-controller").click(); }

    function processProfilePicture(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Image = e.target.result;
                document.getElementById("pfp-view-target").src = base64Image;

                const dbKey = `user_${sessionOfficer.phone}`;
                const userObj = JSON.parse(localStorage.getItem(dbKey));
                userObj.pfp = base64Image;
                localStorage.setItem(dbKey, JSON.stringify(userObj));
                localStorage.setItem("session_user", JSON.stringify(userObj));
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function executeDeviceLogout() {
        localStorage.removeItem("session_user");
        window.location.href = "login.html";
    }
</script>
</body>
</html>
