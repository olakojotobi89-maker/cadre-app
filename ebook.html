<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CADRE - Operational Library</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* ===== TACTICAL HISTORY MODULE ===== */

.history-module {
background: #101826;
border: 1px solid #1f2937;
border-radius: 14px;
margin-bottom: 15px;
overflow: hidden;
position: relative;
cursor: pointer;
transition: 0.3s;
}

.history-module:hover {
transform: scale(1.01);
border-color: #00f0ff;
}

.history-header {
padding: 15px;
display: flex;
justify-content: space-between;
align-items: center;
font-weight: bold;
color: white;
background: linear-gradient(90deg, #0f172a, #101826);
position: relative;
overflow: hidden;
}

.history-header::before {
content: "";
position: absolute;
top: 0;
left: -100%;
width: 100%;
height: 2px;
background: #00f0ff;
animation: scan 3s linear infinite;
}

@keyframes scan {
0% { left: -100%; }
100% { left: 100%; }
}

.history-body {
padding: 15px;
color: #cbd5e1;
line-height: 1.6;
white-space: pre-wrap;
display: none;
min-height: 80px;
animation: fadeIn 0.4s ease-in-out;
}

@keyframes fadeIn {
from { opacity: 0; transform: translateY(-10px); }
to { opacity: 1; transform: translateY(0); }
}

/* ===== TYPEWRITER ===== */

.typing-cursor {
display: inline-block;
width: 10px;
background: #00f0ff;
margin-left: 3px;
animation: blink 0.8s infinite;
}

@keyframes blink {
0%,100% { opacity: 1; }
50% { opacity: 0; }
}

.accordion-arrow-indicator {
color: #00f0ff;
}

</style>
</head>

<body>

</div>

<script>

const supabaseUrl = 'https://ihroattnnnsckvvbosfz.supabase.co';
const supabaseKey = 'sb_publishable_M0wwGKR9he08sEfHhZQQxA_vmnXS2eX';
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

/* ================= TYPEWRITER ENGINE ================= */

function typeWriter(el, text, speed = 12) {
let i = 0;
el.innerHTML = "";

const cursor = document.createElement("span");
cursor.className = "typing-cursor";
el.appendChild(cursor);

function type() {
if (i < text.length) {
cursor.insertAdjacentText("beforebegin", text.charAt(i));
i++;
setTimeout(type, speed);
} else {
cursor.remove();
}
}

type();
}

/* ================= TOGGLE MODULE ================= */

function toggleHistory(el) {
const body = el.querySelector(".history-body");
const arrow = el.querySelector(".accordion-arrow-indicator");

if (body.style.display === "block") {
body.style.display = "none";
arrow.textContent = "▼";
return;
}

body.style.display = "block";
arrow.textContent = "▲";

const fullText = body.getAttribute("data-fulltext");
typeWriter(body, fullText, 10);
}

/* ================= LOAD SYSTEM ================= */

window.addEventListener('DOMContentLoaded', () => {
if (!localStorage.getItem("session_user")) {
window.location.href = "login.html";
return;
}
streamOperationalManuals();
});

async function streamOperationalManuals() {

const container = document.getElementById("library-content-container");

const { data: manuals, error } = await supabaseClient
.from('ebook_modules')
.select('*')
.order('order', { ascending: true });

if (error) {
container.innerHTML = `<div style="color:red;text-align:center;">FAILED TO LOAD</div>`;
return;
}

container.innerHTML = "";

if (!manuals || manuals.length === 0) {
container.innerHTML = `<div style="text-align:center;color:#666;">NO MANUALS FOUND</div>`;
return;
}

manuals.forEach(manual => {

const div = document.createElement("div");
div.className = "history-module";

div.innerHTML = `
<div class="history-header" onclick="toggleHistory(this)">
${manual.title || "UNTITLED"}
<span class="accordion-arrow-indicator">▼</span>
</div>
<div class="history-body" data-fulltext="${(manual.content || "").replace(/"/g, '&quot;')}">
</div>
`;

container.appendChild(div);
});

}

</script>
<script src="ai-voice.js"></script>
</body>
