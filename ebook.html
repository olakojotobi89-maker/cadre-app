<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CADRE - Operational Library</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="app-container">
    
    <header class="app-header">
        <div class="brand-wrapper">
            <img src="Cadre logo png.jpg" alt="CADRE" class="brand-logo">
            <span class="brand-text">LIBRARY DECK</span>
        </div>
    </header>

    <main class="library-wrapper">
        <h3 class="section-title">Operational Manuals</h3>
        
        <div style="margin-bottom: 20px; display: flex; gap: 8px;">
            <input type="text" id="library-search" class="search-input" placeholder="Filter operational manuals by keyword..." oninput="filterLibraryModules(this.value)">
        </div>
        
        <div id="library-content-container">
            <div style="text-align:center; padding:40px; color:var(--text-dim); font-size:0.8rem;" id="library-loader">
                CONNECTING TO OPERATIONS DATA STREAM...
            </div>
        </div>
    </main>

    <nav class="app-bottom-dock">
        <a href="home.html" class="dock-node"><span class="dock-node-glyph">🏠</span><span>Feed</span></a>
        <a href="ebook.html" class="dock-node active-node"><span class="dock-node-glyph">📖</span><span>eBook</span></a>
        <a href="profile.html" class="dock-node"><span class="dock-node-glyph">👤</span><span>Profile</span></a>
    </nav>
</div>

<script>
    // Supabase Configuration
    const supabaseUrl = 'https://ihroattnnnsckvvbosfz.supabase.co';
    const supabaseKey = 'sb_publishable_M0wwGKR9he08sEfHhZQQxA_vmnXS2eX';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    window.toggleLibraryAccordion = toggleLibraryAccordion;
    window.filterLibraryModules = filterLibraryModules;

    window.addEventListener('DOMContentLoaded', () => {
        if (!localStorage.getItem("session_user")) {
            window.location.href = "login.html";
            return;
        }
        streamOperationalManuals();
    });

    /**
     * Real-Time Documentation Database Synchronization Engine
     */
    async function streamOperationalManuals() {
        const targetContainer = document.getElementById("library-content-container");
        
        // Fetch data from Supabase
        const { data: manuals, error } = await supabase
            .from('ebook_modules')
            .select('*')
            .order('order', { ascending: true });

        if (error) {
            console.error("Manual registry connection failure: ", error);
            targetContainer.innerHTML = `<div style="text-align:center; padding:40px; color:var(--hud-crimson); font-size:0.8rem;">LINK ERROR: ABORTED METRIC ACQUISITION.</div>`;
            return;
        }

        targetContainer.innerHTML = "";

        if (!manuals || manuals.length === 0) {
            targetContainer.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-dim); font-size:0.8rem;">NO OPERATIONAL MANUALS FOUND IN REGISTRY.</div>`;
            return;
        }

        manuals.forEach((manual) => {
            const title = manual.title ? manual.title.toUpperCase() : "UNTITLED OPERATIONAL MANUAL";
            const content = manual.content ? manual.content : "No documentation details supplied for this segment node.";
            const keywords = manual.keywords ? manual.keywords.toLowerCase() : "";

            const docItem = document.createElement("div");
            docItem.className = "doc-item searchable-module-node";
            docItem.setAttribute("data-keywords", keywords);
            
            docItem.innerHTML = `
                <div class="doc-header" onclick="toggleLibraryAccordion(this)">
                    <span>${escapeHTML(title)}</span>
                    <span class="accordion-arrow-indicator">▼</span>
                </div>
                <div class="doc-body" style="display: none;">
                    <div class="article-block">
                        <p style="white-space: pre-wrap; line-height: 1.5;">${escapeHTML(content)}</p>
                    </div>
                </div>
            `;
            
            targetContainer.appendChild(docItem);
        });
    }

    function toggleLibraryAccordion(headerElement) {
        const bodyTarget = headerElement.nextElementSibling;
        const arrowTarget = headerElement.querySelector(".accordion-arrow-indicator");
        
        if (bodyTarget.style.display === "block") {
            bodyTarget.style.display = "none";
            arrowTarget.textContent = "▼";
        } else {
            bodyTarget.style.display = "block";
            arrowTarget.textContent = "▲";
        }
    }

    function filterLibraryModules(searchQuery) {
        const structuralCleanQuery = searchQuery.toLowerCase().trim();
        const activeModuleNodes = document.querySelectorAll('.searchable-module-node');
        
        activeModuleNodes.forEach(node => {
            const analyticalKeywords = node.getAttribute('data-keywords') || '';
            const internalTextString = node.textContent.toLowerCase();
            
            if (internalTextString.includes(structuralCleanQuery) || analyticalKeywords.includes(structuralCleanQuery)) {
                node.style.display = "block";
                if (structuralCleanQuery.length > 2) {
                    node.querySelector('.doc-body').style.display = "block";
                    node.querySelector('.accordion-arrow-indicator').textContent = "▲";
                }
            } else {
                node.style.display = "none";
            }
        });
    }

    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
    }
</script>
</body>
</html>
