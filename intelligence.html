<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>CADRE // INTELLIGENCE</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Rajdhani:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    margin: 0;
    font-family: Rajdhani, sans-serif;
    background: #0a0a0a;
    color: #d1d1d1;
    overflow: hidden;
}

/* HEADER (cloned style base) */
.header {
    height: 60px;
    background: #050505;
    border-bottom: 1px solid rgba(255,0,0,0.2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
}

.logo {
    font-family: Orbitron;
    color: #ff2a2a;
    font-weight: 700;
    letter-spacing: 2px;
}

.nav {
    display: flex;
    gap: 20px;
    font-size: 14px;
    color: #aaa;
}

/* MAIN LAYOUT */
.container {
    display: flex;
    height: calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar {
    width: 260px;
    background: #0d0d0d;
    border-right: 1px solid rgba(255,0,0,0.1);
    padding: 15px;
    overflow-y: auto;
}

/* MAIN CENTER */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* CASE LIST */
.case-list {
    height: 45%;
    border-bottom: 1px solid rgba(255,0,0,0.1);
    overflow-y: auto;
}

/* CASE DETAIL */
.case-detail {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

/* RIGHT PANEL */
.right-panel {
    width: 320px;
    background: #0b0b0b;
    border-left: 1px solid rgba(255,0,0,0.1);
    display: flex;
    flex-direction: column;
}

.panel-section {
    flex: 1;
    border-bottom: 1px solid rgba(255,0,0,0.1);
    overflow-y: auto;
    padding: 10px;
}

.panel-section:last-child {
    border-bottom: none;
}

.card {
    background: #111;
    border: 1px solid rgba(255,0,0,0.08);
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 4px;
}

.small {
    font-size: 12px;
    color: #888;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">CADRE // INTELLIGENCE</div>
    <div class="nav">
        <div>Dashboard</div>
        <div>Cases</div>
        <div>Evidence</div>
        <div>Logs</div>
    </div>
</div>

<!-- MAIN -->
<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>Filters</h3>
        <input type="text" placeholder="Search cases..." id="searchBox" style="width:100%; padding:8px; background:#111; border:1px solid #222; color:#fff;">

        <div class="card">
            <div class="small">Status</div>
            <select id="statusFilter" style="width:100%; margin-top:5px; background:#111; color:#fff;">
                <option value="all">All</option>
                <option value="open">Open</option>
                <option value="closed">Closed</option>
                <option value="active">Active Ops</option>
            </select>
        </div>

        <div class="card">
            <div class="small">Priority</div>
            <select id="priorityFilter" style="width:100%; margin-top:5px; background:#111; color:#fff;">
                <option value="all">All</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
            </select>
        </div>
    </div>

    <!-- CENTER -->
    <div class="main">

        <!-- CASE LIST -->
        <div class="case-list" id="caseList">
            <h3 style="padding:10px;">Cases</h3>
        </div>

        <!-- CASE DETAIL -->
        <div class="case-detail" id="caseDetail">
            <h3>Case Detail View</h3>
            <p class="small">Select a case to view intelligence data.</p>
        </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

        <div class="panel-section">
            <h4>Evidence</h4>
            <div id="evidencePanel"></div>
        </div>

        <div class="panel-section">
            <h4>Activity Timeline</h4>
            <div id="activityPanel"></div>
        </div>

        <div class="panel-section">
            <h4>Intelligence Inbox</h4>
            <div id="inboxPanel"></div>
        </div>

    </div>

</div>

<script src="intelligence.js"></script>
</body>
</html>
